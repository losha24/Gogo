<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Football Manager</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:15px;
text-align:center;
}

.logo{
width:120px;
margin:auto;
display:block;
}

.team{
font-size:22px;
margin-top:6px;
margin-bottom:10px;
}

.flex{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:8px;
}

.player{
background:#1e293b;
width:130px;
padding:8px;
border-radius:8px;
font-size:12px;
}

button{
padding:7px 12px;
margin:4px;
border:none;
border-radius:6px;
cursor:pointer;
}

.train{background:#3b82f6;color:white}
.primary{background:#22c55e;color:white}
.danger{background:#ef4444;color:white}

.green{color:#22c55e}
.red{color:#ef4444}
.blue{color:#3b82f6}

.table{
background:#1e293b;
max-width:420px;
margin:10px auto;
padding:10px;
border-radius:8px;
display:none;
}

.matchRow{
padding:4px;
border-bottom:1px solid #334155;
}

</style>

</head>

<body>

<img src="soccer_logo.png" class="logo">

<div id="setup">

<input id="teamName" placeholder="שם קבוצה">

<br><br>

<button class="primary" onclick="createTeam()">צור קבוצה</button>

</div>


<div id="game" style="display:none">

<div id="teamTitle" class="team"></div>

<div id="players" class="flex"></div>

<div id="budget"></div>

<h3>אימונים</h3>

<button class="train" onclick="train('attack')">⚔ התקפה</button>
<button class="train" onclick="train('defense')">🛡 הגנה</button>
<button class="train" onclick="train('speed')">💨 מהירות</button>

<br>

<button class="primary" onclick="playMatch()">⚽ משחק שבועי</button>

<button class="primary" onclick="toggleLeague()">📊 טבלת ליגה</button>

<button class="primary" onclick="toggleMarket()">🛒 שוק שחקנים</button>

<div id="matchLog" class="table"></div>

<div id="leagueTable" class="table"></div>

<div id="market" class="table">

<div id="marketPlayers" class="flex"></div>

</div>

<br>

<button class="danger" onclick="resetGame()">איפוס</button>

</div>


<script>


function rand(n){return Math.floor(Math.random()*n)}

function randomStat(){return rand(30)+1}

function randomStars(){return rand(3)+1}


function createStars(){

return{

attack:{y:randomStars(),b:0,r:0},

defense:{y:randomStars(),b:0,r:0},

speed:{y:randomStars(),b:0,r:0}

}

}

function createProgress(){

return{attack:0,defense:0,speed:0}

}


function starText(s){

return "🔴".repeat(s.r)+"🔵".repeat(s.b)+"⭐".repeat(s.y)

}


function trainStar(p,type){

p.progress[type]++

if(p.progress[type]>=5){

p.progress[type]=0

p.stars[type].y++

if(p.stars[type].y>=3){

p.stars[type].y=0

p.stars[type].b++

if(p.stars[type].b>=3){

p.stars[type].b=0

p.stars[type].r++

}

}

}

}


function createTeam(){

let name=document.getElementById("teamName").value

if(!name) return

let players=[]

for(let i=1;i<=5;i++){

let a=randomStat()
let d=randomStat()
let s=randomStat()

players.push({

id:i,

attack:a,
defense:d,
speed:s,

value:(a+d+s)*1000,

stars:createStars(),

progress:createProgress()

})

}

let data={

teamName:name,

budget:100000,

players:players,

league:{played:0,won:0,draw:0,lost:0,points:0},

matches:[]

}

localStorage.setItem("fmGame",JSON.stringify(data))

loadGame()

}


function loadGame(){

let data=JSON.parse(localStorage.getItem("fmGame"))

if(!data) return

document.getElementById("setup").style.display="none"
document.getElementById("game").style.display="block"

document.getElementById("teamTitle").innerText=data.teamName

let players=document.getElementById("players")

players.innerHTML=""

data.players.forEach(p=>{

players.innerHTML+=`

<div class="player">

שחקן ${p.id}

<br>

⚔ ${starText(p.stars.attack)}

<br>

🛡 ${starText(p.stars.defense)}

<br>

💨 ${starText(p.stars.speed)}

<br>

💰 ${p.value}

<br>

<button class="danger" onclick="sellPlayer(${p.id})">מכור</button>

</div>

`

})

document.getElementById("budget").innerHTML="<h3>תקציב: "+data.budget+"$</h3>"

renderLeague(data)

renderMatches(data)

renderMarket()

}


function train(type){

let data=JSON.parse(localStorage.getItem("fmGame"))

if(data.budget<3000) return

data.players.forEach(p=>{

trainStar(p,type)

p[type]++

p.value=(p.attack+p.defense+p.speed)*1000

})

data.budget-=3000

localStorage.setItem("fmGame",JSON.stringify(data))

loadGame()

}



function playMatch(){

let data=JSON.parse(localStorage.getItem("fmGame"))

let power=0

data.players.forEach(p=>{

power+=p.attack+p.defense+p.speed

})

let rival=rand(200)+60

let s=Math.floor(power/120)

let r=Math.floor(rival/120)

let bonus=rand(24000)+1000

data.budget+=bonus

let result="draw"

if(s>r){

data.league.won++
data.league.points+=3
result="win"

}

else if(s<r){

data.league.lost++
result="lose"

}

else{

data.league.draw++
data.league.points++

}

data.league.played++

data.matches.unshift({

score:s+"-"+r,

bonus:bonus,

result:result

})

localStorage.setItem("fmGame",JSON.stringify(data))

loadGame()

}



function renderMatches(data){

let log=document.getElementById("matchLog")

log.innerHTML=""

data.matches.slice(0,10).forEach(m=>{

let c="blue"

if(m.result=="win") c="green"
if(m.result=="lose") c="red"

log.innerHTML+=`

<div class="matchRow ${c}">

${m.score} | +${m.bonus}$

</div>

`

})

}


function renderLeague(data){

let t=document.getElementById("leagueTable")

t.innerHTML=`

משחקים ${data.league.played}

<br>

ניצחונות ${data.league.won}

<br>

תיקו ${data.league.draw}

<br>

הפסדים ${data.league.lost}

<br>

נקודות ${data.league.points}

`

}


function toggleLeague(){

let t=document.getElementById("leagueTable")

t.style.display=t.style.display=="block"?"none":"block"

}


function toggleMarket(){

let m=document.getElementById("market")

m.style.display=m.style.display=="block"?"none":"block"

}


function renderMarket(){

let div=document.getElementById("marketPlayers")

div.innerHTML=""

for(let i=0;i<5;i++){

let a=randomStat()
let d=randomStat()
let s=randomStat()

let price=(a+d+s)*900

div.innerHTML+=`

<div class="player">

⚔ ${a}

<br>

🛡 ${d}

<br>

💨 ${s}

<br>

💰 ${price}

<br>

<button class="primary" onclick="buy(${price},${a},${d},${s})">קנה</button>

</div>

`

}

}


function buy(val,a,d,s){

let data=JSON.parse(localStorage.getItem("fmGame"))

if(data.players.length>=15) return

if(data.budget<val) return

data.players.push({

id:data.players.length+1,

attack:a,
defense:d,
speed:s,

value:val,

stars:createStars(),

progress:createProgress()

})

data.budget-=val

localStorage.setItem("fmGame",JSON.stringify(data))

loadGame()

}


function sellPlayer(id){

let data=JSON.parse(localStorage.getItem("fmGame"))

if(data.players.length<=5) return

let i=data.players.findIndex(p=>p.id==id)

let val=Math.floor(data.players[i].value*0.5)

data.budget+=val

data.players.splice(i,1)

data.players.forEach((p,i)=>p.id=i+1)

localStorage.setItem("fmGame",JSON.stringify(data))

loadGame()

}


function resetGame(){

localStorage.removeItem("fmGame")

location.reload()

}

loadGame()

</script>

</body>
</html>
