<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gogo-מנגר</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
padding:20px;
}

.logo{
width:120px;
margin:auto;
display:block;
}

.team-name{
font-size:26px;
font-weight:bold;
margin-top:10px;
margin-bottom:20px;
}

button{
padding:8px 14px;
margin:5px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.primary{
background:#22c55e;
color:white;
}

.danger{
background:#ef4444;
color:white;
}

.train-btn{
background:#3b82f6;
color:white;
}

.player{
background:#334155;
padding:10px;
border-radius:8px;
width:140px;
margin:6px;
}

.players{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.market-player{
background:#1e293b;
padding:10px;
border-radius:8px;
margin:6px;
width:150px;
}

.market{
display:none;
margin-top:10px;
}

.table{
background:#1e293b;
padding:10px;
border-radius:8px;
margin-top:10px;
}

#budget{
margin-top:20px;
font-size:18px;
font-weight:bold;
}

.green{color:#22c55e}
.red{color:#ef4444}

.matchbox{
background:#1e293b;
padding:10px;
border-radius:8px;
margin-top:10px;
}

</style>

</head>

<body>

<img src="soccer_logo.png" class="logo">

<div id="setup">

<input id="teamName" placeholder="שם קבוצה">

<br><br>

<button class="primary" onclick="createTeam()">צור קבוצה</button>

</div>

<div id="game" style="display:none">

<div class="team-name" id="teamTitle"></div>

<div class="players" id="players"></div>

<div id="budget"></div>

<h3>אימונים</h3>

<button class="train-btn" onclick="train('attack')">⚔ התקפה</button>

<button class="train-btn" onclick="train('defense')">🛡 הגנה</button>

<button class="train-btn" onclick="train('speed')">💨 מהירות</button>

<br><br>

<button class="primary" onclick="playMatch()">⚽ משחק שבועי</button>

<button class="primary" onclick="cupMatch()">🏆 משחק גביע</button>

<button class="primary" onclick="toggleMarket()">🛒 שוק שחקנים</button>

<button class="primary" onclick="getSponsor()">💰 ספונסר</button>

<div id="matchResult" class="matchbox"></div>

<div id="market" class="market">

<h3>שוק שחקנים</h3>

<div id="marketPlayers" class="players"></div>

</div>

<div class="table" id="leagueTable"></div>

<div class="table" id="seasonTable"></div>

<div class="table" id="champTable"></div>

<br>

<button class="danger" onclick="resetGame()">איפוס משחק</button>

</div>

<script>

function randomStat(){
return Math.floor(Math.random()*30)+1
}

const names=[
"דני","עומר","רון","ליאור","יואב",
"איתי","נדב","אור","טל","גיא",
"עידו","שי","נועם","אלון","מתן"
]

function randomName(){
return names[Math.floor(Math.random()*names.length)]
}

function createPlayer(id){

let attack=randomStat()
let defense=randomStat()
let speed=randomStat()

return{
id:id,
name:randomName(),
attack,
defense,
speed,
value:(attack+defense+speed)*1000,
stars:{
attack:{y:Math.floor(Math.random()*3)+1,b:0,r:0},
defense:{y:Math.floor(Math.random()*3)+1,b:0,r:0},
speed:{y:Math.floor(Math.random()*3)+1,b:0,r:0}
},
train:{attack:0,defense:0,speed:0}
}

}

function createTeam(){

let name=document.getElementById("teamName").value

if(!name)return alert("הכנס שם קבוצה")

let players=[]

for(let i=1;i<=5;i++){

players.push(createPlayer(i))

}

let data={
team:name,
budget:100000,
players,
league:{p:0,w:0,d:0,l:0,pts:0},
seasons:0,
history:[],
champ:0,
sponsor:0
}

localStorage.setItem("gogo",JSON.stringify(data))

loadGame()

}

function stars(p,type){

let s=p.stars[type]

let str=""

for(let i=0;i<s.r;i++)str+="🔴"
for(let i=0;i<s.b;i++)str+="🔵"
for(let i=0;i<s.y;i++)str+="⭐"

return str

}
  function train(type){

let data=JSON.parse(localStorage.getItem("gogo"))

let cost=3000

if(data.budget<cost)return alert("אין כסף")

data.players.forEach(p=>{

p.train[type]++

if(p.train[type]>=3){

p.train[type]=0

p.stars[type].y++

if(p.stars[type].y>=3){

p.stars[type].y=0
p.stars[type].b++

}

if(p.stars[type].b>=3){

p.stars[type].b=0
p.stars[type].r++

}

}

p[type]+=1

p.value=(p.attack+p.defense+p.speed)*1000

})

data.budget-=cost

save(data)

}

function playMatch(){

let data=JSON.parse(localStorage.getItem("gogo"))

let power=0

data.players.forEach(p=>{

power+=p.attack+p.defense+p.speed

})

let rival=Math.random()*power

let myGoals=Math.floor(Math.random()*4)

let rivalGoals=Math.floor(Math.random()*4)

let income=5000+Math.floor(Math.random()*5000)

let cost=2000

data.budget+=income-cost+data.sponsor

if(myGoals>rivalGoals){

data.league.w++
data.league.pts+=3

}else if(myGoals==rivalGoals){

data.league.d++
data.league.pts+=1

}else{

data.league.l++

}

data.league.p++

document.getElementById("matchResult").innerHTML=
"תוצאה: "+myGoals+"-"+rivalGoals+
"<br>הכנסות: "+income+
"<br>עלות: "+cost+
"<br>בונוס ספונסר: "+data.sponsor

if(data.league.p>=10){

data.seasons++

data.history.push({...data.league})

if(data.league.pts>=20){

data.champ++

}

data.league={p:0,w:0,d:0,l:0,pts:0}

}

save(data)

}

function cupMatch(){

let data=JSON.parse(localStorage.getItem("gogo"))

let reward=20000+Math.floor(Math.random()*20000)

data.budget+=reward

document.getElementById("matchResult").innerHTML=

"🏆 גביע! זכית "+reward

save(data)

}

function getSponsor(){

let data=JSON.parse(localStorage.getItem("gogo"))

let value=1000+Math.floor(Math.random()*5000)

data.sponsor=value

alert("ספונסר נותן "+value+" כל משחק")

save(data)

}

function toggleMarket(){

let m=document.getElementById("market")

if(m.style.display=="none"){

m.style.display="block"

renderMarket()

}else{

m.style.display="none"

}

}

function renderMarket(){

let div=document.getElementById("marketPlayers")

div.innerHTML=""

for(let i=1;i<=5;i++){

let val=5000+Math.floor(Math.random()*30000)

div.innerHTML+=`

<div class="market-player">

שחקן

<br>

💰 ${val}

<br>

<button onclick="buy(${val})">קנה</button>

</div>

`

}

}

function buy(val){

let data=JSON.parse(localStorage.getItem("gogo"))

if(data.players.length>=15)return alert("מקסימום 15")

if(data.budget<val)return alert("אין כסף")

let id=data.players.length+1

data.players.push(createPlayer(id))

data.budget-=val

save(data)

}

function sell(id){

let data=JSON.parse(localStorage.getItem("gogo"))

if(data.players.length<=5)return alert("חייב 5 שחקנים")

let p=data.players.find(x=>x.id==id)

data.budget+=Math.floor(p.value*0.5)

data.players=data.players.filter(x=>x.id!=id)

data.players.forEach((p,i)=>p.id=i+1)

save(data)

}

function save(data){

localStorage.setItem("gogo",JSON.stringify(data))

loadGame()

}

function loadGame(){

let data=JSON.parse(localStorage.getItem("gogo"))

if(!data)return

document.getElementById("setup").style.display="none"
document.getElementById("game").style.display="block"

document.getElementById("teamTitle").innerText=data.team

let players=document.getElementById("players")

players.innerHTML=""

data.players.forEach(p=>{

players.innerHTML+=`

<div class="player">

<b>${p.name}</b>

<br>

⚔ ${stars(p,'attack')}

<br>

🛡 ${stars(p,'defense')}

<br>

💨 ${stars(p,'speed')}

<br>

💰 ${p.value}

<br>

<button onclick="sell(${p.id})">מכור</button>

</div>

`

})

document.getElementById("budget").innerText="תקציב: "+data.budget

document.getElementById("leagueTable").innerText=

"משחקים "+data.league.p+
" | ניצ "+data.league.w+
" | תיקו "+data.league.d+
" | הפסד "+data.league.l+
" | נק "+data.league.pts

let h="היסטוריית עונות<br>"

data.history.forEach((s,i)=>{

h+="עונה "+(i+1)+" נק "+s.pts+"<br>"

})

document.getElementById("seasonTable").innerHTML=h

document.getElementById("champTable").innerText=

"אליפויות: "+data.champ

}

function resetGame(){

if(confirm("לאפס משחק?")){

localStorage.removeItem("gogo")
location.reload()

}

}

loadGame()

</script>

</body>
</html>
