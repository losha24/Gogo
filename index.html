<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>O-Kar Custom Blades | V5.3.0</title>
    <link rel="stylesheet" href="style.css?v=5.3.0">
    <link rel="manifest" href="manifest.json?v=5.3.0">
    <link rel="icon" href="logo.png">
</head>
<body onload="initApp()">

<header class="main-header shadow">
    <div class="header-top">
        <img src="logo.png" alt="O-Kar Logo" class="main-logo-large" onclick="goHome()">
    </div>
    <div class="header-controls">
        <button class="nav-btn home-btn" onclick="goHome()">🏠 בית</button>
        <button id="pwaBtn" class="nav-btn" onclick="handleInstallClick()">📲 התקנה</button>
        <button class="nav-btn" onclick="openAdmin()">⚙️ ניהול</button>
        <button class="nav-btn" onclick="hardReset()">🔄 עדכון</button>
    </div>
</header>

<div class="container">
    <button id="addBtn" class="big-add-btn shadow" onclick="toggleForm()" style="display:none;">
        <span>➕</span> הוספת מוצר חדש
    </button>

    <div class="stats-container shadow">
        <div class="stat-item">📦 פריטים: <span id="totalItems">0</span></div>
        <div class="stat-item">🔪 במלאי: <span id="totalInStock">0</span></div>
        <div class="stat-item">✅ נמכרו: <span id="totalSold">0</span></div>
    </div>

    <div id="adminModal" class="full-modal" style="display:none;">
        <div class="form-header-bar"><button class="back-btn" onclick="goHome()">➜ סגור</button><h2>הגדרות ניהול</h2></div>
        <div class="form-content-wrapper">
            <div class="form-card shadow" style="padding:20px;">
                <div class="input-group"><label>שינוי סיסמת מנהל</label><input type="password" id="newPass" placeholder="הזן סיסמה חדשה"></div>
                <div class="input-group"><label>טלפון לוואצאפ (972...)</label><input type="text" id="newPhone"></div>
                <button class="btn-save-final shadow" onclick="saveSettings()">שמור הגדרות בענן</button>
                <hr style="margin:20px 0;">
                <p style="font-weight:bold; font-size:0.9rem;">גיבוי נתונים ידני:</p>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <button class="nav-btn" onclick="exportToJSON()" style="max-width:none;">📥 ייצוא</button>
                    <button class="nav-btn" onclick="document.getElementById('importFile').click()" style="max-width:none;">📤 ייבוא</button>
                    <input type="file" id="importFile" style="display:none" onchange="importFromJSON(event)">
                </div>
                <button class="btn-delete" onclick="logoutAdmin()">התנתק ממצב עריכה</button>
            </div>
        </div>
    </div>

    <div id="installInstructions" class="full-modal" style="display:none; background: rgba(0,0,0,0.85); z-index: 3000;">
        <div class="form-card shadow" style="margin: 20% auto; width: 85%; text-align: center; padding: 30px; background:white; border-radius:20px;">
            <h3>התקנת האפליקציה</h3>
            <div style="text-align: right; margin: 20px 0; line-height: 1.6;">
                <p><strong>אייפון:</strong> לחץ על שיתוף [⎋] ואז "הוסף למסך הבית".</p>
                <p><strong>אנדרואיד:</strong> לחץ על 3 נקודות ובחר "התקן אפליקציה".</p>
            </div>
            <button class="btn-save-final" onclick="goHome()">סגור</button>
        </div>
    </div>

    <div id="formModal" class="full-modal" style="display:none;">
        <div class="form-header-bar"><button class="back-btn" onclick="goHome()">➜ ביטול</button><h2 id="formTitle">פרטי מוצר</h2></div>
        <div class="form-content-wrapper">
            <div class="form-card shadow">
                <input type="hidden" id="editId">
                <div class="input-group"><label>שם הדגם</label><input type="text" id="name"></div>
                <div class="input-group"><label>מחיר (₪)</label><input type="number" id="price"></div>
                <div class="input-group"><label>חומרים</label><input type="text" id="mat"></div>
                <div class="input-group"><label>תיאור</label><textarea id="desc" rows="3"></textarea></div>
                <div class="file-area shadow">
                    <p>📸 תמונות</p>
                    <input type="file" id="imgs" multiple accept="image/*">
                    <div id="loader" style="display:none; color:red; font-weight:bold; margin-top:10px;">⌛ מעלה...</div>
                </div>
                <button id="saveBtn" class="btn-save-final shadow" onclick="save()">שמור בענן</button>
                <button id="deleteBtn" class="btn-delete" style="display:none;" onclick="deleteProduct()">🗑️ מחק מוצר</button>
            </div>
        </div>
    </div>

    <div id="list" class="grid-container"></div>
</div>

<div id="viewModal" class="full-modal" style="display:none;">
    <span class="close-view" onclick="closeView()">&times;</span>
    <div id="modalContent"></div>
</div>

<footer class="main-footer">
    <p>© 2026 O-Kar Custom Blades | אולג זבודיסקר</p>
    <p>גרסת ענן: <strong>5.3.0</strong></p>
</footer>

<script>
    const FB_URL = "https://o-kar-blades-default-rtdb.europe-west1.firebasedatabase.app"; 
    let ADMIN_PASS = "77255"; 
    let MY_PHONE = "0524704226";
    let isAdmin = sessionStorage.getItem('is_admin') === 'true';
    let deferredPrompt, db = [];

    async function initApp() {
        await fetchSettings();
        if(isAdmin) document.getElementById('addBtn').style.display = 'block';
        checkInstallationStatus();
        fetchData();
        setupPWA();
    }

    async function fetchSettings() {
        try {
            const res = await fetch(`${FB_URL}/settings.json`);
            const data = await res.json();
            if (data) {
                if (data.pass) ADMIN_PASS = data.pass;
                if (data.phone) MY_PHONE = data.phone;
            }
        } catch(e) { console.error("Settings error", e); }
    }

    async function saveSettings() {
        const p = document.getElementById('newPass').value;
        const t = document.getElementById('newPhone').value;
        const newSettings = { pass: p || ADMIN_PASS, phone: t || MY_PHONE };
        await fetch(`${FB_URL}/settings.json`, { method: 'PUT', body: JSON.stringify(newSettings) });
        ADMIN_PASS = newSettings.pass;
        MY_PHONE = newSettings.phone;
        alert("הגדרות נשמרו בענן!"); goHome();
    }

    async function fetchData() {
        try {
            const res = await fetch(`${FB_URL}/products.json`);
            const data = await res.json();
            db = data ? Object.values(data) : [];
            render();
        } catch(e) { console.error("Fetch error", e); }
    }

    function render() {
        const list = document.getElementById('list');
        if(db.length === 0) {
            list.innerHTML = "<p style='grid-column:1/-1; text-align:center; padding:50px;'>המערכת ריקה. היכנס לניהול להוספת מוצרים.</p>";
        } else {
            list.innerHTML = db.map(i => `
                <div class="item-card shadow ${i.sold ? 'is-sold' : ''}">
                    <div class="card-img" onclick="viewItem(${i.id})"><img src="${i.images[0]}" loading="lazy"></div>
                    <div class="item-info">
                        <div class="title">${i.n}</div><div class="price">₪${i.p}</div>
                        <div class="item-btns">
                            <button class="btn-i" onclick="contactSeller('${i.n.replace(/'/g, "\\'")}', '${i.p}', ${i.id})">💬</button>
                            ${isAdmin ? `<button class="btn-i" onclick="editItem(${i.id})">✏️</button>` : ''}
                            ${isAdmin ? `<button class="btn-i" onclick="toggleSold(${i.id})">${i.sold ? '🛒' : '✅'}</button>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }
        document.getElementById('totalItems').innerText = db.length;
        document.getElementById('totalSold').innerText = db.filter(i => i.sold).length;
        document.getElementById('totalInStock').innerText = db.filter(i => !i.sold).length;
    }

    async function save() {
        const n = document.getElementById('name').value, p = document.getElementById('price').value, id = document.getElementById('editId').value;
        if(!n || !p) return alert("שם ומחיר חובה");
        const btn = document.getElementById('saveBtn');
        btn.disabled = true; document.getElementById('loader').style.display='block';

        const files = document.getElementById('imgs').files;
        let images = [];
        if (files.length > 0) {
            for (let f of files) {
                const bmp = await createImageBitmap(f);
                const canvas = document.createElement('canvas');
                const MAX = 1000;
                let w = bmp.width, h = bmp.height;
                if (w > h && w > MAX) { h *= MAX / w; w = MAX; } else if (h > MAX) { w *= MAX / h; h = MAX; }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(bmp, 0, 0, w, h);
                images.push(canvas.toDataURL('image/jpeg', 0.6));
                bmp.close();
            }
        }

        const itemId = id ? id : Date.now();
        const item = {
            id: itemId, n, p, m: document.getElementById('mat').value, d: document.getElementById('desc').value,
            images: images.length > 0 ? images : (id ? db.find(x=>x.id==id).images : ["logo.png"]),
            sold: id ? (db.find(x=>x.id==id)?.sold || false) : false
        };

        await fetch(`${FB_URL}/products/${itemId}.json`, { method: 'PUT', body: JSON.stringify(item) });
        await fetchData();
        btn.disabled = false; document.getElementById('loader').style.display='none';
        goHome();
    }

    function checkInstallationStatus() {
        const pwaBtn = document.getElementById('pwaBtn');
        if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
            pwaBtn.style.background = "#e63946"; pwaBtn.style.color = "white"; pwaBtn.innerText = "מותקן ✅";
        }
    }

    function openAdmin() {
        if (isAdmin || prompt("סיסמת מנהל:") === ADMIN_PASS) {
            isAdmin = true; sessionStorage.setItem('is_admin', 'true');
            document.getElementById('addBtn').style.display = 'block';
            document.getElementById('adminModal').style.display = 'block';
            render();
        } else { alert("סיסמה שגויה"); }
    }

    function contactSeller(n, p, id) {
        const url = `${window.location.href.split('?')[0]}?id=${id}`;
        window.open(`https://wa.me/972${MY_PHONE.substring(1)}?text=${encodeURIComponent('מעוניין ב: ' + n + '\nלינק: ' + url)}`, '_blank');
    }

    async function toggleSold(id) {
        const i = db.find(x => x.id == id);
        await fetch(`${FB_URL}/products/${id}.json`, { method: 'PATCH', body: JSON.stringify({sold: !i.sold}) });
        fetchData();
    }

    async function deleteProduct() {
        if(confirm("למחוק?")) {
            await fetch(`${FB_URL}/products/${document.getElementById('editId').value}.json`, { method: 'DELETE' });
            await fetchData(); goHome();
        }
    }

    function exportToJSON() {
        const blob = new Blob([JSON.stringify(db, null, 2)], { type: "application/json" });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `Backup-${new Date().toLocaleDateString()}.json`; a.click();
    }

    async function importFromJSON(event) {
        const reader = new FileReader();
        reader.onload = async (e) => {
            const items = JSON.parse(e.target.result);
            for (let i of items) { await fetch(`${FB_URL}/products/${i.id}.json`, { method: 'PUT', body: JSON.stringify(i) }); }
            alert("ייבוא הושלם"); fetchData();
        };
        reader.readAsText(event.target.files[0]);
    }

    function viewItem(id) {
        const i = db.find(x => x.id == id);
        document.getElementById('modalContent').innerHTML = `
            <div class="m-slider">${i.images.map(s => `<img src="${s}">`).join('')}</div>
            <div class="m-details">
                <h2>${i.n}</h2><p class="m-price">₪${i.p}</p>
                <div class="m-specs shadow"><p><strong>חומרים:</strong> ${i.m || '-'}</p><p>${i.d || '-'}</p></div>
                <button class="btn-wa-big shadow" onclick="contactSeller('${i.n.replace(/'/g, "\\'")}', '${i.p}', ${i.id})">💬 צור קשר</button>
            </div>`;
        document.getElementById('viewModal').style.display = "block";
    }

    function editItem(id) {
        const i = db.find(x => x.id == id);
        document.getElementById('editId').value = i.id; document.getElementById('name').value = i.n; document.getElementById('price').value = i.p;
        document.getElementById('mat').value = i.m; document.getElementById('desc').value = i.d;
        document.getElementById('formTitle').innerText = "עריכה"; document.getElementById('deleteBtn').style.display = 'block';
        document.getElementById('formModal').style.display = 'block';
    }

    function handleInstallClick() { if (deferredPrompt) deferredPrompt.prompt(); else document.getElementById('installInstructions').style.display = 'block'; }
    function goHome() { document.querySelectorAll('.full-modal').forEach(m => m.style.display = 'none'); document.body.style.overflow = 'auto'; }
    function toggleForm() { resetForm(); document.getElementById('deleteBtn').style.display = 'none'; document.getElementById('formModal').style.display = 'block'; }
    function resetForm() { ['editId','name','mat','price','desc','imgs'].forEach(id => document.getElementById(id).value = ''); }
    function closeView() { goHome(); }
    function hardReset() { location.reload(true); }
    function setupPWA() { 
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js?v=5.3.0');
        window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; });
    }
    function logoutAdmin() { isAdmin = false; sessionStorage.setItem('is_admin', 'false'); document.getElementById('addBtn').style.display = 'none'; goHome(); render(); }
</script>
</body>
</html>
