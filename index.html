<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>O-Kar Custom Blades | V4.6.0</title>
    <link rel="stylesheet" href="style.css?v=4.6.0">
    <link rel="manifest" href="manifest.json?v=4.6.0">
    <link rel="icon" href="logo.png">
</head>
<body onload="initApp()">

<header class="main-header shadow">
    <div class="header-top">
        <img src="logo.png" alt="O-Kar Logo" class="main-logo-large" onclick="goHome()">
    </div>
    <div class="header-controls">
        <button class="nav-btn home-btn" onclick="goHome()">🏠 בית</button>
        <button id="pwaBtn" class="nav-btn">📲 התקנה</button>
        <button class="nav-btn" onclick="location.reload(true)">🔄 רענון</button>
        <button class="nav-btn" onclick="exportData()">💾 גיבוי</button>
        <label class="nav-btn">📂 שחזור<input type="file" id="fileIn" accept=".json" onchange="importData(event)" style="display:none;"></label>
    </div>
</header>

<div class="container">
    <button class="big-add-btn shadow" onclick="toggleForm()">
        <span>➕</span> הוספת מוצר חדש
    </button>

    <div class="stats-container shadow">
        <div class="stat-item">📦 סה"כ: <span id="totalItems">0</span></div>
        <div class="stat-item">🔪 נשאר: <span id="totalInStock">0</span></div>
        <div class="stat-item">✅ נמכר: <span id="totalSold">0</span></div>
    </div>

    <div id="formModal" class="full-modal" style="display:none;">
        <div class="form-header-bar">
            <button class="back-btn" onclick="goHome()">➜ ביטול</button>
            <h2 id="formTitle">פרטי מוצר</h2>
        </div>
        <div class="form-content-wrapper">
            <div class="form-card shadow">
                <input type="hidden" id="editId">
                <div class="input-group"><label>שם הדגם</label><input type="text" id="name"></div>
                <div class="input-group"><label>מחיר (₪)</label><input type="number" id="price"></div>
                <div class="input-group"><label>חומרים</label><input type="text" id="mat"></div>
                <div class="input-group"><label>תיאור</label><textarea id="desc" rows="3"></textarea></div>
                
                <div class="file-area shadow">
                    <p>📸 תמונות מוצר (ניתן לבחור כמה)</p>
                    <input type="file" id="imgs" multiple accept="image/*">
                    <div id="uploadStatus" style="display:none; color: var(--accent); font-weight: bold; margin-top: 10px;">⌛ מעבד תמונות... נא להמתין</div>
                </div>

                <button id="saveBtn" class="btn-save-final shadow" onclick="save()">שמור ופרסם</button>
                <button id="deleteBtn" class="btn-delete" style="display:none;" onclick="deleteProduct()">🗑️ מחק מוצר</button>
            </div>
        </div>
    </div>

    <div id="list" class="grid-container"></div>
</div>

<div id="viewModal" class="full-modal" style="display:none;">
    <span class="close-view" onclick="closeView()">&times;</span>
    <div id="modalContent"></div>
</div>

<footer id="versionTag">O-KAR Custom Blades | V4.6.0</footer>

<script>
    const DB_NAME = 'okar_database_final';
    const MY_PHONE = "0524704226";
    let db = [];
    let deferredPrompt;

    function initApp() {
        const saved = localStorage.getItem(DB_NAME);
        if (saved) db = JSON.parse(saved);
        render();
        setupPWA();
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('id')) setTimeout(() => viewItem(urlParams.get('id')), 500);
    }

    function setupPWA() {
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            document.getElementById('pwaBtn').style.backgroundColor = "#2ecc71";
        });

        document.getElementById('pwaBtn').addEventListener('click', async () => {
            if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; }
            else { alert("להתקנה: לחץ על 'הוסף למסך הבית' בתפריט הדפדפן"); }
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js?v=4.6.0').then(reg => {
                reg.addEventListener('updatefound', () => {
                    const newWorker = reg.installing;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            location.reload(); 
                        }
                    });
                });
            });
        }
    }

    // פונקציית כיווץ משופרת למניעת תקיעות
    async function processImages(files) {
        const processed = [];
        const status = document.getElementById('uploadStatus');
        status.style.display = 'block';
        
        for (let file of files) {
            const bitmap = await createImageBitmap(file);
            const canvas = document.createElement('canvas');
            const MAX_SIZE = 1200;
            let w = bitmap.width, h = bitmap.height;
            
            if (w > h && w > MAX_SIZE) { h *= MAX_SIZE / w; w = MAX_SIZE; }
            else if (h > MAX_SIZE) { w *= MAX_SIZE / h; h = MAX_SIZE; }
            
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(bitmap, 0, 0, w, h);
            processed.push(canvas.toDataURL('image/jpeg', 0.7));
            bitmap.close();
        }
        status.style.display = 'none';
        return processed;
    }

    async function save() {
        const n = document.getElementById('name').value, p = document.getElementById('price').value, id = document.getElementById('editId').value;
        if(!n || !p) return alert("חובה למלא שם ומחיר");

        const btn = document.getElementById('saveBtn');
        btn.disabled = true;
        
        const files = document.getElementById('imgs').files;
        let images = [];
        
        if (files.length > 0) {
            images = await processImages(files);
        }

        const item = {
            id: id ? Number(id) : Date.now(),
            n, p, m: document.getElementById('mat').value, d: document.getElementById('desc').value,
            images: images.length > 0 ? images : (id ? db.find(x=>x.id==id).images : ["logo.png"]),
            sold: id ? db.find(x=>x.id==id).sold : false
        };

        if(id) db[db.findIndex(x=>x.id==id)] = item;
        else db.unshift(item);

        localStorage.setItem(DB_NAME, JSON.stringify(db));
        render();
        btn.disabled = false;
        goHome();
    }

    function render() {
        const list = document.getElementById('list');
        list.innerHTML = db.map(i => `
            <div class="item-card shadow ${i.sold ? 'is-sold' : ''}">
                <div class="card-img" onclick="viewItem(${i.id})"><img src="${i.images[0]}" loading="lazy"></div>
                <div class="item-info">
                    <div class="title">${i.n}</div>
                    <div class="price">₪${i.p}</div>
                    <div class="item-btns">
                        <button class="btn-i" onclick="contactSeller('${i.n.replace(/'/g, "\\'")}', '${i.p}', ${i.id})">💬</button>
                        <button class="btn-i" onclick="editItem(${i.id})">✏️</button>
                        <button class="btn-i" onclick="toggleSold(${i.id})">${i.sold ? '🛒' : '✅'}</button>
                    </div>
                </div>
            </div>
        `).join('');
        document.getElementById('totalItems').innerText = db.length;
        document.getElementById('totalSold').innerText = db.filter(i => i.sold).length;
        document.getElementById('totalInStock').innerText = db.filter(i => !i.sold).length;
    }

    function viewItem(id) {
        const i = db.find(x => x.id == id); if(!i) return;
        document.getElementById('modalContent').innerHTML = `
            <div class="m-slider">${i.images.map(s => `<img src="${s}">`).join('')}</div>
            <div class="m-details">
                <h2>${i.n}</h2><p class="m-price">₪${i.p}</p>
                <div class="m-specs shadow"><p><strong>חומרים:</strong> ${i.m || '-'}</p><p>${i.d || '-'}</p></div>
                <button class="btn-wa-big shadow" onclick="contactSeller('${i.n.replace(/'/g, "\\'")}', '${i.p}', ${i.id})">💬 צור קשר לרכישה</button>
            </div>`;
        document.getElementById('viewModal').style.display = "block";
        document.body.classList.add('no-scroll');
    }

    function contactSeller(n, p, id) {
        const url = `${window.location.href.split('?')[0]}?id=${id}`;
        window.open(`https://wa.me/972${MY_PHONE.substring(1)}?text=${encodeURIComponent('היי אולג, מעוניין ב: *' + n + '* (₪' + p + ')\nלינק: ' + url)}`, '_blank');
    }

    function editItem(id) {
        const i = db.find(x => x.id == id);
        document.getElementById('editId').value = i.id;
        document.getElementById('name').value = i.n;
        document.getElementById('price').value = i.p;
        document.getElementById('mat').value = i.m;
        document.getElementById('desc').value = i.d;
        document.getElementById('formTitle').innerText = "עריכה";
        document.getElementById('deleteBtn').style.display = 'block';
        document.getElementById('formModal').style.display = 'block';
        document.body.classList.add('no-scroll');
    }

    function toggleSold(id) { 
        const idx = db.findIndex(x => x.id == id); 
        db[idx].sold = !db[idx].sold; 
        localStorage.setItem(DB_NAME, JSON.stringify(db)); 
        render(); 
    }
    function deleteProduct() { if(confirm("למחוק?")) { db = db.filter(x => x.id != document.getElementById('editId').value); localStorage.setItem(DB_NAME, JSON.stringify(db)); render(); goHome(); } }
    function goHome() { window.history.replaceState({}, '', window.location.href.split('?')[0]); document.querySelectorAll('.full-modal').forEach(m => m.style.display = 'none'); document.body.classList.remove('no-scroll'); }
    function toggleForm() { resetForm(); document.getElementById('deleteBtn').style.display = 'none'; document.getElementById('formModal').style.display = 'block'; document.body.classList.add('no-scroll'); }
    function resetForm() { ['editId','name','mat','price','desc','imgs'].forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; }); }
    function exportData() {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(db)], {type: "application/json"}));
        a.download = "okar_backup.json"; a.click();
    }
    function importData(e) {
        const r = new FileReader();
        r.onload = ev => { db = JSON.parse(ev.target.result); localStorage.setItem(DB_NAME, JSON.stringify(db)); render(); };
        r.readAsText(e.target.files[0]);
    }
    function closeView() { goHome(); }
</script>
</body>
</html>
