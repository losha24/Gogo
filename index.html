<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>O-Kar Custom Blades | V5.3.1</title>
    <link rel="stylesheet" href="style.css?v=5.3.1">
    <link rel="manifest" href="manifest.json?v=5.3.1">
    <link rel="icon" href="logo.png">
</head>
<body onload="initApp()">

<header class="main-header shadow">
    <div class="header-top">
        <img src="logo.png" alt="O-Kar Logo" class="main-logo-large" onclick="goHome()">
    </div>
    <div class="header-controls">
        <button class="nav-btn home-btn" onclick="goHome()">🏠 בית</button>
        <button id="pwaBtn" class="nav-btn" onclick="handleInstallClick()">📲 התקנה</button>
        <button class="nav-btn" onclick="openAdmin()">⚙️ ניהול</button>
        <button class="nav-btn" onclick="hardReset()">🔄 עדכון</button>
    </div>
</header>

<div class="container">
    <button id="addBtn" class="big-add-btn shadow" onclick="toggleForm()" style="display:none;">
        <span>➕</span> הוספת מוצר חדש
    </button>

    <div class="stats-container shadow">
        <div class="stat-item">📦 פריטים: <span id="totalItems">0</span></div>
        <div class="stat-item">🔪 במלאי: <span id="totalInStock">0</span></div>
        <div class="stat-item">✅ נמכרו: <span id="totalSold">0</span></div>
    </div>

    <div id="adminModal" class="full-modal" style="display:none;">
        <div class="form-header-bar"><button class="back-btn" onclick="goHome()">➜ סגור</button><h2>הגדרות ניהול</h2></div>
        <div class="form-content-wrapper">
            <div class="form-card shadow" style="padding:20px;">
                <div class="input-group"><label>שינוי סיסמת מנהל</label><input type="password" id="newPass" placeholder="הזן סיסמה חדשה"></div>
                <div class="input-group"><label>טלפון לוואצאפ (972...)</label><input type="text" id="newPhone" placeholder="0524704226"></div>
                <button class="btn-save-final shadow" onclick="saveSettings()">שמור הגדרות בענן</button>
                <hr style="margin:20px 0;">
                <p style="font-weight:bold; font-size:0.9rem;">גיבוי נתונים ידני:</p>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <button class="nav-btn" onclick="exportToJSON()" style="max-width:none;">📥 ייצוא</button>
                    <button class="nav-btn" onclick="document.getElementById('importFile').click()" style="max-width:none;">📤 ייבוא</button>
                    <input type="file" id="importFile" style="display:none" onchange="importFromJSON(event)">
                </div>
                <button class="btn-delete" onclick="logoutAdmin()">התנתק ממצב עריכה</button>
            </div>
        </div>
    </div>

    <div id="list" class="grid-container"></div>
</div>

<div id="viewModal" class="full-modal" style="display:none;">
    <span class="close-view" onclick="closeView()">&times;</span>
    <div id="modalContent"></div>
</div>

<footer class="main-footer">
    <p>© 2026 O-Kar Custom Blades | אולג זבודיסקר</p>
    <p>גרסת ענן: <strong>5.3.1</strong></p>
</footer>

<script>
    const FB_URL = "https://o-kar-blades-default-rtdb.europe-west1.firebasedatabase.app"; 
    let ADMIN_PASS = "77255"; 
    let MY_PHONE = "0524704226"; // המספר שהגדרת
    let isAdmin = sessionStorage.getItem('is_admin') === 'true';
    let deferredPrompt, db = [];

    async function initApp() {
        await fetchSettings();
        if(isAdmin) document.getElementById('addBtn').style.display = 'block';
        checkInstallationStatus();
        fetchData();
        setupPWA();
    }

    async function fetchSettings() {
        try {
            const res = await fetch(`${FB_URL}/settings.json`);
            const data = await res.json();
            if (data) {
                if (data.pass) ADMIN_PASS = data.pass;
                if (data.phone) MY_PHONE = data.phone;
            }
        } catch(e) { console.error("Settings error", e); }
    }

    async function saveSettings() {
        const p = document.getElementById('newPass').value;
        const t = document.getElementById('newPhone').value;
        const newSettings = { pass: p || ADMIN_PASS, phone: t || MY_PHONE };
        await fetch(`${FB_URL}/settings.json`, { method: 'PUT', body: JSON.stringify(newSettings) });
        ADMIN_PASS = newSettings.pass;
        MY_PHONE = newSettings.phone;
        alert("הגדרות עודכנו בהצלחה!"); goHome();
    }

    async function fetchData() {
        try {
            const res = await fetch(`${FB_URL}/products.json`);
            const data = await res.json();
            db = data ? Object.values(data) : [];
            render();
        } catch(e) { console.error("Fetch error", e); }
    }

    function render() {
        const list = document.getElementById('list');
        if(db.length === 0) {
            list.innerHTML = "<p style='grid-column:1/-1; text-align:center; padding:50px;'>המערכת ריקה. היכנס לניהול להוספת מוצרים.</p>";
        } else {
            list.innerHTML = db.map(i => `
                <div class="item-card shadow ${i.sold ? 'is-sold' : ''}">
                    <div class="card-img" onclick="viewItem(${i.id})"><img src="${i.images[0]}" loading="lazy"></div>
                    <div class="item-info">
                        <div class="title">${i.n}</div><div class="price">₪${i.p}</div>
                        <div class="item-btns">
                            <button class="btn-i" onclick="contactSeller('${i.n.replace(/'/g, "\\'")}', '${i.p}', ${i.id})">💬</button>
                            ${isAdmin ? `<button class="btn-i" onclick="editItem(${i.id})">✏️</button>` : ''}
                            ${isAdmin ? `<button class="btn-i" onclick="toggleSold(${i.id})">${i.sold ? '🛒' : '✅'}</button>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }
    }

    function contactSeller(n, p, id) {
        // מנקה תווים לא רצויים מהמספר לצורך הלינק
        const cleanPhone = MY_PHONE.replace(/\D/g, '');
        const finalPhone = cleanPhone.startsWith('0') ? '972' + cleanPhone.substring(1) : cleanPhone;
        const url = `${window.location.href.split('?')[0]}?id=${id}`;
        window.open(`https://wa.me/${finalPhone}?text=${encodeURIComponent('היי אולג, אני מעוניין במוצר: ' + n + '\nלינק: ' + url)}`, '_blank');
    }

    // שאר הפונקציות (save, toggleSold, וכו') נשארות זהות לגרסה 5.3.0
    function goHome() { document.querySelectorAll('.full-modal').forEach(m => m.style.display = 'none'); document.body.style.overflow = 'auto'; }
    function openAdmin() { if (isAdmin || prompt("סיסמת מנהל:") === ADMIN_PASS) { isAdmin = true; sessionStorage.setItem('is_admin', 'true'); document.getElementById('addBtn').style.display = 'block'; document.getElementById('adminModal').style.display = 'block'; render(); } else { alert("סיסמה שגויה"); } }
    function hardReset() { location.reload(true); }
    function setupPWA() { if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js?v=5.3.1'); }
    function checkInstallationStatus() { const pwaBtn = document.getElementById('pwaBtn'); if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) { pwaBtn.style.background = "#e63946"; pwaBtn.style.color = "white"; pwaBtn.innerText = "מותקן ✅"; } }
    function handleInstallClick() { document.getElementById('installInstructions').style.display = 'block'; }
</script>
</body>
</html>
