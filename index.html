<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Go-Go Football Game</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
padding:20px;
}

button{
padding:8px 14px;
margin:4px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.primary{background:#22c55e}
.danger{background:#ef4444}
.train-btn{background:#2563eb}

.section{
background:#1e293b;
padding:10px;
border-radius:10px;
max-width:420px;
margin:10px auto;
}

.player{
background:#334155;
padding:8px;
margin:6px auto;
border-radius:6px;
max-width:360px;
display:flex;
justify-content:space-between;
}

.table{
background:#111827;
padding:10px;
border-radius:10px;
max-width:420px;
margin:10px auto;
display:none;
}

.match-box{
background:#1e293b;
padding:12px;
border-radius:10px;
max-width:420px;
margin:10px auto;
}

</style>

</head>

<body>

<h1>⚽ Go-Go Football</h1>

<div id="setup">

<input id="teamName" placeholder="שם קבוצה">

<br>

<button class="primary" onclick="createTeam()">צור קבוצה</button>

</div>

<div id="game" style="display:none">

<h2 id="teamTitle"></h2>

<div id="players"></div>

<div id="budget"></div>

<div class="section">

<h3>אימונים</h3>

<button class="train-btn" onclick="train('attack')">⚔️ התקפה</button>

<button class="train-btn" onclick="train('defense')">🛡️ הגנה</button>

<button class="train-btn" onclick="train('speed')">⚡ מהירות</button>

</div>

<button class="primary" onclick="playMatch()">⚽ משחק שבועי</button>

<div id="matchResult"></div>

<button class="primary" onclick="toggleTables()">📊 טבלת משחקים</button>

<div id="leagueTable" class="table"></div>

<div id="seasonTable" class="table"></div>

<div id="championshipTable" class="table"></div>

<div id="market" class="table"></div>

<button class="primary" onclick="toggleMarket()">🛒 שוק שחקנים</button>

<button class="danger" onclick="resetGame()">איפוס משחק</button>

</div>

<script>

function stars(val){

let yellow=Math.floor(val/10)

let orange=Math.floor(yellow/5)

let blue=Math.floor(orange/5)

yellow=yellow%5
orange=orange%5

return "🔷".repeat(blue)+"🔶".repeat(orange)+"⭐".repeat(yellow)

}

function createTeam(){

let name=document.getElementById("teamName").value

if(!name)return alert("הכנס שם קבוצה")

let players=[]

for(let i=1;i<=5;i++){

let attack=10*(Math.floor(Math.random()*3)+1)
let defense=10*(Math.floor(Math.random()*3)+1)
let speed=10*(Math.floor(Math.random()*3)+1)

players.push({
id:i,
attack,
defense,
speed,
value:(attack+defense+speed)*1000
})

}

let data={
teamName:name,
budget:100000,
players,
league:{played:0,won:0,draw:0,lost:0,points:0},
seasonsPlayed:0,
championships:0,
seasonHistory:[],
trainCost:{attack:3000,defense:3000,speed:3000}
}

localStorage.setItem("miniFootball",JSON.stringify(data))

loadGame()

}

function loadGame(){

let data=JSON.parse(localStorage.getItem("miniFootball"))

if(!data)return

document.getElementById("setup").style.display="none"
document.getElementById("game").style.display="block"

document.getElementById("teamTitle").innerText=data.teamName

let playersHTML=""

data.players.forEach(p=>{

playersHTML+=`

<div class="player">

<div>

⚔️ ${stars(p.attack)}
🛡️ ${stars(p.defense)}
⚡ ${stars(p.speed)}

</div>

<button onclick="sellPlayer(${p.id})" class="danger">מכור</button>

</div>

`

})

document.getElementById("players").innerHTML=playersHTML

document.getElementById("budget").innerHTML="תקציב: "+data.budget

updateTables(data)

renderMarket()

}

function train(type){

let data=JSON.parse(localStorage.getItem("miniFootball"))

let cost=data.trainCost[type]

if(data.budget<cost)return alert("אין כסף")

data.players.forEach(p=>{

p[type]+=Math.random()*2

})

data.budget-=cost

data.trainCost[type]+=500

localStorage.setItem("miniFootball",JSON.stringify(data))

loadGame()

}

function playMatch(){

let data=JSON.parse(localStorage.getItem("miniFootball"))

let goals=Math.floor(Math.random()*5)
let rival=Math.floor(Math.random()*5)

let resultText=""

if(goals>rival){

data.league.won++
data.league.points+=3
resultText="ניצחון"

}
else if(goals===rival){

data.league.draw++
data.league.points+=1
resultText="תיקו"

}
else{

data.league.lost++
resultText="הפסד"

}

data.league.played++

let income=6000+Math.floor(Math.random()*4000)
let cost=2000+Math.floor(Math.random()*3000)

data.budget+=income-cost

let bonusText=""

if(data.league.played%5===0){

let bonus=15000

data.budget+=bonus

bonusText="🎁 בונוס משחק חמישי: "+bonus

}

if(data.league.played%10===0){

data.seasonsPlayed++

data.seasonHistory.push({...data.league})

data.league={played:0,won:0,draw:0,lost:0,points:0}

data.trainCost={attack:3000,defense:3000,speed:3000}

if(data.seasonsPlayed%5===0){

data.championships++

alert("🏆 זכית באליפות!")

}

}

document.getElementById("matchResult").innerHTML=`

<div class="match-box">

תוצאה: ${goals}-${rival}

<br>

${resultText}

<br>

הכנסה: ${income}

<br>

עלות: ${cost}

<br>

${bonusText}

</div>

`

localStorage.setItem("miniFootball",JSON.stringify(data))

loadGame()

}

function updateTables(data){

document.getElementById("leagueTable").innerHTML=

`ליגה

<br>משחקים ${data.league.played}

<br>ניצחונות ${data.league.won}

<br>תיקו ${data.league.draw}

<br>הפסדים ${data.league.lost}

<br>נקודות ${data.league.points}`

let html="עונות:<br>"

data.seasonHistory.forEach((s,i)=>{

html+="עונה "+(i+1)+" נקודות "+s.points+"<br>"

})

document.getElementById("seasonTable").innerHTML=html

document.getElementById("championshipTable").innerHTML=

"אליפויות: "+data.championships

}

function toggleTables(){

document.querySelectorAll(".table").forEach(t=>{

t.style.display=t.style.display==="block"?"none":"block"

})

}

function renderMarket(){

let html=""

for(let i=0;i<3;i++){

let price=10000+Math.floor(Math.random()*20000)

html+=`

<div class="player">

שחקן 💰 ${price}

<button onclick="buyPlayer(${price})" class="primary">קנה</button>

</div>

`

}

document.getElementById("market").innerHTML=html

}

function toggleMarket(){

let m=document.getElementById("market")

m.style.display=m.style.display==="block"?"none":"block"

}

function buyPlayer(price){

let data=JSON.parse(localStorage.getItem("miniFootball"))

if(data.budget<price)return alert("אין כסף")

let id=data.players.length+1

let attack=10*(Math.floor(Math.random()*3)+1)
let defense=10*(Math.floor(Math.random()*3)+1)
let speed=10*(Math.floor(Math.random()*3)+1)

data.players.push({id,attack,defense,speed,value:price})

data.budget-=price

localStorage.setItem("miniFootball",JSON.stringify(data))

loadGame()

}

function sellPlayer(id){

let data=JSON.parse(localStorage.getItem("miniFootball"))

let index=data.players.findIndex(p=>p.id===id)

let value=data.players[index].value

data.budget+=Math.round(value*0.6)

data.players.splice(index,1)

localStorage.setItem("miniFootball",JSON.stringify(data))

loadGame()

}

function resetGame(){

if(confirm("להתחיל מחדש?")){

localStorage.removeItem("miniFootball")

location.reload()

}

}

loadGame()

</script>

</body>

</html>
