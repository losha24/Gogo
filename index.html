<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Go-Go Football Manager</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
padding:20px;
}

.logo{
width:120px;
display:block;
margin:auto;
}

#players{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
margin-top:10px;
}

.player{
background:#334155;
padding:10px;
border-radius:8px;
width:140px;
box-shadow:0 2px 6px rgba(0,0,0,0.4);
}

.player b{
font-size:15px;
}

button{
padding:8px 14px;
margin:5px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.primary{
background:#22c55e;
color:white;
}

.danger{
background:#ef4444;
color:white;
}

.train-btn{
background:#3b82f6;
color:white;
}

#budget{
margin-top:10px;
font-weight:bold;
font-size:18px;
}

.green{color:#22c55e;}
.red{color:#ef4444;}

.table{
background:#1e293b;
padding:10px;
border-radius:8px;
max-width:420px;
margin:auto;
margin-top:10px;
display:none;
text-align:right;
}

.market-player{
background:#334155;
padding:8px;
border-radius:6px;
margin:5px;
width:150px;
}

#marketPlayers{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.match-box{
background:#1e293b;
padding:10px;
border-radius:8px;
max-width:420px;
margin:auto;
margin-top:10px;
text-align:right;
}

</style>
</head>

<body>

<img src="soccer_logo.png" class="logo">

<div id="setup">

<input id="teamName" placeholder="שם קבוצה">

<br><br>

<button class="primary" onclick="createTeam()">צור קבוצה</button>

</div>

<div id="game" style="display:none">

<h2 id="teamTitle"></h2>

<div id="players"></div>

<div id="budget"></div>

<h3>אימונים</h3>

<button class="train-btn" onclick="train('attack')">⚔️ התקפה</button>
<button class="train-btn" onclick="train('defense')">🛡️ הגנה</button>
<button class="train-btn" onclick="train('speed')">💨 מהירות</button>

<br><br>

<button class="primary" onclick="playMatch()">⚽ משחק שבועי</button>

<div id="matchResult"></div>

<br>

<button class="primary" onclick="toggleMarket()">שוק שחקנים</button>

<div id="market" class="table">

<button onclick="resetMarket()">איפוס שוק</button>

<div id="marketPlayers"></div>

</div>

<button class="primary" onclick="toggleTables()">טבלאות</button>

<div id="tablesContainer">

<div id="leagueTable" class="table"></div>

<div id="seasonTable" class="table"></div>

<div id="championshipTable" class="table"></div>

</div>

<br>

<button class="danger" onclick="resetGame()">איפוס משחק</button>

</div>

<script>

const names=[
"אורי","נועם","ליאם","איתן","רועי","דניאל","יואב",
"תומר","שחר","נדב","אופק","גיא","אלון","עידו",
"רן","עמית","אילון","בר","עומר"
]

function randomStat(){
return Math.floor(Math.random()*30)+1
}

function createTeam(){

let name=document.getElementById("teamName").value

if(!name)return alert("הכנס שם קבוצה")

let players=[]

for(let i=0;i<5;i++){

players.push({
id:i+1,
name:names[Math.floor(Math.random()*names.length)],
attack:randomStat(),
defense:randomStat(),
speed:randomStat(),
stars:{
attack:{y:Math.floor(Math.random()*3)+1,b:0,r:0},
defense:{y:Math.floor(Math.random()*3)+1,b:0,r:0},
speed:{y:Math.floor(Math.random()*3)+1,b:0,r:0}
}
})

}

const gameData={
teamName:name,
budget:100000,
players:players,
league:{played:0,won:0,draw:0,lost:0,points:0},
seasonsPlayed:0,
championships:0,
seasonHistory:[],
sponsor:null
}

localStorage.setItem("miniFootball",JSON.stringify(gameData))

loadGame()

}

function starsText(stars){

return "⭐".repeat(stars.y)+
"🔷".repeat(stars.b)+
"🟥".repeat(stars.r)

}

function renderPlayers(data){

const div=document.getElementById("players")

div.innerHTML=""

data.players.forEach((p,i)=>{

div.innerHTML+=`

<div class="player">

<b>${p.name}</b>

<br>

⚔️ ${starsText(p.stars.attack)}

<br>

🛡️ ${starsText(p.stars.defense)}

<br>

💨 ${starsText(p.stars.speed)}

<br>

<button class="danger" onclick="sellPlayer(${p.id})">מכור</button>

</div>

`

})

}

function loadGame(){

const data=JSON.parse(localStorage.getItem("miniFootball"))

if(!data)return

document.getElementById("setup").style.display="none"

document.getElementById("game").style.display="block"

document.getElementById("teamTitle").innerText=data.teamName

renderPlayers(data)

document.getElementById("budget").innerHTML=

`תקציב: <span class="${data.budget>=0?'green':'red'}">${data.budget}$</span>`

updateLeagueTable(data.league)

updateSeasonTable(data)

document.getElementById("championshipTable").innerText=
"אליפויות: "+data.championships

renderMarket()

}

function upgradeStars(obj){

obj.y++

if(obj.y>=3){
obj.y=0
obj.b++
}

if(obj.b>=3){
obj.b=0
obj.r++
}

}

function train(type){

let data=JSON.parse(localStorage.getItem("miniFootball"))

let cost=3000

if(data.budget<cost)return alert("אין כסף")

data.players.forEach(p=>{

upgradeStars(p.stars[type])

})

data.budget-=cost

localStorage.setItem("miniFootball",JSON.stringify(data))

loadGame()

}

function playMatch(){

let data=JSON.parse(localStorage.getItem("miniFootball"))

let playerScore=Math.floor(Math.random()*6)

let rivalScore=Math.floor(Math.random()*6)

data.league.played++

if(playerScore>rivalScore){
data.league.won++
data.league.points+=3
}

else if(playerScore===rivalScore){
data.league.draw++
data.league.points++
}

else{
data.league.lost++
}

let income=5000+Math.floor(Math.random()*5000)

let cost=1000+Math.floor(Math.random()*3000)

let bonus=0

if(data.league.played%5===0){
bonus=1000+Math.floor(Math.random()*20000)
}

data.budget+=income-cost+bonus

document.getElementById("matchResult").innerHTML=

`
<div class="match-box">

תוצאה: ${playerScore} - ${rivalScore}

<br>

הכנסות: ${income}$

<br>

עלות: ${cost}$

<br>

בונוס: ${bonus}$

</div>
`

if(data.league.played%10===0){

data.seasonsPlayed++

data.seasonHistory.push({...data.league})

data.league={played:0,won:0,draw:0,lost:0,points:0}

if(data.seasonsPlayed%5===0){
data.championships++
}

}

localStorage.setItem("miniFootball",JSON.stringify(data))

loadGame()

}

function sellPlayer(id){

let data=JSON.parse(localStorage.getItem("miniFootball"))

if(data.players.length<=5){
alert("חייבים לפחות 5 שחקנים")
return
}

let index=data.players.findIndex(p=>p.id===id)

data.players.splice(index,1)

data.players.forEach((p,i)=>p.id=i+1)

data.budget+=5000

localStorage.setItem("miniFootball",JSON.stringify(data))

loadGame()

}

function renderMarket(){

const div=document.getElementById("marketPlayers")

div.innerHTML=""

for(let i=0;i<5;i++){

let price=5000+Math.floor(Math.random()*20000)

div.innerHTML+=`

<div class="market-player">

שחקן

<br>

מחיר ${price}$

<br>

<button onclick="buyPlayer(${price})">קנה</button>

</div>

`

}

}

function buyPlayer(price){

let data=JSON.parse(localStorage.getItem("miniFootball"))

if(data.players.length>=15){
alert("מקסימום 15 שחקנים")
return
}

if(data.budget<price){
alert("אין כסף")
return
}

data.players.push({

id:data.players.length+1,
name:names[Math.floor(Math.random()*names.length)],
attack:randomStat(),
defense:randomStat(),
speed:randomStat(),
stars:{
attack:{y:1,b:0,r:0},
defense:{y:1,b:0,r:0},
speed:{y:1,b:0,r:0}
}

})

data.budget-=price

localStorage.setItem("miniFootball",JSON.stringify(data))

loadGame()

}

function toggleMarket(){

let m=document.getElementById("market")

m.style.display=m.style.display==="block"?"none":"block"

}

function resetMarket(){

renderMarket()

}

function toggleTables(){

document.querySelectorAll(".table").forEach(t=>{

t.style.display=t.style.display==="block"?"none":"block"

})

}

function updateLeagueTable(l){

document.getElementById("leagueTable").innerText=

`משחקים ${l.played} | ניצחונות ${l.won} | תיקו ${l.draw} | הפסדים ${l.lost} | נקודות ${l.points}`

}

function updateSeasonTable(data){

let html="היסטוריית עונות<br>"

data.seasonHistory.forEach((s,i)=>{

html+=`עונה ${i+1} נקודות ${s.points}<br>`

})

document.getElementById("seasonTable").innerHTML=html

}

function resetGame(){

if(confirm("למחוק הכל?")){

localStorage.removeItem("miniFootball")

location.reload()

}

}

loadGame()

</script>

</body>
</html>
