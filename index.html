<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go-Go Football Game</title>
<link rel="icon" type="image/png" sizes="192x192" href="soccer_logo.png">
<style>
body { font-family: Arial, sans-serif; background: #0f172a; color: white; text-align: center; margin: 0; padding: 20px; }
.logo { width:100px; margin: 10px auto; display:block; }
button { padding: 6px 12px; margin: 3px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size:14px; }
.primary { background: #22c55e; color: white; }
.danger { background: #ef4444; color: white; }
.train-btn { background: #3b82f6; color: white; display:flex; align-items:center; gap:5px; margin:2px; }
.train-row { display:flex; justify-content:center; flex-wrap:wrap; margin-bottom:10px; gap:5px; }
.player, .market-player { background: #334155; margin: 3px; padding: 6px; border-radius: 6px; font-size: 14px; max-width:150px; display:flex; justify-content:space-between; align-items:center; flex-direction:column; }
.player-stats { text-align:center; }
#budget { font-weight: bold; margin:10px auto; padding:5px; border-radius:6px; max-width:200px; display:block; border:2px solid #334155; font-size:16px; }
.green { color: #22c55e; }
.red { color: #ef4444; }
.bonus { color: #facc15; font-weight:bold; font-size:14px; }
.table { background:#1e293b; padding:8px; border-radius:8px; margin:8px auto; max-width:400px; text-align:right; display:none; font-size:14px; }
#market { display:none; margin-top:5px; }
.match-box { background:#1e293b; padding:8px; border-radius:8px; max-width:400px; margin:8px auto; text-align:right; }
.sponsor-box { background:#334155; padding:5px; margin:5px auto; border-radius:6px; max-width:200px; }
</style>
</head>
<body>

<img src="soccer_logo.png" alt="לוגו Go-Go" class="logo">

<div id="setup">
    <input type="text" id="teamName" placeholder="הכנס שם קבוצה">
    <br>
    <button class="primary" onclick="createTeam()">צור קבוצה</button>
</div>

<div id="game" style="display:none;">
    <h2 id="teamTitle"></h2>
    <div id="players" style="display:flex; justify-content:center; flex-wrap:wrap;"></div>
    <span id="budget"></span>

    <h3>אימונים ומשחקים</h3>
    <div class="train-row">
        <button class="train-btn" onclick="train('attack')">⚔️ התקפה</button>
        <button class="train-btn" onclick="train('defense')">🛡️ הגנה</button>
        <button class="train-btn" onclick="train('speed')">💨 מהירות</button>
        <button class="primary" onclick="toggleTables()">📊 טבלת משחקים</button>
    </div>

    <button class="primary" onclick="toggleMarket()">🛒 שוק שחקנים</button>
    <div id="market" class="table">
        <button class="danger" onclick="resetMarket()">איפוס שוק (1% מהתקציב)</button>
        <div id="marketPlayers"></div>
    </div>

    <button class="primary" onclick="toggleSponsors()">🤝 ספונסרים</button>
    <div id="sponsors" class="table">
        <div class="sponsor-box">
            <button class="primary" onclick="chooseSponsor('Nike')">Nike</button>
            <button class="primary" onclick="chooseSponsor('Adidas')">Adidas</button>
            <button class="primary" onclick="chooseSponsor('Puma')">Puma</button>
        </div>
    </div>

    <button class="primary" onclick="playMatch()">⚽ משחק שבועי</button>
    <div id="matchResult" class="match-box"></div>

    <div id="tablesContainer">
        <div id="leagueTable" class="table"></div>
        <div id="seasonTable" class="table"></div>
        <div id="championshipTable" class="table"></div>
    </div>

    <br>
    <button class="danger" onclick="resetGame()">איפוס משחק</button>

    <p style="margin-top:20px; font-size:12px;">© אלכסיי זבודיסקר</p>
</div>

<script>
// --- פונקציות בסיס ---
function randomStat(){ return Math.floor(Math.random()*30)+1; }

// כוכבים צבעוניים לפי רמות
function starsColored(val){ 
    let yellow=Math.floor(val/5); 
    let blue=Math.floor(yellow/5); 
    let red=Math.floor(blue/3); 
    yellow=yellow%5; 
    blue=blue%5; 
    return '🟥'.repeat(red)+'🔷'.repeat(blue)+'⭐'.repeat(yellow); 
}

// --- יצירת קבוצה ---
function createTeam(){
    const name=document.getElementById("teamName").value;
    if(!name) return alert("אנא הכנס שם קבוצה");

    let players=[];
    for(let i=1;i<=5;i++){
        let attack=Math.floor(Math.random()*3)+1;
        let defense=Math.floor(Math.random()*3)+1;
        let speed=Math.floor(Math.random()*3)+1;
        let value=Math.round((attack+defense+speed)*1000);
        players.push({id:i,attack,defense,speed,value,stars:{attack,defense,speed}});
    }

    const gameData={
        teamName:name,
        budget:100000,
        players:players,
        league:{played:0,won:0,draw:0,lost:0,points:0},
        seasonsPlayed:0,
        championships:0,
        seasonHistory:[],
        sponsor:null,
        trainMultiplier:{attack:1,defense:1,speed:1}
    };

    localStorage.setItem("miniFootball",JSON.stringify(gameData));
    loadGame();
}

// --- טעינת המשחק ---
function loadGame(){
    const data=JSON.parse(localStorage.getItem("miniFootball"));
    if(!data) return;
    document.getElementById("setup").style.display="none";
    document.getElementById("game").style.display="block";

    // שחקנים
    const playersDiv=document.getElementById("players");
    playersDiv.innerHTML="";
    data.players.forEach(p=>{
        playersDiv.innerHTML+=`
        <div class="player">
            <div class="player-stats">שחקן ${p.id}<br>⚔️ ${starsColored(p.attack)}<br>🛡️ ${starsColored(p.defense)}<br>💨 ${starsColored(p.speed)}<br>💰 $${p.value}</div>
            <button class="danger" onclick="sellPlayer(${p.id})">מכור</button>
        </div>`;
    });

    // תקציב
    const budgetSpan=document.getElementById("budget");
    budgetSpan.innerText="תקציב: $"+data.budget;
    budgetSpan.className=data.budget>=0?"green":"red";

    document.getElementById("teamTitle").innerText=data.teamName;
    updateLeagueTable(data.league);
    updateSeasonTable(data);
    document.getElementById("championshipTable").innerText=`אליפויות: ${data.championships}`;
    renderMarket();
}

// --- אימונים ---
function train(type){
    let data=JSON.parse(localStorage.getItem("miniFootball"));
    if(!data) return;
    let baseCost=3000*Math.ceil(data.trainMultiplier[type]);
    if(data.budget<baseCost) return alert("אין מספיק כסף לאימון!");
    data.players.forEach(p=>{
        p[type]=Math.min(p[type]+1,30);
        p.stars[type]=Math.floor(p[type]/5);
        p.value=Math.round((p.attack+p.defense+p.speed)*1000);
    });
    data.budget-=baseCost;
    data.trainMultiplier[type]+=0.2;
    localStorage.setItem("miniFootball",JSON.stringify(data));
    loadGame();
}

// --- יריב ---
function generateRival(week){
    let factor=1+week*0.05;
    let players=[];
    for(let i=1;i<=5;i++){
        players.push({attack:Math.min(randomStat()*factor,30),defense:Math.min(randomStat()*factor,30),speed:Math.min(randomStat()*factor,30)});
    }
    return players;
}

// --- משחק שבועי ---
function playMatch(){
    let data=JSON.parse(localStorage.getItem("miniFootball"));
    if(!data) return;
    let rival=generateRival(data.league.played);
    let playerPower={attack:0,defense:0,speed:0};
    let rivalPower={attack:0,defense:0,speed:0};
    data.players.forEach(p=>{playerPower.attack+=p.attack;playerPower.defense+=p.defense;playerPower.speed+=p.speed;});
    rival.forEach(p=>{rivalPower.attack+=p.attack;rivalPower.defense+=p.defense;rivalPower.speed+=p.speed;});

    function calcScore(a,d,f){ return Math.floor(Math.random()*(a*0.5+f*0.3-d*0.2)/10); }
    let playerScore=calcScore(playerPower.attack,rivalPower.defense,playerPower.speed);
    let rivalScore=calcScore(rivalPower.attack,playerPower.defense,rivalPower.speed);

    data.league.played++;
    let color="";
    if(playerScore>rivalScore){data.league.won++;data.league.points+=3;color="green";}
    else if(playerScore===rivalScore){data.league.draw++;color="blue";}
    else{data.league.lost++;color="red";}

    let matchCost=1000+Math.floor(Math.random()*4000);
    let income=5000+Math.floor(Math.random()*5000);
    let bonusMsg="";
    if(data.league.played%5===0){
        let bonus=Math.floor(Math.random()*24000)+1000;
        data.budget+=income-matchCost+bonus;
        bonusMsg=`<p class="bonus">🎉 בונוס: $${bonus} | תקציב כולל: $${data.budget}</p>`;
    } else { data.budget+=income-matchCost; }

    document.getElementById("matchResult").innerHTML=`
    <div class="match-box" style="color:${color}">
        <p>תוצאה: ${playerScore} - ${rivalScore}</p>
        <p>עלות: $${matchCost} | הכנסות: $${income}</p>
        ${bonusMsg}
    </div>`;

    if(data.league.played%10===0){
        data.seasonsPlayed++;
        data.seasonHistory.push({...data.league});
        alert(`📅 עונה הסתיימה! סה"כ עונות: ${data.seasonsPlayed}`);
        data.league={played:0,won:0,draw:0,lost:0,points:0};
        data.trainMultiplier={attack:1,defense:1,speed:1};
        if(data.seasonsPlayed%5===0){
            data.championships++;
            alert(`🏆 אליפות! מספר אליפויות: ${data.championships}`);
        }
    }
    localStorage.setItem("miniFootball",JSON.stringify(data));
    loadGame();
}

// --- טבלאות ---
function updateLeagueTable(league){ 
    document.getElementById("leagueTable").innerHTML=`
    <b>ליגה:</b><br>
    משחקים: ${league.played} | ניצחונות: ${league.won} | תיקו: ${league.draw} | הפסדים: ${league.lost} | נקודות: ${league.points}`;
}
function updateSeasonTable(data){ 
    let html="<b>היסטוריית עונות:</b><br>"; 
    data.seasonHistory.forEach((s,i)=>{ 
        html+=`עונה ${i+1}: ניצחונות ${s.won}, תיקו ${s.draw}, הפסדים ${s.lost}, נקודות ${s.points}<br>`; 
    }); 
    document.getElementById("seasonTable").innerHTML=html;
}
function toggleTables(){ const tables=document.querySelectorAll("#tablesContainer .table"); tables.forEach(t=>t.style.display=(t.style.display==="none"||t.style.display==="")?"block":"none"); }

// --- שוק ---
function toggleMarket(){ const market=document.getElementById("market"); market.style.display=(market.style.display==="none"||market.style.display==="")?"block":"none"; }
function resetMarket(){ let data=JSON.parse(localStorage.getItem("miniFootball")); data.budget=Math.round(data.budget*0.99); localStorage.setItem("miniFootball",JSON.stringify(data)); loadGame(); }
function renderMarket(){ const marketPlayers=document.getElementById("marketPlayers"); marketPlayers.innerHTML=""; for(let i=1;i<=5;i++){ let val=Math.floor(Math.random()*30000+5000); marketPlayers.innerHTML+=`<div class="market-player">שחקן ${i} | 💰 ${val} <button class="primary" onclick="buyPlayer(${val})">קנה</button></div>`; } }
function buyPlayer(value){ let data=JSON.parse(localStorage.getItem("miniFootball")); if(data.budget<value) return alert("אין מספיק כסף לקנייה!"); let id=data.players.length+1; let attack=Math.floor(Math.random()*3)+1; let defense=Math.floor(Math.random()*3)+1; let speed=Math.floor(Math.random()*3)+1; let player={id,attack,defense,speed,value,stars:{attack,defense,speed}}; data.players.push(player); data.budget-=value; localStorage.setItem("miniFootball",JSON.stringify(data)); loadGame(); }
function sellPlayer(id){ let data=JSON.parse(localStorage.getItem("miniFootball")); let index=data.players.findIndex(p=>p.id===id); if(index===-1)return; let player=data.players[index]; let sellValue=Math.round(player.value*0.5); data.budget+=sellValue; data.players.splice(index,1); localStorage.setItem("miniFootball",JSON.stringify(data)); loadGame(); }

// --- ספונסרים ---
function toggleSponsors(){ const sponsors=document.getElementById("sponsors"); sponsors.style.display=(sponsors.style.display==="none"||sponsors.style.display==="")?"block":"none"; }
function chooseSponsor(name){ let data=JSON.parse(localStorage.getItem("miniFootball")); if(data.sponsor) return alert("ניתן לבחור ספונסר רק פעם בעונה!"); data.sponsor=name; localStorage.setItem("miniFootball",JSON.stringify(data)); loadGame(); alert("בחרת ספונסר: "+name); }

// --- איפוס ---
function resetGame(){ if(confirm("למחוק את כל המשחק ולהתחיל מחדש?")){ localStorage.removeItem("miniFootball"); document.getElementById("setup").style.display="block"; document.getElementById("game").style.display="none"; document.getElementById("teamName").value=""; document.getElementById("players").innerHTML=""; document.getElementById("leagueTable").innerHTML=""; document.getElementById("seasonTable").innerHTML=""; document.getElementById("championshipTable").innerHTML=""; document.getElementById("matchResult").innerHTML=""; document.getElementById("market").style.display="none"; document.getElementById("sponsors").style.display="none"; } }

loadGame();
</script>
</body>
</html>
