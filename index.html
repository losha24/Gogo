<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Football Manager Lite</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
text-align:center;
}

header{
padding:20px;
font-size:26px;
font-weight:bold;
}

.logo{
width:80px;
display:block;
margin:auto;
margin-top:10px;
}

.buttons{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
margin:15px;
}

button{
padding:10px 16px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
font-size:14px;
}

button:hover{
background:#1d4ed8;
}

.team{
display:flex;
justify-content:center;
gap:15px;
margin-top:20px;
flex-wrap:wrap;
}

.player{
background:#1e293b;
padding:12px;
border-radius:10px;
width:120px;
}

.stars{
margin-top:6px;
}

.star{
color:gold;
font-size:18px;
}

.starNumber{
background:gold;
color:black;
border-radius:50%;
padding:4px 6px;
font-size:12px;
margin:2px;
}

.starBlue{
background:#3b82f6;
color:white;
border-radius:50%;
padding:4px 6px;
font-size:12px;
margin:2px;
}

.budget{
margin-top:25px;
font-size:20px;
background:#111827;
padding:12px;
border-radius:10px;
width:220px;
margin-left:auto;
margin-right:auto;
}

table{
margin:auto;
margin-top:20px;
border-collapse:collapse;
width:90%;
}

th,td{
border:1px solid #334155;
padding:8px;
}

th{
background:#1e293b;
}

.section{
display:none;
}

.active{
display:block;
}

</style>

</head>

<body>

<header>

Football Manager

<img src="logo.png" class="logo">

</header>

<div class="buttons">

<button onclick="openSection('team')">הקבוצה שלי</button>

<button onclick="openSection('market')">שוק שחקנים</button>

<button onclick="refreshMarket()">רענון שוק</button>

<button onclick="openSection('matches')">טבלת משחקים</button>

<button onclick="openSection('league')">טבלת ליגה</button>

</div>


<div id="team" class="section active">

<div class="team" id="players"></div>

<div class="budget" id="budget">
תקציב: 1000
</div>

</div>


<div id="market" class="section">

<h2>שוק שחקנים</h2>

<div id="marketPlayers"></div>

<br>

<button onclick="goBack()">חזרה</button>

</div>


<div id="matches" class="section">

<h2>תוצאות משחקים</h2>

<table>

<thead>
<tr>
<th>משחק</th>
<th>תוצאה</th>
<th>שערים</th>
</tr>
</thead>

<tbody id="matchTable"></tbody>

</table>

<button onclick="goBack()">חזרה</button>

</div>



<div id="league" class="section">

<h2>טבלת ליגה</h2>

<table>

<thead>
<tr>
<th>קבוצה</th>
<th>נק'</th>
<th>ניצחונות</th>
<th>הפסדים</th>
</tr>
</thead>

<tbody id="leagueTable"></tbody>

</table>

<button onclick="goBack()">חזרה</button>

</div>



<script>

let budget = 1000

const players = [
{name:"שחקן 1",stars:1},
{name:"שחקן 2",stars:2},
{name:"שחקן 3",stars:3},
{name:"שחקן 4",stars:4},
{name:"שחקן 5",stars:5}
]


function openSection(id){

document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

}


function goBack(){

openSection("team")

}



function renderPlayers(){

const div = document.getElementById("players")

div.innerHTML=""

players.forEach(p=>{

let starsHTML = buildStars(p.stars)

div.innerHTML+=`

<div class="player">

${p.name}

<div class="stars">${starsHTML}</div>

</div>

`

})

}



function buildStars(count){

let html=""

let normal = count % 5

let big = Math.floor(count/5)

for(let i=0;i<big;i++){

html+=`<span class="starNumber">1</span>`

}

for(let i=0;i<normal;i++){

html+=`<span class="star">★</span>`

}

return html

}



function refreshMarket(){

alert("השוק התרענן")

}



function generateMatches(){

const table = document.getElementById("matchTable")

for(let i=1;i<=10;i++){

let g1 = Math.floor(Math.random()*5)

let g2 = Math.floor(Math.random()*5)

let result = g1>g2?"ניצחון":g1<g2?"הפסד":"תיקו"

table.innerHTML+=`

<tr>

<td>${i}</td>

<td>${result}</td>

<td>${g1} - ${g2}</td>

</tr>

`

}

}



function generateLeague(){

const table = document.getElementById("leagueTable")

const teams = ["שלי","AI 1","AI 2","AI 3","AI 4"]

teams.forEach(t=>{

table.innerHTML+=`

<tr>

<td>${t}</td>

<td>${Math.floor(Math.random()*30)}</td>

<td>${Math.floor(Math.random()*10)}</td>

<td>${Math.floor(Math.random()*10)}</td>

</tr>

`

})

}



renderPlayers()

generateMatches()

generateLeague()

</script>


</body>
</html>
