<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go-Go Football Game v7.3.2</title>
<style>
    body { font-family: Arial, sans-serif; background: #0f172a; color: white; text-align: center; margin: 0; padding: 20px; }
    .logo { width:120px; margin: 10px auto; display:block; }
    .team-name { font-size:18px; margin: 5px 0 15px 0; font-weight:bold; color:#22c55e; }
    button { padding: 8px 16px; margin: 5px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .primary { background: #22c55e; color: white; }
    .danger { background: #ef4444; color: white; }
    .train-btn { background: #3b82f6; color: white; display:flex; align-items:center; gap:5px; margin:5px; }
    .train-row { display:flex; justify-content:center; flex-wrap:wrap; margin-bottom:10px; gap:5px; }
    .player, .market-player { background: #334155; margin: 5px; padding: 8px; border-radius: 6px; font-size: 14px; display:flex; flex-direction:column; align-items:center; width: 140px; }
    #budget { font-weight: bold; margin:10px auto; padding:5px; border-radius:6px; max-width:400px; display:block; border:2px solid #334155; font-size:16px; }
    .green { color: #22c55e; } .red { color: #ef4444; } .bonus { color: #facc15; font-weight:bold; font-size:16px; }
    .table { background:#1e293b; padding:10px; border-radius:8px; margin:10px auto; max-width:400px; text-align:right; display:none; }
    .match-box { background:#1e293b; padding:10px; border-radius:8px; max-width:400px; margin:10px auto; text-align:right; border-right: 4px solid #3b82f6; }
    .flex-row { display:flex; justify-content:center; flex-wrap:wrap; gap:5px; }
</style>
</head>
<body>

<img src="soccer_logo.png" alt="לוגו Go-Go" class="logo">
<div class="team-name" id="teamTitle"></div>

<div id="setup">
    <input type="text" id="teamName" placeholder="הכנס שם קבוצה" style="padding:8px; border-radius:4px;">
    <br><br>
    <button class="primary" onclick="createTeam()">צור קבוצה</button>
</div>

<div id="game" style="display:none;">
    <div id="players" class="flex-row"></div>
    <span id="budget"></span>

    <h3>אימונים ומשחקים</h3>
    <div class="train-row">
        <button class="train-btn" onclick="train('attack')">⚔️ התקפה</button>
        <button class="train-btn" onclick="train('defense')">🛡️ הגנה</button>
        <button class="train-btn" onclick="train('speed')">💨 מהירות</button>
        <button class="primary" onclick="toggleTables()">📊 טבלאות</button>
    </div>

    <button class="primary" onclick="toggleMarket()">🛒 שוק שחקנים</button>
    <div id="market" class="table">
        <button class="danger" style="font-size:10px;" onclick="resetMarket()">ריענון שוק (1% מהתקציב)</button>
        <div id="marketPlayers" class="flex-row"></div>
    </div>

    <button class="primary" style="font-size:1.1em;" onclick="playMatch()">⚽ משחק שבועי</button>
    <div id="matchResult"></div>

    <div id="tablesContainer">
        <div id="leagueTable" class="table"></div>
        <div id="seasonTable" class="table"></div>
        <div id="championshipTable" class="table" style="display:block; background:none; border:none; text-align:center;"></div>
    </div>

    <br>
    <button class="danger" style="opacity:0.3" onclick="resetGame()">איפוס משחק</button>
    <p style="margin-top:20px; font-size:12px;">© אלכסיי זבודיסקר | גרסה 7.3.2</p>
</div>

<script>
// --- לוגיקת כוכבים (צהוב -> כחול -> אדום -> גביע) ---
function starsColored(points) {
    if (points >= 27) return "🏆 MAX"; // רמה מקסימלית (9*3)
    let reds = Math.floor(points / 9);
    let blues = Math.floor((points % 9) / 3);
    let yellows = points % 3;
    return '🟥'.repeat(reds) + '🔷'.repeat(blues) + '⭐'.repeat(yellows);
}

// --- יצירת קבוצה ---
function createTeam(){
    const name = document.getElementById("teamName").value;
    if(!name) return alert("אנא הכנס שם קבוצה");
    
    let players = [];
    for(let i=1; i<=5; i++){
        players.push({
            id: i,
            attack: 10, defense: 10, speed: 10,
            training: { attack: 0, defense: 0, speed: 0 },
            value: 30000
        });
    }

    const gameData = {
        teamName: name, budget: 100000, players: players,
        league: { played:0, won:0, draw:0, lost:0, points:0 },
        seasonsPlayed: 0, championships: 0, seasonHistory: [],
        trainMultiplier: { attack:1, defense:1, speed:1 }
    };
    localStorage.setItem("miniFootball_Final", JSON.stringify(gameData));
    loadGame();
}

function loadGame(){
    const data = JSON.parse(localStorage.getItem("miniFootball_Final"));
    if(!data) return;

    document.getElementById("setup").style.display="none";
    document.getElementById("game").style.display="block";
    document.getElementById("teamTitle").innerText = data.teamName;

    // רנדור שחקנים
    const playersDiv = document.getElementById("players");
    playersDiv.innerHTML = "";
    data.players.forEach(p => {
        playersDiv.innerHTML += `
            <div class="player">
                <b>שחקן ${p.id}</b>
                <div style="text-align:center; font-size:12px; margin:5px 0;">
                    ⚔️ ${starsColored(p.training.attack)}<br>
                    🛡️ ${starsColored(p.training.defense)}<br>
                    💨 ${starsColored(p.training.speed)}
                </div>
                <span class="green">$${p.value.toLocaleString()}</span>
                <button class="danger" style="font-size:10px; padding:2px 5px; margin-top:5px;" onclick="sellPlayer(${p.id})">מכור</button>
            </div>`;
    });

    document.getElementById("budget").innerText = "תקציב: $" + data.budget.toLocaleString();
    document.getElementById("championshipTable").innerText = `🏆 אליפויות: ${data.championships}`;
    
    updateLeagueTable(data.league);
    updateSeasonTable(data);
    renderMarket();
}

// --- אימון ---
function train(type){ 
    let data = JSON.parse(localStorage.getItem("miniFootball_Final"));
    let cost = Math.floor(3000 * data.trainMultiplier[type]);
    if(data.budget < cost) return alert("אין מספיק כסף לאימון!");

    data.players.forEach(p => {
        if(p.training[type] < 27) { // הגבלת מקסימום
            p.training[type]++;
            p[type] += 2;
            p.value += 1500;
        }
    });

    data.budget -= cost;
    data.trainMultiplier[type] += 0.2;
    localStorage.setItem("miniFootball_Final", JSON.stringify(data));
    loadGame();
}

// --- שוק שחקנים ---
function renderMarket(){
    const mDiv = document.getElementById("marketPlayers");
    mDiv.innerHTML = "";
    for(let i=0; i<3; i++) {
        let val = Math.floor(Math.random()*30000+10000);
        mDiv.innerHTML += `
            <div class="market-player">
                שחקן חדש<br>💰 $${val.toLocaleString()}
                <button class="primary" onclick="buyPlayer(${val})">קנה</button>
            </div>`;
    }
}

function buyPlayer(val){
    let data = JSON.parse(localStorage.getItem("miniFootball_Final"));
    if(data.budget < val) return alert("חסר תקציב!");
    if(data.players.length >= 11) return alert("סגל מלא!");

    data.players.push({
        id: data.players.length + 1,
        attack: 15, defense: 15, speed: 15,
        training: { attack: 1, defense: 1, speed: 1 },
        value: val
    });
    data.budget -= val;
    localStorage.setItem("miniFootball_Final", JSON.stringify(data));
    loadGame();
}

function sellPlayer(id){
    let data = JSON.parse(localStorage.getItem("miniFootball_Final"));
    if(data.players.length <= 5) return alert("חייבים 5 שחקנים!");
    let idx = data.players.findIndex(p => p.id === id);
    data.budget += Math.floor(data.players[idx].value * 0.5);
    data.players.splice(idx, 1);
    data.players.forEach((p, i) => p.id = i + 1); // סידור מספרים
    localStorage.setItem("miniFootball_Final", JSON.stringify(data));
    loadGame();
}

// --- משחק ---
function playMatch(){
    let data = JSON.parse(localStorage.getItem("miniFootball_Final"));
    let myPower = data.players.reduce((a,b) => a + (b.attack+b.defense+b.speed), 0) / data.players.length;
    let rPower = 35 + (data.league.played * 4);

    let pScore = Math.max(0, Math.floor(Math.random() * (myPower/12)));
    let rScore = Math.max(0, Math.floor(Math.random() * (rPower/12)));

    data.league.played++;
    if(pScore > rScore) { data.league.won++; data.league.points += 3; }
    else if(pScore === rScore) { data.league.draw++; data.league.points += 1; }
    else { data.league.lost++; }

    // כלכלה מקורית (עלות מול הכנסה)
    let matchCost = 2000 + Math.floor(Math.random()*2000);
    let income = 6000 + Math.floor(Math.random()*4000);
    let bonusMsg = "";

    // בונוס כל 5 משחקים כפי שהיה במקור
    if(data.league.played % 5 === 0){
        let bonus = Math.floor(Math.random()*15000+5000);
        data.budget += bonus;
        bonusMsg = `<p class="bonus">🎉 מענק ספונסר: $${bonus.toLocaleString()}</p>`;
    }

    data.budget += (income - matchCost);

    document.getElementById("matchResult").innerHTML = `
        <div class="match-box" style="color:${pScore>=rScore?'#22c55e':'#ef4444'}">
            <b>תוצאה: ${pScore} - ${rScore}</b><br>
            <small>הכנסה: $${income} | הוצאות: $${matchCost}</small>
            ${bonusMsg}
        </div>`;

    // סיום עונה (10 משחקים)
    if(data.league.played >= 10){
        data.seasonsPlayed++;
        data.seasonHistory.push({...data.league});
        if(data.league.points >= 22) data.championships++; // אליפות אם צבר מספיק נקודות
        alert(`📅 עונה ${data.seasonsPlayed} הסתיימה!`);
        data.league = { played:0, won:0, draw:0, lost:0, points:0 };
        data.trainMultiplier = { attack:1, defense:1, speed:1 }; // איפוס עלויות אימון בעונה חדשה
    }

    localStorage.setItem("miniFootball_Final", JSON.stringify(data));
    loadGame();
}

function updateLeagueTable(l){
    document.getElementById("leagueTable").innerHTML = `
        <b>ליגה נוכחית:</b><br>
        משחקים: ${l.played} | נצ': ${l.won} | תיקו: ${l.draw} | הפס': ${l.lost}<br>
        נקודות: ${l.points}`;
}

function updateSeasonTable(data){
    let h = "<b>היסטוריית עונות:</b><br>";
    data.seasonHistory.forEach((s, i) => {
        h += `עונה ${i+1}: ${s.points} נק' (${s.won}-${s.draw}-${s.lost})<br>`;
    });
    document.getElementById("seasonTable").innerHTML = h;
}

function toggleTables(){ 
    const container = document.getElementById("tablesContainer");
    const tables = container.querySelectorAll(".table");
    tables.forEach(t => t.style.display = (t.style.display==="none" || !t.style.display) ? "block" : "none");
}

function toggleMarket(){ 
    const m = document.getElementById("market");
    m.style.display = (m.style.display==="none" || !m.style.display) ? "block" : "none";
}

function resetMarket(){ 
    let data = JSON.parse(localStorage.getItem("miniFootball_Final"));
    data.budget *= 0.99;
    localStorage.setItem("miniFootball_Final", JSON.stringify(data));
    renderMarket(); loadGame();
}

function resetGame(){ if(confirm("למחוק הכל?")) { localStorage.clear(); location.reload(); } }

loadGame();
</script>
</body>
</html>
