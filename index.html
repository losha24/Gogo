<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Go-Go Manager</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

button{
padding:8px 14px;
margin:4px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.primary{background:#22c55e;color:white}
.train{background:#3b82f6;color:white}
.sell{background:#ef4444;color:white}

.players{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:6px;
max-width:520px;
margin:auto;
}

.card{
background:#1e293b;
padding:6px;
border-radius:8px;
font-size:12px;
}

.table{
background:#1e293b;
padding:10px;
border-radius:8px;
margin:10px auto;
max-width:420px;
}

.starY{color:#facc15}
.starB{color:#38bdf8}

.market{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
max-width:520px;
margin:auto;
}

footer{
margin-top:30px;
font-size:12px;
opacity:0.7;
}

</style>
</head>

<body>

<h1>⚽ Go-Go Manager</h1>

<div id="setup">

<input id="teamName" placeholder="שם קבוצה">

<br><br>

<button class="primary" onclick="createTeam()">צור קבוצה</button>

</div>

<div id="game" style="display:none">

<h2 id="teamTitle"></h2>

<p>תקציב: $<span id="budget"></span></p>

<h3>שחקנים</h3>

<div id="players" class="players"></div>

<h3>אימונים</h3>

<button class="train" onclick="train('attack')">⚔ התקפה</button>
<button class="train" onclick="train('defense')">🛡 הגנה</button>
<button class="train" onclick="train('fitness')">❤️ כושר</button>

<br><br>

<button class="primary" onclick="playMatch()">⚽ משחק שבועי</button>

<div id="matchResult"></div>

<div id="leagueTable" class="table"></div>

<div id="seasonTable" class="table"></div>

<div id="champTable" class="table"></div>

<h3>שוק שחקנים</h3>

<div id="market" class="market"></div>

<button onclick="generateMarket()">🔄 רענן שוק</button>

<br><br>

<button onclick="resetGame()">איפוס משחק</button>

</div>

<footer>

© Alexsei Zavodisker

</footer>

<script>

function randomStat(){
return Math.floor(Math.random()*100)
}

function stars(val){

let yellow=Math.floor(val/10)

let blue=Math.floor(yellow/10)

yellow=yellow%10

let html=""

for(let i=0;i<blue;i++){
html+="<span class='starB'>🔵</span>"
}

for(let i=0;i<yellow;i++){
html+="<span class='starY'>⭐</span>"
}

return html
}

function playerValue(p){
return Math.round((p.attack+p.defense+p.fitness)*1000)
}

function createTeam(){

let name=teamName.value

let players=[]

for(let i=1;i<=11;i++){

players.push({
id:i,
attack:randomStat(),
defense:randomStat(),
fitness:randomStat()
})

}

let data={
teamName:name,
budget:100000,
players:players,
league:{played:0,won:0,draw:0,lost:0,points:0},
seasons:0,
championships:0
}

localStorage.setItem("gogo",JSON.stringify(data))

generateMarket()

loadGame()

}

function loadGame(){

let data=JSON.parse(localStorage.getItem("gogo"))
if(!data)return

setup.style.display="none"
game.style.display="block"

teamTitle.innerText=data.teamName

budget.innerText=Math.round(data.budget)

drawPlayers(data)

updateTables(data)

}

function drawPlayers(data){

players.innerHTML=""

data.players.forEach((p,index)=>{

players.innerHTML+=`

<div class="card">

שחקן ${index+1}

<br>

⚔ ${stars(p.attack)}

<br>

🛡 ${stars(p.defense)}

<br>

❤️ ${stars(p.fitness)}

<br>

$${playerValue(p)}

<br>

<button class="sell" onclick="sellPlayer(${index})">מכור</button>

</div>

`

})

}

function sellPlayer(i){

let data=JSON.parse(localStorage.getItem("gogo"))

let value=playerValue(data.players[i])

data.budget+=value*0.8

data.players.splice(i,1)

localStorage.setItem("gogo",JSON.stringify(data))

loadGame()

}

function train(type){

let data=JSON.parse(localStorage.getItem("gogo"))

let cost=3000

if(data.budget<cost)return

data.players.forEach(p=>{

let inc=Math.random()*5

if(type=="attack")p.attack+=inc
if(type=="defense")p.defense+=inc
if(type=="fitness")p.fitness+=inc

})

data.budget-=cost

localStorage.setItem("gogo",JSON.stringify(data))

loadGame()

}

function rival(level){

let arr=[]

for(let i=1;i<=11;i++){

arr.push({
attack:randomStat()+level*5,
defense:randomStat()+level*5,
fitness:randomStat()+level*5
})

}

return arr

}

function power(players){

let total=0

players.forEach(p=>{
total+=p.attack+p.defense+p.fitness
})

return total

}

function playMatch(){

let data=JSON.parse(localStorage.getItem("gogo"))

let rivalTeam=rival(data.league.played)

let ps=Math.floor(Math.random()*5*(power(data.players)/400))

let rs=Math.floor(Math.random()*5*(power(rivalTeam)/400))

data.league.played++

if(ps>rs){
data.league.won++
data.league.points+=3
}
else if(ps==rs){
data.league.draw++
data.league.points++
}
else{
data.league.lost++
}

let income=5000+Math.random()*5000
let cost=1000+Math.random()*3000

data.budget+=income-cost

let msg=`תוצאה ${ps}-${rs}`

if(data.league.played%5==0){

let bonus=20000

data.budget+=bonus

msg+=`<br>🎁 בונוס $${bonus}`

}

matchResult.innerHTML=msg

if(data.league.played==10){

data.seasons++

data.league={played:0,won:0,draw:0,lost:0,points:0}

if(data.seasons%5==0){
data.championships++
alert("🏆 אליפות!")
}

}

localStorage.setItem("gogo",JSON.stringify(data))

loadGame()

}

function updateTables(data){

leagueTable.innerHTML=
`ליגה<br>
משחקים ${data.league.played} |
ניצחונות ${data.league.won} |
תיקו ${data.league.draw} |
הפסדים ${data.league.lost} |
נקודות ${data.league.points}`

seasonTable.innerHTML=`עונות: ${data.seasons}`

champTable.innerHTML=`אליפויות: ${data.championships}`

}

function generateMarket(){

let marketPlayers=[]

for(let i=0;i<3;i++){

marketPlayers.push({
attack:randomStat(),
defense:randomStat(),
fitness:randomStat()
})

}

localStorage.setItem("market",JSON.stringify(marketPlayers))

drawMarket()

}

function drawMarket(){

let data=JSON.parse(localStorage.getItem("gogo"))
let marketPlayers=JSON.parse(localStorage.getItem("market"))

market.innerHTML=""

marketPlayers.forEach((p,i)=>{

let price=playerValue(p)

market.innerHTML+=`

<div class="card">

⚔ ${stars(p.attack)}

<br>

🛡 ${stars(p.defense)}

<br>

❤️ ${stars(p.fitness)}

<br>

$${price}

<br>

<button onclick="buyPlayer(${i})">קנה</button>

</div>

`

})

}

function buyPlayer(i){

let data=JSON.parse(localStorage.getItem("gogo"))
let marketPlayers=JSON.parse(localStorage.getItem("market"))

let p=marketPlayers[i]

let price=playerValue(p)

if(data.budget<price){
alert("אין מספיק כסף")
return
}

if(data.players.length>=18){
alert("הסגל מלא")
return
}

data.players.push(p)

data.budget-=price

marketPlayers.splice(i,1)

localStorage.setItem("market",JSON.stringify(marketPlayers))
localStorage.setItem("gogo",JSON.stringify(data))

loadGame()
drawMarket()

}

function resetGame(){

localStorage.clear()

location.reload()

}

loadGame()

if(localStorage.getItem("market")==null){
generateMarket()
}

drawMarket()

</script>

</body>
</html>
