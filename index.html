<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Football Manager</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
text-align:center;
display:flex;
justify-content:center;
}

.wrapper{
max-width:1100px;
width:100%;
padding:20px;
}

.logo{
width:100px;
display:block;
margin:auto;
margin-bottom:20px;
}

.players{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:12px;
margin-top:20px;
}

.player{
background:#1e293b;
border-radius:10px;
padding:10px;
box-shadow:0 0 10px rgba(0,0,0,0.4);
}

.stat{
font-size:14px;
margin:3px;
}

.controls{
margin-top:20px;
}

button{
background:#2563eb;
border:none;
padding:8px 12px;
border-radius:6px;
color:white;
margin:4px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.budget{
background:#111827;
padding:10px;
border-radius:10px;
font-size:20px;
margin-top:20px;
display:inline-block;
}

.result{
margin-top:20px;
background:#111827;
padding:10px;
border-radius:10px;
}

.market{
display:none;
margin-top:20px;
background:#111827;
padding:15px;
border-radius:10px;
}

input{
padding:8px;
border-radius:6px;
border:none;
margin:10px;
}

footer{
margin-top:30px;
opacity:0.6;
}

</style>

</head>

<body>

<div class="wrapper">

<img src="soccer_logo.png" class="logo">

<div id="setup">

<input id="teamName" placeholder="שם קבוצה">

<br>

<button onclick="createTeam()">צור קבוצה</button>

</div>

<div id="game" style="display:none">

<div class="players" id="players"></div>

<div class="budget">
תקציב ₪ <span id="money"></span>
</div>

<div class="controls">

<button onclick="train('attack')">⚔ התקפה</button>
<button onclick="train('defense')">🛡 הגנה</button>
<button onclick="train('fitness')">⚡ מהירות</button>

<button onclick="playMatch()">⚽ משחק שבועי</button>

<button onclick="toggleMarket()">🛒 שוק שחקנים</button>

<button onclick="resetGame()">איפוס משחק</button>

</div>

<div id="result" class="result"></div>

<div id="market" class="market"></div>

<footer>
© אלכסיי זבודיסקר
</footer>

</div>

</div>

<script>

let game

function starSystem(points){

let yellow=Math.floor(points/10)
let blue=Math.floor(yellow/10)

yellow=yellow%10

let stars=""

for(let i=0;i<yellow;i++) stars+="⭐"

if(blue>0) stars+=" 🔵"+blue

return stars

}

function randomPlayer(){

return{
attack:10+Math.floor(Math.random()*20),
defense:10+Math.floor(Math.random()*20),
fitness:10+Math.floor(Math.random()*20)
}

}

function createTeam(){

let name=document.getElementById("teamName").value

if(!name)return alert("הכנס שם קבוצה")

game={
name:name,
money:100000,
players:[],
games:0,
wins:0,
draws:0,
losses:0,
points:0,
trainCost:1000
}

for(let i=0;i<11;i++){
game.players.push(randomPlayer())
}

save()
load()

}

function save(){
localStorage.setItem("soccerGame",JSON.stringify(game))
}

function load(){

let saveData=localStorage.getItem("soccerGame")

if(!saveData)return

game=JSON.parse(saveData)

document.getElementById("setup").style.display="none"
document.getElementById("game").style.display="block"

render()

}

function render(){

document.getElementById("money").innerText=game.money

let html=""

game.players.forEach((p,i)=>{

html+=`

<div class="player">

<div class="stat">שחקן ${i+1}</div>

<div class="stat">⚔ ${starSystem(p.attack)}</div>
<div class="stat">🛡 ${starSystem(p.defense)}</div>
<div class="stat">⚡ ${starSystem(p.fitness)}</div>

<button onclick="sell(${i})">מכור</button>

</div>

`

})

document.getElementById("players").innerHTML=html

save()

}

function train(type){

if(game.money<game.trainCost)return

game.money-=game.trainCost
game.trainCost+=500

game.players.forEach(p=>{
p[type]+=2
})

render()

}

function playMatch(){

let power=0

game.players.forEach(p=>{
power+=p.attack+p.defense+p.fitness
})

let enemy=300+Math.random()*200

let goals=Math.floor(power/120+Math.random()*3)
let enemyGoals=Math.floor(enemy/120+Math.random()*3)

let income=4000+Math.floor(Math.random()*4000)

game.money+=income

let result=""

if(goals>enemyGoals){
result="ניצחון"
game.wins++
game.points+=3
}
else if(goals==enemyGoals){
result="תיקו"
game.draws++
game.points++
}
else{
result="הפסד"
game.losses++
}

game.games++

if(game.games%5==0){
game.money+=10000
}

document.getElementById("result").innerHTML=

`
תוצאה ${goals} - ${enemyGoals}<br>
${result}<br>
הכנסה ₪${income}
`

render()

}

function toggleMarket(){

let m=document.getElementById("market")

if(m.style.display=="block"){
m.style.display="none"
return
}

let html="<h3>שוק שחקנים</h3>"

for(let i=0;i<5;i++){

let p=randomPlayer()

let value=(p.attack+p.defense+p.fitness)*120

html+=`

<div>

⚔ ${p.attack} 🛡 ${p.defense} ⚡ ${p.fitness}

<button onclick='buy(${JSON.stringify(p)},${value})'>
קנה ₪${value}
</button>

</div>

`

}

m.innerHTML=html
m.style.display="block"

}

function buy(p,price){

if(game.money<price)return

game.money-=price

game.players.push(p)

render()

}

function sell(i){

let p=game.players[i]

let price=(p.attack+p.defense+p.fitness)*80

game.money+=price

game.players.splice(i,1)

render()

}

function resetGame(){

if(!confirm("לאפס משחק?"))return

localStorage.removeItem("soccerGame")

location.reload()

}

load()

</script>

</body>

</html>
