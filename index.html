<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>O-Kar Custom Blades | V3.7.0</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="logo.png">
</head>
<body onload="initApp()">

<header class="main-header shadow">
    <div class="header-right" onclick="goHome()">
        <img src="logo.png" alt="Logo" class="main-logo">
    </div>
    <div class="header-controls">
        <button class="nav-btn home-btn" onclick="goHome()">🏠</button>
        <button id="pwaBtn" class="nav-btn pwa-status">התקנה</button>
        <button class="nav-btn" onclick="location.reload(true)">🔄</button>
        <button class="nav-btn" onclick="exportData()">💾</button>
        <label class="nav-btn">📂<input type="file" id="fileIn" accept=".json" onchange="importData(event)" style="display:none;"></label>
    </div>
</header>

<div class="container">
    <button class="big-add-btn shadow" onclick="toggleForm()">
        <span>➕</span> הוספת מוצר חדש
    </button>

    <div id="formModal" class="full-modal" style="display:none;">
        <div class="form-header-bar">
            <button class="back-btn" onclick="goHome()">➜ ביטול</button>
            <h2 id="formTitle">פרטי מוצר</h2>
        </div>
        <div class="form-content-wrapper">
            <div class="form-body">
                <input type="hidden" id="editId">
                <div class="input-group"><label>שם הדגם</label><input type="text" id="name"></div>
                <div class="input-group"><label>מחיר (₪)</label><input type="number" id="price"></div>
                <div class="input-group"><label>חומרים</label><input type="text" id="mat"></div>
                <div class="input-group"><label>תיאור</label><textarea id="desc" rows="3"></textarea></div>
                
                <div class="file-area shadow">
                    <p>📸 תמונות (עד 3)</p>
                    <input type="file" id="imgs" multiple accept="image/*" onchange="checkFileLimit(this)">
                </div>

                <button id="saveBtn" class="btn-save-final shadow" onclick="save()">שמור מוצר</button>
                <button id="deleteBtn" class="btn-delete" style="display:none;" onclick="deleteProduct()">🗑️ מחק מוצר</button>
            </div>
        </div>
    </div>

    <div id="list" class="grid-container"></div>
</div>

<div id="viewModal" class="full-modal" style="display:none;">
    <span class="close-view" onclick="closeView()">&times;</span>
    <div id="modalContent"></div>
</div>

<div id="installGuide" class="modal-overlay" onclick="this.style.display='none'" style="display:none;">
    <div class="guide-box shadow" onclick="event.stopPropagation()">
        <h3>התקנת אפליקציה</h3>
        <p>לחץ על שלוש הנקודות בדפדפן ובחר "הוספה למסך הבית".</p>
        <button class="btn-save-final" onclick="document.getElementById('installGuide').style.display='none'">הבנתי</button>
    </div>
</div>

<footer>O-KAR Custom Blades | V3.7.0</footer>

<script>
    const DB_NAME = 'okar_database_final';
    let db = [];
    let deferredPrompt;

    function initApp() {
        const saved = localStorage.getItem(DB_NAME);
        if (saved) db = JSON.parse(saved);
        render();
        setupPWA();
    }

    function setupPWA() {
        const pwaBtn = document.getElementById('pwaBtn');
        if (window.matchMedia('(display-mode: standalone)').matches) {
            pwaBtn.style.backgroundColor = "#4caf50";
            pwaBtn.innerText = "מותקן ✅";
        }
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            pwaBtn.style.backgroundColor = "#007bff";
            pwaBtn.style.color = "white";
        });
    }

    document.getElementById('pwaBtn').addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') document.getElementById('pwaBtn').innerText = "מותקן ✅";
            deferredPrompt = null;
        } else {
            document.getElementById('installGuide').style.display = 'flex';
        }
    });

    function checkFileLimit(input) {
        if (input.files.length > 3) {
            alert("עד 3 תמונות בלבד.");
            input.value = "";
        }
    }

    async function save() {
        const n = document.getElementById('name').value;
        const p = document.getElementById('price').value;
        const id = document.getElementById('editId').value;
        if(!n || !p) return alert("שם ומחיר הם חובה");

        const btn = document.getElementById('saveBtn');
        btn.disabled = true;
        btn.innerText = "מעבד...";

        const files = Array.from(document.getElementById('imgs').files).slice(0, 3);
        let images = [];

        try {
            if (files.length > 0) {
                images = await Promise.all(files.map(f => new Promise((res, rej) => {
                    const r = new FileReader();
                    r.onload = e => res(e.target.result);
                    r.onerror = rej;
                    r.readAsDataURL(f);
                })));
            }
        } catch (e) { console.error("Image load failed", e); }

        const item = {
            id: id ? Number(id) : Date.now(),
            n, p, 
            m: document.getElementById('mat').value,
            d: document.getElementById('desc').value,
            images: images.length > 0 ? images : (id ? db.find(x=>x.id==id).images : ["https://via.placeholder.com/400?text=O-KAR"]),
            sold: id ? db.find(x=>x.id==id).sold : false
        };

        if(id) {
            db[db.findIndex(x=>x.id==id)] = item;
        } else {
            db.unshift(item);
        }

        updateDB();
        btn.disabled = false;
        btn.innerText = "שמור מוצר";
        goHome();
    }

    function render() {
        const list = document.getElementById('list');
        list.innerHTML = db.length ? db.map(i => `
            <div class="item-card shadow ${i.sold ? 'is-sold' : ''}">
                <div class="card-img" onclick="viewItem(${i.id})"><img src="${i.images[0]}" loading="lazy"></div>
                <div class="item-info">
                    <div class="title">${i.n}</div>
                    <div class="price">₪${i.p}</div>
                    <div class="item-btns">
                        <button class="btn-i wa" onclick="shareWA('${i.n.replace(/'/g, "\\'")}', '${i.p}')">🔗</button>
                        <button class="btn-i ed" onclick="editItem(${i.id})">✏️</button>
                        <button class="btn-i st" onclick="toggleSold(${i.id})">${i.sold ? '🛒' : '✅'}</button>
                    </div>
                </div>
            </div>
        `).join('') : '<p class="empty">המלאי ריק.</p>';
    }

    function viewItem(id) {
        const i = db.find(x => x.id == id);
        document.getElementById('modalContent').innerHTML = `
            <div class="m-slider">${i.images.map(s => `<img src="${s}">`).join('')}</div>
            <div class="m-details">
                <h2>${i.n}</h2>
                <p class="m-price">₪${i.p}</p>
                <div class="m-specs shadow"><p><strong>חומרים:</strong> ${i.m || '-'}</p><p>${i.d || '-'}</p></div>
                <button class="btn-wa-big shadow" onclick="shareWA('${i.n.replace(/'/g, "\\'")}', '${i.p}')">הזמנה בוואצאפ</button>
            </div>
        `;
        document.getElementById('viewModal').style.display = "block";
        document.body.classList.add('no-scroll');
    }

    function editItem(id) {
        const i = db.find(x => x.id == id);
        document.getElementById('editId').value = i.id;
        document.getElementById('name').value = i.n;
        document.getElementById('price').value = i.p;
        document.getElementById('mat').value = i.m;
        document.getElementById('desc').value = i.d;
        document.getElementById('formTitle').innerText = "עריכה";
        document.getElementById('deleteBtn').style.display = 'block';
        document.getElementById('formModal').style.display = 'block';
        document.body.classList.add('no-scroll');
    }

    function goHome() {
        document.querySelectorAll('.full-modal').forEach(m => m.style.display = 'none');
        document.body.classList.remove('no-scroll');
    }

    function toggleForm() {
        resetForm();
        document.getElementById('deleteBtn').style.display = 'none';
        document.getElementById('formModal').style.display = 'block';
        document.body.classList.add('no-scroll');
    }

    function shareWA(n, p) {
        window.open(`https://wa.me/?text=${encodeURIComponent('אני מעוניין ב: ' + n + ' (₪' + p + ')')}`, '_blank');
    }

    function updateDB() { localStorage.setItem(DB_NAME, JSON.stringify(db)); render(); }
    function closeView() { goHome(); }
    function resetForm() { ['editId','name','mat','price','desc','imgs'].forEach(id => { if(document.getElementById(id)) document.getElementById(id).value = ''; }); document.getElementById('formTitle').innerText = "פרטי מוצר"; }
    function exportData() {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(db)], {type: "application/json"}));
        a.download = "okar_backup.json"; a.click();
    }
    function importData(e) {
        const r = new FileReader();
        r.onload = ev => { db = JSON.parse(ev.target.result); updateDB(); };
        r.readAsText(e.target.files[0]);
    }
</script>
</body>
</html>
