<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>O-Kar Custom Blades | V3.5.0</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="logo.png">
</head>
<body onload="initApp()">

<header class="main-header shadow">
    <div class="header-right" onclick="goHome()">
        <img src="logo.png" alt="Logo" class="main-logo">
    </div>
    <div class="header-controls">
        <button class="nav-btn home-btn" onclick="goHome()">🏠</button>
        <button id="pwaBtn" class="nav-btn pwa-status">התקנה</button>
        <button class="nav-btn" onclick="exportData()">גיבוי</button>
        <label class="nav-btn">שחזור<input type="file" id="fileIn" accept=".json" onchange="importData(event)" style="display:none;"></label>
    </div>
</header>

<div class="container">
    <button class="big-add-btn shadow" onclick="toggleForm()">
        <span>➕</span> הוספת מוצר חדש
    </button>

    <div id="formModal" class="full-modal" style="display:none;">
        <div class="full-modal-content form-container-centered">
            <div class="form-header-bar">
                <button class="back-btn" onclick="goHome()">➜ ביטול</button>
                <h2 id="formTitle">פרטי מוצר</h2>
            </div>
            <div class="form-body">
                <input type="hidden" id="editId">
                <div class="input-group"><label>שם הדגם</label><input type="text" id="name" placeholder="לדוגמה: סכין צייד"></div>
                <div class="input-group"><label>מחיר (₪)</label><input type="number" id="price" placeholder="0.00"></div>
                <div class="input-group"><label>חומרים</label><input type="text" id="mat" placeholder="סוג פלדה/ידית"></div>
                <div class="input-group"><label>תיאור</label><textarea id="desc" rows="4" placeholder="פירוט חופשי..."></textarea></div>
                
                <div class="file-area shadow">
                    <p>📸 הוספת תמונות (עד 3)</p>
                    <input type="file" id="imgs" multiple accept="image/*" onchange="checkFileLimit(this)">
                    <small id="fileStatus">ניתן לבחור עד 3 תמונות בלבד</small>
                </div>

                <button id="saveBtn" class="btn-save-final shadow" onclick="save()">שמור ופרסם מוצר</button>
                <button id="deleteBtn" class="btn-delete" style="display:none;" onclick="deleteProduct()">🗑️ מחק מוצר</button>
            </div>
        </div>
    </div>

    <div id="list" class="grid-container"></div>
</div>

<div id="viewModal" class="full-modal" style="display:none;">
    <span class="close-view" onclick="closeView()">&times;</span>
    <div class="full-modal-content" id="modalContent"></div>
</div>

<footer>O-KAR Custom Blades | V3.5.0</footer>

<script>
    const DB_NAME = 'okar_database_final';
    let db = [];

    function initApp() {
        const saved = localStorage.getItem(DB_NAME);
        if (saved) db = JSON.parse(saved);
        render();
    }

    function checkFileLimit(input) {
        if (input.files.length > 3) {
            alert("ניתן להעלות מקסימום 3 תמונות למוצר.");
            input.value = ""; // מאפס את הבחירה
        }
    }

    function save() {
        const saveBtn = document.getElementById('saveBtn');
        const id = document.getElementById('editId').value;
        const n = document.getElementById('name').value;
        const p = document.getElementById('price').value;
        
        if(!n || !p) return alert("נא למלא שם ומחיר");

        saveBtn.disabled = true;
        saveBtn.innerText = "שומר... אנא המתן";

        const fileInput = document.getElementById('imgs');
        const files = Array.from(fileInput.files);

        const finalizeSave = (imageArray) => {
            const item = {
                id: id ? Number(id) : Date.now(),
                n, p, 
                m: document.getElementById('mat').value,
                d: document.getElementById('desc').value,
                images: imageArray.length > 0 ? imageArray : (id ? db.find(x=>x.id==id).images : ["https://via.placeholder.com/400?text=O-KAR"]),
                sold: id ? db.find(x=>x.id==id).sold : false
            };

            if(id) {
                const idx = db.findIndex(x=>x.id==id);
                db[idx] = item;
            } else {
                db.unshift(item);
            }

            updateDB();
            saveBtn.disabled = false;
            saveBtn.innerText = "שמור ופרסם מוצר";
            goHome(); // מעבר אוטומטי לעמוד הבית
        };

        if(files.length > 0) {
            // טיפול בתמונות (מקסימום 3)
            const limitedFiles = files.slice(0, 3);
            Promise.all(limitedFiles.map(f => new Promise((resolve) => {
                const r = new FileReader();
                r.onload = e => resolve(e.target.result);
                r.readAsDataURL(f);
            }))).then(finalizeSave);
        } else {
            finalizeSave([]);
        }
    }

    function render() {
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = db.length === 0 ? '<p class="empty-msg">אין מוצרים במלאי.</p>' : 
        db.map(i => `
            <div class="item-card shadow ${i.sold ? 'is-sold' : ''}">
                <div class="card-img" onclick="viewItem(${i.id})"><img src="${i.images[0]}" loading="lazy"></div>
                <div class="item-info">
                    <div class="title">${i.n}</div>
                    <div class="price">₪${i.p}</div>
                    <div class="item-btns">
                        <button class="btn-i wa" onclick="shareWA('${i.n.replace(/'/g, "\\'")}', '${i.p}')">🔗</button>
                        <button class="btn-i ed" onclick="editItem(${i.id})">✏️</button>
                        <button class="btn-i st" onclick="toggleSold(${i.id})">${i.sold ? '🛒' : '✅'}</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function viewItem(id) {
        const i = db.find(x => x.id == id);
        document.getElementById('modalContent').innerHTML = `
            <div class="m-slider">${i.images.map(s => `<img src="${s}">`).join('')}</div>
            <div class="m-details container-centered">
                <h2>${i.n}</h2>
                <p class="m-price">₪${i.p}</p>
                <div class="m-specs shadow"><p><strong>חומרים:</strong> ${i.m || '-'}</p><p>${i.d || '-'}</p></div>
                <button class="btn-wa-big shadow" onclick="shareWA('${i.n.replace(/'/g, "\\'")}', '${i.p}')">שתף בוואצאפ</button>
            </div>
        `;
        document.getElementById('viewModal').style.display = "block";
        document.body.classList.add('no-scroll');
    }

    function editItem(id) {
        const i = db.find(x => x.id == id);
        document.getElementById('editId').value = i.id;
        document.getElementById('name').value = i.n;
        document.getElementById('price').value = i.p;
        document.getElementById('mat').value = i.m;
        document.getElementById('desc').value = i.d;
        document.getElementById('formTitle').innerText = "עריכת מוצר";
        document.getElementById('deleteBtn').style.display = 'block';
        document.getElementById('formModal').style.display = 'block';
        document.body.classList.add('no-scroll');
    }

    function goHome() {
        document.getElementById('formModal').style.display = 'none';
        document.getElementById('viewModal').style.display = 'none';
        document.body.classList.remove('no-scroll');
    }

    function toggleForm() {
        resetForm();
        document.getElementById('deleteBtn').style.display = 'none';
        document.getElementById('formModal').style.display = 'block';
        document.body.classList.add('no-scroll');
    }

    function deleteProduct() {
        if(confirm("למחוק פריט זה?")) {
            const id = document.getElementById('editId').value;
            db = db.filter(x => x.id != id);
            updateDB(); goHome();
        }
    }

    function toggleSold(id) {
        const idx = db.findIndex(x => x.id == id);
        db[idx].sold = !db[idx].sold;
        updateDB();
    }

    function shareWA(name, price) {
        const text = `מעוניין ב: ${name} (מחיר: ${price} ₪)`;
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
    }

    function closeView() { goHome(); }
    function updateDB() { localStorage.setItem(DB_NAME, JSON.stringify(db)); render(); }
    function resetForm() { ['editId','name','mat','price','desc','imgs'].forEach(id => { if(document.getElementById(id)) document.getElementById(id).value = ''; }); document.getElementById('formTitle').innerText = "פרטי מוצר"; }
    function exportData() {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(db)], {type: "application/json"}));
        a.download = "okar_backup.json"; a.click();
    }
    function importData(e) {
        const r = new FileReader();
        r.onload = ev => { db = JSON.parse(ev.target.result); updateDB(); };
        r.readAsText(e.target.files[0]);
    }
</script>
</body>
</html>
