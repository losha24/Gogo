<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go-Go</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
padding:20px;
}

.logo{
width:110px;
margin-bottom:10px;
}

button{
padding:10px 18px;
margin:5px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.primary{background:#22c55e;color:white;}
.train{background:#3b82f6;color:white;}
.danger{background:#ef4444;color:white;}

.players{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
max-width:600px;
margin:auto;
}

.playerCard{
background:#1e293b;
border-radius:8px;
padding:8px;
font-size:13px;
}

.stat{
font-size:12px;
margin-top:3px;
}

.starY{color:#facc15}
.starB{color:#38bdf8}

.table{
background:#1e293b;
padding:10px;
border-radius:8px;
margin:10px auto;
max-width:420px;
}

.green{color:#22c55e}
.red{color:#ef4444}

</style>
</head>

<body>

<img src="soccer_logo.png" class="logo">

<div id="setup">
<input id="teamName" placeholder="שם קבוצה">
<br>
<button class="primary" onclick="createTeam()">צור קבוצה</button>
</div>

<div id="game" style="display:none">

<h2 id="teamTitle"></h2>

<p>תקציב: $<span id="budget"></span></p>

<div id="players" class="players"></div>

<h3>אימונים</h3>

<button class="train" onclick="train('attack')">⚔ התקפה</button>
<button class="train" onclick="train('defense')">🛡 הגנה</button>
<button class="train" onclick="train('fitness')">❤️ כושר</button>

<br><br>

<button class="primary" onclick="playMatch()">⚽ משחק שבועי</button>

<div id="matchResult"></div>

<div class="table" id="leagueTable"></div>

<div class="table" id="seasonTable"></div>

<div class="table" id="champTable"></div>

<h3>ספונסר</h3>

<div id="sponsorBox"></div>

<br>

<button class="danger" onclick="resetGame()">איפוס</button>

</div>

<script>

function randomStat(){
return Math.floor(Math.random()*80)+20
}

function stars(val){

let yellow=Math.floor(val/10)
let blue=Math.floor(yellow/5)

yellow=yellow%5

let html=""

for(let i=0;i<blue;i++){
html+="<span class='starB'>🔵</span>"
}

for(let i=0;i<yellow;i++){
html+="<span class='starY'>⭐</span>"
}

return html
}

function createTeam(){

let name=document.getElementById("teamName").value
if(!name)return alert("הכנס שם קבוצה")

let players=[]

for(let i=1;i<=11;i++){

let a=randomStat()
let d=randomStat()
let f=randomStat()

players.push({
id:i,
attack:a,
defense:d,
fitness:f,
value:(a+d+f)*1000
})

}

let data={
teamName:name,
budget:100000,
players:players,
league:{played:0,won:0,draw:0,lost:0,points:0},
seasons:0,
championships:0,
sponsor:null
}

localStorage.setItem("gogo",JSON.stringify(data))

loadGame()

}

function loadGame(){

let data=JSON.parse(localStorage.getItem("gogo"))
if(!data)return

setup.style.display="none"
game.style.display="block"

teamTitle.innerText=data.teamName

budget.innerText=data.budget
budget.className=data.budget>=0?"green":"red"

drawPlayers(data)

updateTables(data)

drawSponsor(data)

}

function drawPlayers(data){

players.innerHTML=""

data.players.forEach(p=>{

players.innerHTML+=`

<div class="playerCard">

<b>שחקן ${p.id}</b>

<div class="stat">⚔ ${stars(p.attack)}</div>
<div class="stat">🛡 ${stars(p.defense)}</div>
<div class="stat">❤️ ${stars(p.fitness)}</div>

<div class="stat">💰 $${p.value}</div>

</div>

`

})

}

function train(type){

let data=JSON.parse(localStorage.getItem("gogo"))

let cost=3000

if(data.budget<cost){
alert("אין כסף לאימון")
return
}

data.players.forEach(p=>{

let inc=Math.random()*4+1

if(type=="attack")p.attack+=inc
if(type=="defense")p.defense+=inc
if(type=="fitness")p.fitness+=inc

p.value=(p.attack+p.defense+p.fitness)*1000

})

data.budget-=cost

localStorage.setItem("gogo",JSON.stringify(data))

loadGame()

}

function rival(level){

let arr=[]

for(let i=1;i<=11;i++){

let base=60+level*5

arr.push({
attack:Math.random()*base,
defense:Math.random()*base,
fitness:Math.random()*base
})

}

return arr

}

function power(players){

let a=0,d=0,f=0

players.forEach(p=>{
a+=p.attack
d+=p.defense
f+=p.fitness
})

return a*0.5+f*0.3-d*0.2

}

function playMatch(){

let data=JSON.parse(localStorage.getItem("gogo"))

let rivalTeam=rival(data.league.played)

let p=power(data.players)
let r=power(rivalTeam)

let ps=Math.max(0,Math.floor(Math.random()*5*(p/100)))
let rs=Math.max(0,Math.floor(Math.random()*5*(r/100)))

data.league.played++

if(ps>rs){
data.league.won++
data.league.points+=3
}

else if(ps==rs){
data.league.draw++
data.league.points+=1
}

else{
data.league.lost++
}

let income=5000+Math.random()*5000
let cost=1000+Math.random()*3000

data.budget+=Math.round(income-cost)

let msg=`תוצאה ${ps} - ${rs}`

if(data.league.played%5==0){

let bonus=15000+Math.random()*10000

if(data.sponsor){
bonus*=data.sponsor
}

bonus=Math.round(bonus)

data.budget+=bonus

msg+=`<br>🎁 בונוס $${bonus}`

}

matchResult.innerHTML=msg

if(data.league.played==10){

data.seasons++

data.league={played:0,won:0,draw:0,lost:0,points:0}

data.sponsor=null

alert("עונה הסתיימה")

if(data.seasons%5==0){

data.championships++

alert("🏆 אליפות!")

}

}

localStorage.setItem("gogo",JSON.stringify(data))

loadGame()

}

function drawSponsor(data){

let s=document.getElementById("sponsorBox")

if(data.sponsor){

s.innerHTML="יש ספונסר לעונה"

return

}

s.innerHTML=`

<button onclick="pickSponsor(1.1)">ספונסר קטן +10%</button>

<button onclick="pickSponsor(1.3)">ספונסר בינוני +30%</button>

<button onclick="pickSponsor(1.5)">ספונסר גדול +50%</button>

`

}

function pickSponsor(mult){

let data=JSON.parse(localStorage.getItem("gogo"))

if(data.sponsor)return

data.sponsor=mult

localStorage.setItem("gogo",JSON.stringify(data))

loadGame()

}

function updateTables(data){

leagueTable.innerHTML=

`ליגה<br>
משחקים ${data.league.played}
|
ניצחונות ${data.league.won}
|
תיקו ${data.league.draw}
|
הפסדים ${data.league.lost}
|
נקודות ${data.league.points}`

seasonTable.innerHTML=
`עונות ששוחקו: ${data.seasons}`

champTable.innerHTML=
`אליפויות: ${data.championships}`

}

function resetGame(){

if(confirm("לאפס משחק?")){

localStorage.removeItem("gogo")

location.reload()

}

}

loadGame()

</script>

</body>
</html>
