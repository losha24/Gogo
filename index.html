<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoGo Football Manager</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
padding:0;
}

header{
background:#020617;
padding:20px;
font-size:26px;
font-weight:bold;
}

.container{
padding:20px;
}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
cursor:pointer;
}

button:hover{
opacity:0.8;
}

.card{
background:#1e293b;
padding:15px;
margin:10px;
border-radius:10px;
}

.player{
display:flex;
justify-content:space-between;
background:#334155;
padding:8px;
margin:5px;
border-radius:6px;
}

.star-yellow{color:gold;}
.star-blue{color:#38bdf8;}
.star-red{color:#ef4444;}

</style>
</head>

<body>

<header>
⚽ GoGo Football Manager
</header>

<div class="container">

<div class="card">
<h2>תקציב</h2>
<span id="money">100000</span> $
</div>

<div class="card">
<h2>סגל</h2>
<div id="players"></div>
<button onclick="addRandomPlayer()">החתם שחקן</button>
</div>

<div class="card">
<h2>שוק שחקנים</h2>
<div id="market"></div>
<button onclick="generateMarket()">רענן שוק</button>
</div>

<div class="card">
<h2>ספונסרים</h2>
<div id="sponsors"></div>
<button onclick="generateSponsors()">חפש ספונסר</button>
</div>

<div class="card">
<h2>משחק שבועי</h2>
<button onclick="playMatch()">שחק משחק</button>
<div id="matchResult"></div>
</div>

</div>

<script>

let money = 100000

let players = []

let market = []

let sponsors = []

const names = [
"אבי","דור","רון","אלון","נועם",
"גל","תומר","אופק","עומר","דניאל"
]

function starLevel(skill){

if(skill<60)return "⭐"
if(skill<80)return "<span class='star-yellow'>⭐⭐</span>"
if(skill<90)return "<span class='star-blue'>⭐⭐⭐</span>"
return "<span class='star-red'>⭐⭐⭐⭐</span>"

}

function renderPlayers(){

const div=document.getElementById("players")
div.innerHTML=""

players.forEach((p,i)=>{

div.innerHTML+=`
<div class="player">
<span>${p.name}</span>
<span>${starLevel(p.skill)}</span>
</div>
`

})

document.getElementById("money").innerText=money

}

function addRandomPlayer(){

if(players.length>=15){
alert("מקסימום שחקנים")
return
}

let cost = Math.floor(Math.random()*5000)+2000

if(money<cost){
alert("אין מספיק כסף")
return
}

money-=cost

players.push({
name:names[Math.floor(Math.random()*names.length)],
skill:Math.floor(Math.random()*40)+50
})

renderPlayers()

}

function generateMarket(){

market=[]

for(let i=0;i<5;i++){

market.push({
name:names[Math.floor(Math.random()*names.length)],
skill:Math.floor(Math.random()*40)+50,
price:Math.floor(Math.random()*7000)+3000
})

}

renderMarket()

}

function renderMarket(){

const div=document.getElementById("market")

div.innerHTML=""

market.forEach((p,i)=>{

div.innerHTML+=`
<div class="player">
<span>${p.name} ${starLevel(p.skill)}</span>
<button onclick="buyPlayer(${i})">${p.price}$</button>
</div>
`

})

}

function buyPlayer(i){

let p = market[i]

if(money<p.price){
alert("אין כסף")
return
}

if(players.length>=15){
alert("סגל מלא")
return
}

money-=p.price

players.push(p)

market.splice(i,1)

renderPlayers()
renderMarket()

}
    function generateSponsors(){

sponsors=[]

const names=[
"Nike",
"Adidas",
"Puma",
"Coca Cola",
"Red Bull"
]

for(let i=0;i<3;i++){

sponsors.push({
name:names[Math.floor(Math.random()*names.length)],
value:Math.floor(Math.random()*20000)+10000
})

}

renderSponsors()

}

function renderSponsors(){

const div=document.getElementById("sponsors")

div.innerHTML=""

sponsors.forEach((s,i)=>{

div.innerHTML+=`
<div class="player">
<span>${s.name}</span>
<button onclick="signSponsor(${i})">חתום ${s.value}$</button>
</div>
`

})

}

function signSponsor(i){

money+=sponsors[i].value

sponsors.splice(i,1)

renderPlayers()
renderSponsors()

}

function playMatch(){

if(players.length<5){
alert("צריך לפחות 5 שחקנים")
return
}

let teamSkill = players.reduce((a,b)=>a+b.skill,0)

let enemy = Math.floor(Math.random()*400)+200

let result=""

if(teamSkill>enemy){

let win = Math.floor(Math.random()*10000)+5000

money+=win

result="ניצחון! +" + win + "$"

}else{

let loss = Math.floor(Math.random()*3000)

money-=loss

result="הפסד -" + loss + "$"

}

document.getElementById("matchResult").innerText=result

renderPlayers()

}

renderPlayers()

</script>

</body>
</html>
