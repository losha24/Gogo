<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>O-Kar Custom Blades | V3.2.0</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="logo.png">
</head>
<body>

<header class="main-header shadow">
    <div class="header-right" onclick="goHome()">
        <img src="logo.png" alt="Logo" class="main-logo">
    </div>
    
    <div class="header-controls">
        <button class="nav-btn home-btn" onclick="goHome()">🏠 בית</button>
        <button id="pwaBtn" class="nav-btn pwa-status">התקנה</button>
        <button class="nav-btn" onclick="location.reload(true)">רענון</button>
        <button class="nav-btn" onclick="exportData()">גיבוי</button>
        <label class="nav-btn">שחזור<input type="file" id="fileIn" accept=".json" onchange="importData(event)" style="display:none;"></label>
    </div>
</header>

<div class="container">
    <button class="big-add-btn shadow" onclick="toggleForm()">
        <span>➕</span> הוספת מוצר חדש
    </button>

    <div id="formModal" class="full-modal" style="display:none;">
        <div class="full-modal-content">
            <div class="form-header-bar">
                <button class="back-btn" onclick="goHome()">➜ חזרה</button>
                <h2 id="formTitle">הוספת מוצר</h2>
            </div>
            <div class="form-body">
                <input type="hidden" id="editId">
                <div class="input-group"><label>שם הדגם</label><input type="text" id="name"></div>
                <div class="input-group"><label>מחיר (₪)</label><input type="number" id="price"></div>
                <div class="input-group"><label>חומרים</label><input type="text" id="mat"></div>
                <div class="input-group"><label>תיאור</label><textarea id="desc" rows="4"></textarea></div>
                <div class="file-area">
                    <p>📸 הוספת תמונות</p>
                    <input type="file" id="imgs" multiple accept="image/*">
                </div>
                <button class="btn-save-final shadow" onclick="save()">שמור מוצר</button>
                <button id="deleteBtn" class="btn-delete" style="display:none;" onclick="deleteProduct()">🗑️ מחק מוצר</button>
            </div>
        </div>
    </div>

    <div id="list" class="grid-container"></div>
</div>

<div id="viewModal" class="full-modal" style="display:none;">
    <div class="full-modal-content">
        <span class="close-view" onclick="closeView()">&times;</span>
        <div id="modalContent"></div>
    </div>
</div>

<div id="installGuide" class="modal-overlay" onclick="this.style.display='none'" style="display:none;">
    <div class="guide-box shadow" onclick="event.stopPropagation()">
        <h3>איך לשמור את האפליקציה?</h3>
        <p id="guideText">לחץ על תפריט הדפדפן ובחר ב-"הוספה למסך הבית".</p>
        <button class="btn-save-final" onclick="document.getElementById('installGuide').style.display='none'">הבנתי!</button>
    </div>
</div>

<footer>O-KAR Custom Blades | V3.2.0</footer>

<script>
    // הגדרת מפתח קבוע למניעת מחיקה בעדכונים
    const DB_NAME = 'okar_database_final';
    const OLD_KEYS = ['okar_db_v28', 'okar_db_v29', 'okar_db_v30', 'okar_db_v31'];

    // פונקציית הגירה: מושכת נתונים ישנים אם קיימים
    function migrateData() {
        let existingData = localStorage.getItem(DB_NAME);
        if (!existingData) {
            for (let key of OLD_KEYS) {
                let oldData = localStorage.getItem(key);
                if (oldData) {
                    localStorage.setItem(DB_NAME, oldData);
                    console.log("Migrated data from: " + key);
                    break;
                }
            }
        }
    }

    migrateData();

    let db = JSON.parse(localStorage.getItem(DB_NAME)) || [];
    let deferredPrompt;

    // לוגיקת התקנה
    const pwaBtn = document.getElementById('pwaBtn');
    if (window.matchMedia('(display-mode: standalone)').matches) {
        pwaBtn.style.backgroundColor = "var(--accent)"; 
        pwaBtn.innerText = "מותקן ✅";
    }

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        pwaBtn.style.backgroundColor = "var(--blue)"; 
    });

    pwaBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') pwaBtn.style.backgroundColor = "var(--accent)";
            deferredPrompt = null;
        } else {
            document.getElementById('installGuide').style.display = 'flex';
        }
    });

    function goHome() {
        document.getElementById('formModal').style.display = 'none';
        document.getElementById('viewModal').style.display = 'none';
        document.body.style.overflow = "auto";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function toggleForm() {
        resetForm();
        document.getElementById('deleteBtn').style.display = 'none';
        document.getElementById('formModal').style.display = 'block';
        document.body.style.overflow = "hidden";
    }

    function save() {
        const id = document.getElementById('editId').value;
        const n = document.getElementById('name').value;
        const p = document.getElementById('price').value;
        if(!n || !p) return alert("חובה למלא שם ומחיר");

        const files = document.getElementById('imgs').files;
        const finalize = (imgs) => {
            const item = {
                id: id ? Number(id) : Date.now(),
                n, p, 
                m: document.getElementById('mat').value,
                d: document.getElementById('desc').value,
                images: imgs.length ? imgs : (id ? db.find(x=>x.id==id).images : ["https://via.placeholder.com/400?text=O-KAR"]),
                sold: id ? db.find(x=>x.id==id).sold : false
            };
            if(id) db[db.findIndex(x=>x.id==id)] = item;
            else db.unshift(item);
            updateDB(); goHome();
        };

        if(files.length) {
            Promise.all(Array.from(files).map(f => new Promise(res => {
                const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(f);
            }))).then(finalize);
        } else finalize([]);
    }

    function deleteProduct() {
        const id = document.getElementById('editId').value;
        if(confirm("למחוק את המוצר?")) {
            db = db.filter(x => x.id != id);
            updateDB(); goHome();
        }
    }

    function render() {
        const listDiv = document.getElementById('list');
        if(db.length === 0) {
            listDiv.innerHTML = '<p style="grid-column:1/-1; text-align:center; padding:40px; color:#aaa;">אין מוצרים במאגר. לחץ על הוספה.</p>';
            return;
        }
        listDiv.innerHTML = db.map(i => `
            <div class="item-card shadow ${i.sold ? 'is-sold' : ''}">
                <div class="card-img" onclick="viewItem(${i.id})"><img src="${i.images[0]}"></div>
                <div class="item-info">
                    <div class="title">${i.n}</div>
                    <div class="price">₪${i.p}</div>
                    <div class="item-btns">
                        <button class="btn-i wa" onclick="shareWA('${i.n}', '${i.p}')">🔗</button>
                        <button class="btn-i ed" onclick="editItem(${i.id})">✏️</button>
                        <button class="btn-i st" onclick="toggleSold(${i.id})">${i.sold ? '🛒' : '✅'}</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function viewItem(id) {
        const i = db.find(x => x.id == id);
        document.getElementById('modalContent').innerHTML = `
            <div class="m-slider">${i.images.map(s => `<img src="${s}">`).join('')}</div>
            <div class="m-details">
                <h2>${i.n}</h2>
                <p class="m-price">₪${i.p}</p>
                <div class="m-specs"><p><strong>חומרים:</strong> ${i.m || '-'}</p><p>${i.d || '-'}</p></div>
                <button class="btn-wa-big shadow" onclick="shareWA('${i.n}', '${i.p}')">שתף מוצר בוואצאפ 📱</button>
            </div>
        `;
        document.getElementById('viewModal').style.display = "block";
        document.body.style.overflow = "hidden";
    }

    function editItem(id) {
        const i = db.find(x => x.id == id);
        document.getElementById('editId').value = i.id;
        document.getElementById('name').value = i.n;
        document.getElementById('price').value = i.p;
        document.getElementById('mat').value = i.m;
        document.getElementById('desc').value = i.d;
        document.getElementById('formTitle').innerText = "עריכת מוצר";
        document.getElementById('deleteBtn').style.display = 'block';
        document.getElementById('formModal').style.display = 'block';
    }

    function toggleSold(id) {
        const idx = db.findIndex(x => x.id == id);
        db[idx].sold = !db[idx].sold;
        updateDB();
    }

    function shareWA(name, price) {
        const text = `היי, ראיתי את המוצר "${name}" במחיר ${price} ש"ח באפליקציית O-KAR, אשמח לפרטים!`;
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
    }

    function updateDB() { localStorage.setItem(DB_NAME, JSON.stringify(db)); render(); }
    function resetForm() { ['editId','name','mat','price','desc','imgs'].forEach(id => { if(document.getElementById(id)) document.getElementById(id).value = ''; }); }
    function exportData() {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(db)], {type: "application/json"}));
        a.download = "okar_backup.json"; a.click();
    }
    function importData(e) {
        const r = new FileReader();
        r.onload = ev => { db = JSON.parse(ev.target.result); updateDB(); };
        r.readAsText(e.target.files[0]);
    }
    render();
</script>
</body>
</html>
