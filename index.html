<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Go-Go Football Game</title>

<link rel="manifest" href="manifest.json">

<link rel="icon" type="image/png" sizes="192x192" href="soccer_icon_192.png">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
padding:20px;
}

.logo{
width:110px;
display:block;
margin:auto;
}

.section-box{
background:#1e293b;
border-radius:12px;
padding:10px;
max-width:420px;
margin:10px auto;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

button{
padding:8px 14px;
margin:4px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.primary{background:#22c55e;color:white;}
.danger{background:#ef4444;color:white;}
.train-btn{background:#2563eb;color:white;}

.player{
background:#334155;
margin:5px auto;
padding:8px;
border-radius:6px;
font-size:14px;
max-width:340px;
display:flex;
justify-content:space-between;
align-items:center;
}

#budget{
font-weight:bold;
margin:10px auto;
padding:8px;
border-radius:8px;
max-width:340px;
border:2px solid #334155;
font-size:17px;
}

.table{
background:#111827;
padding:12px;
border-radius:10px;
margin:10px auto;
max-width:420px;
text-align:right;
display:none;
}

.match-box{
background:#1e293b;
padding:12px;
border-radius:10px;
max-width:420px;
margin:10px auto;
}

</style>

</head>

<body>

<img src="soccer_logo.png" class="logo">

<div id="setup">

<input type="text" id="teamName" placeholder="שם קבוצה">

<br>

<button class="primary" onclick="createTeam()">צור קבוצה</button>

</div>

<div id="game" style="display:none">

<h2 id="teamTitle"></h2>

<div id="players"></div>

<div id="budget"></div>

<div class="section-box">

<h3>אימונים</h3>

<button class="train-btn" onclick="train('attack')">⚔️ התקפה</button>

<button class="train-btn" onclick="train('defense')">🛡️ הגנה</button>

<button class="train-btn" onclick="train('speed')">⚡ מהירות</button>

</div>

<button class="primary" onclick="playMatch()">⚽ משחק שבועי</button>

<div id="matchResult"></div>

<button class="primary" onclick="toggleTables()">📊 טבלת משחקים</button>

<div id="leagueTable" class="table"></div>

<div id="seasonTable" class="table"></div>

<div id="championshipTable" class="table"></div>

<button class="danger" onclick="resetGame()">איפוס משחק</button>

<p style="margin-top:20px;font-size:12px">

© אלכסיי זבודיסקר

</p>

</div>

<script>

function starsColored(val){

let yellow=Math.floor(val/10)

let orange=Math.floor(yellow/5)

let blue=Math.floor(orange/5)

yellow=yellow%5

orange=orange%5

return "🔷".repeat(blue)+"🔶".repeat(orange)+"⭐".repeat(yellow)

}

function createTeam(){

let name=document.getElementById("teamName").value

if(!name)return alert("שם קבוצה")

let players=[]

for(let i=1;i<=5;i++){

let attack=10*(Math.floor(Math.random()*3)+1)

let defense=10*(Math.floor(Math.random()*3)+1)

let speed=10*(Math.floor(Math.random()*3)+1)

let value=(attack+defense+speed)*1000

players.push({id:i,attack,defense,speed,value})

}

let data={

teamName:name,

budget:100000,

players:players,

league:{played:0,won:0,draw:0,lost:0,points:0},

seasonsPlayed:0,

championships:0,

seasonHistory:[]

}

localStorage.setItem("miniFootball",JSON.stringify(data))

loadGame()

}

function loadGame(){

let data=JSON.parse(localStorage.getItem("miniFootball"))

if(!data)return

document.getElementById("setup").style.display="none"

document.getElementById("game").style.display="block"

document.getElementById("teamTitle").innerText=data.teamName

let playersDiv=document.getElementById("players")

playersDiv.innerHTML=""

data.players.forEach(p=>{

playersDiv.innerHTML+=`

<div class="player">

<div>

שחקן ${p.id}

⚔️ ${starsColored(p.attack)}

🛡️ ${starsColored(p.defense)}

⚡ ${starsColored(p.speed)}

</div>

</div>

`

})

document.getElementById("budget").innerText="תקציב: $"+data.budget

updateTables(data)

}

function train(type){

let data=JSON.parse(localStorage.getItem("miniFootball"))

let cost=3000

if(data.budget<cost)return alert("אין כסף")

data.players.forEach(p=>{

p[type]+=Math.random()*2

})

data.budget-=cost

localStorage.setItem("miniFootball",JSON.stringify(data))

loadGame()

}

function playMatch(){

let data=JSON.parse(localStorage.getItem("miniFootball"))

let goals=Math.floor(Math.random()*5)

let rival=Math.floor(Math.random()*5)

data.league.played++

if(goals>rival){data.league.won++;data.league.points+=3}

else if(goals===rival){data.league.draw++;data.league.points++}

else{data.league.lost++}

let income=5000+Math.floor(Math.random()*5000)

let cost=1000+Math.floor(Math.random()*4000)

data.budget+=income-cost

if(data.league.played%5===0){

data.budget+=10000

}

if(data.league.played%10===0){

data.seasonsPlayed++

data.seasonHistory.push({...data.league})

data.league={played:0,won:0,draw:0,lost:0,points:0}

if(data.seasonsPlayed%5===0){

data.championships++

}

}

localStorage.setItem("miniFootball",JSON.stringify(data))

document.getElementById("matchResult").innerHTML=

"תוצאה "+goals+"-"+rival

loadGame()

}

function updateTables(data){

document.getElementById("leagueTable").innerHTML=

`ליגה<br>

משחקים ${data.league.played}

ניצחונות ${data.league.won}

נקודות ${data.league.points}`

let html="עונות<br>"

data.seasonHistory.forEach((s,i)=>{

html+="עונה "+(i+1)+" נקודות "+s.points+"<br>"

})

document.getElementById("seasonTable").innerHTML=html

document.getElementById("championshipTable").innerHTML=

"אליפויות "+data.championships

}

function toggleTables(){

document.querySelectorAll(".table").forEach(t=>{

t.style.display=t.style.display==="block"?"none":"block"

})

}

function resetGame(){

localStorage.removeItem("miniFootball")

location.reload()

}

loadGame()

if('serviceWorker' in navigator){

navigator.serviceWorker.register('sw.js')

}

</script>

</body>

</html>
