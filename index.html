<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>⚽ מנהל קבוצת כדורגל</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

button{
padding:10px;
margin:5px;
font-size:15px;
border-radius:8px;
border:none;
background:#2c2c2c;
color:white;
}

button:hover{
background:#444;
}

.card{
background:#1c1c1c;
padding:12px;
margin:10px;
border-radius:12px;
}

.players{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
}

.player{
background:#222;
padding:10px;
border-radius:10px;
width:140px;
}

.bar{
height:6px;
background:#333;
border-radius:5px;
margin-top:5px;
}

.fill{
height:6px;
background:#3aa3ff;
border-radius:5px;
}

.yellow{
color:gold;
}

.blue{
color:#4cb3ff;
}

</style>

</head>

<body>

<h2>⚽ מנהל קבוצת כדורגל</h2>

<div class="card">

💰 כסף: ₪ <span id="money"></span><br>
🎮 משחקים: <span id="games"></span><br>
🏆 ליגה: <span id="league"></span><br>
🥇 אליפויות: <span id="champ"></span><br>
🤝 ספונסר: <span id="sponsorName"></span>

</div>

<div class="card players">

<div class="player">

התקפה

<div id="attackStars"></div>

<div class="bar">
<div id="attackBar" class="fill"></div>
</div>

<button onclick="train('attack')">אימון</button>

</div>

<div class="player">

הגנה

<div id="defStars"></div>

<div class="bar">
<div id="defBar" class="fill"></div>
</div>

<button onclick="train('def')">אימון</button>

</div>

<div class="player">

כושר

<div id="fitStars"></div>

<div class="bar">
<div id="fitBar" class="fill"></div>
</div>

<button onclick="train('fit')">אימון</button>

</div>

</div>

<div class="card">

<button onclick="playMatch()">משחק שבועי</button>
<button onclick="chooseSponsor()">בחר ספונסר</button>
<button onclick="showLeague()">טבלת ליגה</button>
<button onclick="resetGame()">איפוס</button>

</div>

<div class="card" id="result"></div>

<script>

let data=JSON.parse(localStorage.getItem("team"))

if(!data){

data={
money:1000,
games:0,
league:1,
champ:0,
season:1,
attack:10,
def:10,
fit:10,
wins:0,
draw:0,
loss:0,
points:0,
sponsor:0,
sponsorName:"אין"
}

}

const sponsors=[
{name:"Local Shop",bonus:100},
{name:"Tech Company",bonus:200},
{name:"Mega Corp",bonus:350}
]

function save(){

localStorage.setItem("team",JSON.stringify(data))

}

function starView(value){

let yellow=Math.floor(value/5)

let blue=Math.floor(yellow/5)

yellow=yellow%5

let html=""

for(let i=0;i<yellow;i++) html+="<span class='yellow'>⭐</span>"

for(let i=0;i<blue;i++) html+="<span class='blue'>🔵</span>"

return html

}

function update(){

money.innerText=data.money
games.innerText=data.games
league.innerText=data.league
champ.innerText=data.champ
sponsorName.innerText=data.sponsorName

attackStars.innerHTML=starView(data.attack)
defStars.innerHTML=starView(data.def)
fitStars.innerHTML=starView(data.fit)

attackBar.style.width=(data.attack%25)*4+"%"
defBar.style.width=(data.def%25)*4+"%"
fitBar.style.width=(data.fit%25)*4+"%"

save()

}

function train(type){

let cost=(data[type]/5)*40

if(data.money<cost){

alert("אין מספיק כסף")
return

}

data.money-=cost
data[type]+=5

update()

}

function playMatch(){

let goals=Math.floor(Math.random()*5)
let enemyGoals=Math.floor(Math.random()*5)

let income=200+data.sponsor

data.money+=income

data.games++

if(goals>enemyGoals){

data.wins++
data.points+=3

}

else if(goals==enemyGoals){

data.draw++
data.points+=1

}

else{

data.loss++

}

if(data.games%5==0){

data.money+=500

}

if(data.games%10==0){

data.league++
data.season++
data.sponsor=0
data.sponsorName="אין"

alert("עונה חדשה - בחר ספונסר")

}

if(data.league%5==0 && data.games%10==0){

data.champ++

}

result.innerHTML="תוצאה "+goals+"-"+enemyGoals+"<br>רווח ₪"+income

update()

}

function chooseSponsor(){

if(data.sponsor!=0){

alert("כבר נבחר ספונסר לעונה")
return

}

let list="בחר ספונסר:\n"

sponsors.forEach((s,i)=>{

list+=i+" - "+s.name+" ₪"+s.bonus+"\n"

})

let choice=prompt(list)

if(sponsors[choice]){

data.sponsor=sponsors[choice].bonus
data.sponsorName=sponsors[choice].name

update()

}

}

function showLeague(){

alert(
"נצחונות "+data.wins+
"\nתיקו "+data.draw+
"\nהפסדים "+data.loss+
"\nנקודות "+data.points
)

}

function resetGame(){

localStorage.removeItem("team")
location.reload()

}

update()

</script>

</body>
</html>
