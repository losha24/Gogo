<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Soccer Manager</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
padding:20px;
}

.logo{
width:140px;
margin-bottom:20px;
}

.controls{
margin-bottom:20px;
}

button{

background:#2563eb;
border:none;
padding:10px 14px;
margin:4px;
border-radius:8px;
color:white;
cursor:pointer;
font-size:14px;

}

button:hover{
background:#1d4ed8;
}

.players{

display:flex;
justify-content:center;
gap:12px;
flex-wrap:wrap;
margin-top:20px;

}

.player{

background:#1e293b;
padding:12px;
border-radius:12px;
width:140px;
box-shadow:0 4px 10px rgba(0,0,0,0.4);

}

.player h3{

margin:5px 0;

}

.stars{

font-size:18px;
margin:6px 0;

}

.budget{

margin-top:20px;
font-size:18px;
background:#1e293b;
padding:10px;
border-radius:10px;
display:inline-block;

}

table{

margin:auto;
margin-top:25px;
border-collapse:collapse;
width:90%;
max-width:500px;

}

th,td{

padding:8px;
border-bottom:1px solid #334155;

}

th{
background:#1e293b;
}

.resultBox{

margin-top:15px;
font-size:16px;

}

</style>

</head>

<body>

<img src="soccer-logo.png" class="logo">

<div class="controls">

<button onclick="playMatch()">⚽ שחק משחק</button>
<button onclick="buyStar()">⭐ קנה כוכב</button>
<button onclick="resetGame()">🔄 איפוס</button>

</div>

<div class="players" id="players"></div>

<div class="budget" id="budget"></div>

<div class="resultBox" id="result"></div>

<table>

<thead>

<tr>

<th>קבוצה</th>
<th>משחקים</th>
<th>נק'</th>

</tr>

</thead>

<tbody id="league"></tbody>

</table>

<script>

let game = JSON.parse(localStorage.getItem("soccerGame"))

if(!game){

game={

budget:1000,

stars:0,

superStars:0,

blueStars:0,

team:{

points:0,
games:0

}

}

}

function save(){

localStorage.setItem("soccerGame",JSON.stringify(game))

}

function renderPlayers(){

let container=document.getElementById("players")

container.innerHTML=""

for(let i=1;i<=5;i++){

container.innerHTML+=`

<div class="player">

<h3>שחקן ${i}</h3>

<div class="stars">

${"⭐".repeat(game.stars)}

${game.superStars>0?`⭐${game.superStars}`:""}

${game.blueStars>0?`🔷${game.blueStars}`:""}

</div>

</div>

`

}

document.getElementById("budget").innerHTML="תקציב: "+game.budget+"$"

renderLeague()

}

function buyStar(){

let price=100

if(game.budget<price){

alert("אין מספיק כסף")

return

}

game.budget-=price

game.stars++

if(game.stars>=5){

game.stars=0
game.superStars++

}

if(game.superStars>=5){

game.superStars=0
game.blueStars++

}

save()

renderPlayers()

}

function playMatch(){

let goalsFor=Math.floor(Math.random()*5)

let goalsAgainst=Math.floor(Math.random()*5)

let result="תיקו"

let points=1

if(goalsFor>goalsAgainst){

result="ניצחון"

points=3

}

if(goalsFor<goalsAgainst){

result="הפסד"

points=0

}

game.team.points+=points
game.team.games++

document.getElementById("result").innerHTML=

result+" "+goalsFor+"-"+goalsAgainst

game.budget+=150

save()

renderPlayers()

}

function renderLeague(){

let table=document.getElementById("league")

table.innerHTML=`

<tr>

<td>הקבוצה שלך</td>
<td>${game.team.games}</td>
<td>${game.team.points}</td>

</tr>

<tr>

<td>קבוצה א</td>
<td>${game.team.games}</td>
<td>${game.team.points-2}</td>

</tr>

<tr>

<td>קבוצה ב</td>
<td>${game.team.games}</td>
<td>${game.team.points-4}</td>

</tr>

`

}

function resetGame(){

localStorage.removeItem("soccerGame")

location.reload()

}

renderPlayers()

</script>

</body>
</html>
