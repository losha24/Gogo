<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Football Manager</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
}

header{
font-size:28px;
font-weight:bold;
margin-top:10px;
}

.logo{
width:80px;
display:block;
margin:auto;
margin-top:5px;
}

.container{
max-width:900px;
margin:auto;
}

.players{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
margin-top:20px;
}

.player{
background:#1e293b;
padding:10px;
border-radius:10px;
}

.stars{
color:gold;
font-size:18px;
}

.blue{
color:#38bdf8;
}

button{
padding:8px 12px;
border:none;
border-radius:8px;
margin:4px;
cursor:pointer;
background:#2563eb;
color:white;
}

button:hover{
background:#1d4ed8;
}

.market{
display:none;
background:#111827;
padding:15px;
margin-top:20px;
border-radius:10px;
}

.tableBox{
display:none;
background:#111827;
padding:15px;
margin-top:20px;
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
border:1px solid #334155;
padding:6px;
}

.budget{
margin-top:20px;
font-size:22px;
background:#111827;
padding:10px;
border-radius:10px;
}

.resultBox{
margin-top:20px;
background:#111827;
padding:10px;
border-radius:10px;
}

footer{
margin-top:30px;
opacity:0.7;
}

</style>

</head>

<body>

<header>

Football Manager

<img src="soccer-logo.png" class="logo">

</header>

<div class="container">

<div class="players" id="players"></div>

<div class="budget">
תקציב: ₪ <span id="money">0</span>
</div>

<div>

<button onclick="train('attack')">אימון התקפה</button>
<button onclick="train('defense')">אימון הגנה</button>
<button onclick="train('fitness')">אימון כושר</button>

<button onclick="playMatch()">משחק שבועי</button>

<button onclick="toggleMarket()">שוק שחקנים</button>

<button onclick="toggleTables()">טבלת משחקים</button>

<button onclick="resetGame()">איפוס</button>

</div>

<div class="resultBox" id="result"></div>

<div class="market" id="market"></div>

<div class="tableBox" id="tables">

<h3>טבלת ליגה</h3>

<table>

<tr>
<th>משחקים</th>
<th>נצחונות</th>
<th>תיקו</th>
<th>הפסדים</th>
<th>נקודות</th>
</tr>

<tr>
<td id="g"></td>
<td id="w"></td>
<td id="d"></td>
<td id="l"></td>
<td id="p"></td>
</tr>

</table>

<h3>עונות</h3>
<div id="seasons"></div>

<h3>אליפויות</h3>
<div id="titles"></div>

</div>

</div>

<footer>
© אלכסיי זבודיסקר
</footer>

<script>

let game

function starDisplay(points){

let yellow=Math.floor(points/10)
let blue=Math.floor(yellow/10)

return "⭐".repeat(yellow-blue*10)+" <span class='blue'>🔵"+blue+"</span>"

}

function randomPlayer(){

return{

attack:10+Math.floor(Math.random()*30),
defense:10+Math.floor(Math.random()*30),
fitness:10+Math.floor(Math.random()*30)

}

}

function init(){

let saved=localStorage.getItem("footballGame")

if(saved){

game=JSON.parse(saved)

}else{

game={
money:100000,
players:[],
games:0,
wins:0,
draws:0,
losses:0,
points:0,
season:1,
titles:0,
trainCost:1000
}

for(let i=0;i<11;i++) game.players.push(randomPlayer())

}

render()

}

function save(){

localStorage.setItem("footballGame",JSON.stringify(game))

}

function render(){

document.getElementById("money").innerText=game.money

document.getElementById("g").innerText=game.games
document.getElementById("w").innerText=game.wins
document.getElementById("d").innerText=game.draws
document.getElementById("l").innerText=game.losses
document.getElementById("p").innerText=game.points

let html=""

game.players.forEach((p,i)=>{

html+=`

<div class="player">

שחקן ${i+1}

<div>התקפה ${starDisplay(p.attack)}</div>
<div>הגנה ${starDisplay(p.defense)}</div>
<div>כושר ${starDisplay(p.fitness)}</div>

<button onclick="sellPlayer(${i})">מכירה</button>

</div>

`

})

document.getElementById("players").innerHTML=html

save()

}

function train(type){

if(game.money<game.trainCost) return

game.money-=game.trainCost

game.trainCost+=500

game.players.forEach(p=>{

p[type]+=2

})

render()

}

function playMatch(){

let power=0

game.players.forEach(p=>{

power+=p.attack+p.defense+p.fitness

})

let enemy=300+Math.random()*200

let goals=Math.floor(power/100+Math.random()*3)
let enemyGoals=Math.floor(enemy/100+Math.random()*3)

let income=5000+Math.random()*3000

game.money+=income

let text=""

if(goals>enemyGoals){

game.wins++
game.points+=3
text="ניצחון"

}

else if(goals==enemyGoals){

game.draws++
game.points+=1
text="תיקו"

}

else{

game.losses++
text="הפסד"

}

game.games++

if(game.games%5==0){

game.money+=10000

}

document.getElementById("result").innerHTML=

`
תוצאה: ${goals} - ${enemyGoals}<br>
${text}<br>
הכנסה ₪${income}
`

render()

}

function toggleMarket(){

let m=document.getElementById("market")

if(m.style.display=="block"){

m.style.display="none"
return

}

let html="<h3>שוק שחקנים</h3>"

for(let i=0;i<5;i++){

let p=randomPlayer()

let price=(p.attack+p.defense+p.fitness)*100

html+=`

<div>

התקפה ${p.attack} הגנה ${p.defense} כושר ${p.fitness}

<button onclick='buy(${JSON.stringify(p)},${price})'>

קנה ₪${price}

</button>

</div>

`

}

m.innerHTML=html

m.style.display="block"

}

function buy(p,price){

if(game.money<price) return

game.money-=price

game.players.push(p)

render()

}

function sellPlayer(i){

let p=game.players[i]

let price=(p.attack+p.defense+p.fitness)*50

game.money+=price

game.players.splice(i,1)

render()

}

function toggleTables(){

let t=document.getElementById("tables")

t.style.display=t.style.display=="block"?"none":"block"

}

function resetGame(){

localStorage.removeItem("footballGame")

location.reload()

}

init()

</script>

</body>
</html>
