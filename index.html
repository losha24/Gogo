<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Go-Go Football</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
margin:0;
}

.logo{
width:120px;
margin:auto;
display:block;
}

.team{
font-size:24px;
margin:8px;
}

button{
padding:8px 14px;
margin:4px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.primary{background:#22c55e;color:white;}
.danger{background:#ef4444;color:white;}
.train{background:#3b82f6;color:white;}

.flex{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:8px;
}

.player{
background:#1e293b;
width:140px;
padding:8px;
border-radius:8px;
font-size:13px;
}

.market-player{
background:#334155;
width:140px;
padding:8px;
border-radius:8px;
}

.table{
background:#1e293b;
max-width:420px;
margin:10px auto;
padding:10px;
border-radius:8px;
display:none;
}

.green{color:#22c55e;}
.red{color:#ef4444;}

</style>

</head>

<body>

<img src="soccer_logo.png" class="logo">

<div id="setup">

<input id="teamName" placeholder="שם קבוצה">

<br><br>

<button class="primary" onclick="createTeam()">צור קבוצה</button>

</div>


<div id="game" style="display:none">

<div id="teamTitle" class="team"></div>

<div id="budget"></div>

<div id="players" class="flex"></div>

<h3>אימונים</h3>

<button class="train" onclick="train('attack')">⚔ התקפה</button>
<button class="train" onclick="train('defense')">🛡 הגנה</button>
<button class="train" onclick="train('speed')">💨 מהירות</button>

<br>

<button class="primary" onclick="playMatch()">⚽ משחק שבועי</button>

<button class="primary" onclick="toggleTables()">📊 טבלת ליגה</button>

<button class="primary" onclick="toggleMarket()">🛒 שוק שחקנים</button>

<div id="market" class="table">

<div id="marketPlayers" class="flex"></div>

</div>

<div id="leagueTable" class="table"></div>

<br>

<button class="danger" onclick="resetGame()">איפוס משחק</button>

</div>


<script>


function randomStat(){
return Math.floor(Math.random()*30)+1
}

function randomStars(){
return Math.floor(Math.random()*3)+1
}


function createStarSystem(){

return{

attack:{y:randomStars(),b:0,r:0},

defense:{y:randomStars(),b:0,r:0},

speed:{y:randomStars(),b:0,r:0}

}

}


function createProgress(){

return{attack:0,defense:0,speed:0}

}


function renderStars(p,type){

let s=p.stars[type]

return "🔴".repeat(s.r)+"🔵".repeat(s.b)+"⭐".repeat(s.y)

}


function trainStar(p,type){

p.progress[type]++

if(p.progress[type]>=5){

p.progress[type]=0

p.stars[type].y++

if(p.stars[type].y>=3){

p.stars[type].y=0

p.stars[type].b++

if(p.stars[type].b>=3){

p.stars[type].b=0

p.stars[type].r++

}

}

}

}


function reindexPlayers(data){

data.players.forEach((p,i)=>{

p.id=i+1

})

}



function createTeam(){

let name=document.getElementById("teamName").value

if(!name) return alert("הכנס שם קבוצה")

let players=[]

for(let i=1;i<=5;i++){

let a=randomStat()
let d=randomStat()
let s=randomStat()

players.push({

id:i,

attack:a,
defense:d,
speed:s,

value:(a+d+s)*1000,

stars:createStarSystem(),

progress:createProgress()

})

}

let data={

teamName:name,

budget:100000,

players:players,

league:{played:0,won:0,draw:0,lost:0,points:0},

seasonHistory:[]

}

localStorage.setItem("miniFootball",JSON.stringify(data))

loadGame()

}



function loadGame(){

let data=JSON.parse(localStorage.getItem("miniFootball"))

if(!data) return

document.getElementById("setup").style.display="none"
document.getElementById("game").style.display="block"

document.getElementById("teamTitle").innerText=data.teamName

let budget=document.getElementById("budget")

budget.innerText="תקציב: $"+data.budget

budget.className=data.budget>=0?"green":"red"

let playersDiv=document.getElementById("players")

playersDiv.innerHTML=""

data.players.forEach(p=>{

playersDiv.innerHTML+=`

<div class="player">

שחקן ${p.id}

<br>

⚔ ${renderStars(p,'attack')}

<br>

🛡 ${renderStars(p,'defense')}

<br>

💨 ${renderStars(p,'speed')}

<br>

💰 ${p.value}

<br>

<button class="danger" onclick="sellPlayer(${p.id})">מכור</button>

</div>

`

})

updateLeague(data)

renderMarket()

}



function train(type){

let data=JSON.parse(localStorage.getItem("miniFootball"))

let cost=3000

if(data.budget<cost) return alert("אין כסף")

data.players.forEach(p=>{

trainStar(p,type)

p[type]++

p.value=(p.attack+p.defense+p.speed)*1000

})

data.budget-=cost

localStorage.setItem("miniFootball",JSON.stringify(data))

loadGame()

}



function playMatch(){

let data=JSON.parse(localStorage.getItem("miniFootball"))

let power=0

data.players.forEach(p=>{

power+=p.attack+p.defense+p.speed

})

let rival=Math.floor(Math.random()*150)+60

let score=Math.floor(power/100)

let rivalScore=Math.floor(rival/100)

let income=5000+Math.floor(Math.random()*4000)

let cost=1000+Math.floor(Math.random()*3000)

data.budget+=income-cost

data.league.played++

if(score>rivalScore){

data.league.won++
data.league.points+=3

}

else if(score<rivalScore){

data.league.lost++

}

else{

data.league.draw++
data.league.points++

}

if(data.league.played%10===0){

data.seasonHistory.push({...data.league})

data.league={played:0,won:0,draw:0,lost:0,points:0}

alert("סיום עונה!")

}

localStorage.setItem("miniFootball",JSON.stringify(data))

alert("תוצאה "+score+"-"+rivalScore)

loadGame()

}



function updateLeague(data){

let div=document.getElementById("leagueTable")

div.innerHTML=

"משחקים: "+data.league.played+

"<br>ניצחונות: "+data.league.won+

"<br>תיקו: "+data.league.draw+

"<br>הפסדים: "+data.league.lost+

"<br>נקודות: "+data.league.points

}



function toggleTables(){

let t=document.getElementById("leagueTable")

t.style.display=t.style.display==="block"?"none":"block"

}



function toggleMarket(){

let m=document.getElementById("market")

m.style.display=m.style.display==="block"?"none":"block"

}



function renderMarket(){

let div=document.getElementById("marketPlayers")

div.innerHTML=""

for(let i=1;i<=5;i++){

let a=randomStat()
let d=randomStat()
let s=randomStat()

let price=(a+d+s)*900

div.innerHTML+=`

<div class="market-player">

⚔ ${a}<br>

🛡 ${d}<br>

💨 ${s}<br>

💰 ${price}<br>

<button class="primary" onclick="buyPlayer(${price},${a},${d},${s})">קנה</button>

</div>

`

}

}



function buyPlayer(val,a,d,s){

let data=JSON.parse(localStorage.getItem("miniFootball"))

if(data.players.length>=15)
return alert("מקסימום 15 שחקנים")

if(data.budget<val)
return alert("אין כסף")

data.players.push({

id:data.players.length+1,

attack:a,
defense:d,
speed:s,

value:val,

stars:createStarSystem(),

progress:createProgress()

})

data.budget-=val

reindexPlayers(data)

localStorage.setItem("miniFootball",JSON.stringify(data))

loadGame()

}



function sellPlayer(id){

let data=JSON.parse(localStorage.getItem("miniFootball"))

if(data.players.length<=5)
return alert("אי אפשר פחות מ5")

let index=data.players.findIndex(p=>p.id===id)

let value=Math.floor(data.players[index].value*0.5)

data.budget+=value

data.players.splice(index,1)

reindexPlayers(data)

localStorage.setItem("miniFootball",JSON.stringify(data))

loadGame()

}



function resetGame(){

if(confirm("לאפס משחק?")){

localStorage.removeItem("miniFootball")

location.reload()

}

}

loadGame()

</script>

</body>
</html>
