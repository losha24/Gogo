<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>O-Kar Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="logo.png">
</head>
<body>

<header class="main-header shadow">
    <div class="header-right">
        <img src="logo.png" alt="O-Kar" class="mini-logo">
        <span class="brand-name">O-KAR</span>
    </div>
    
    <div class="header-controls">
        <button class="ctrl-btn" onclick="toggleForm()" title="הוסף פריט">➕</button>
        <button class="ctrl-btn" onclick="exportData()" title="גיבוי">📤</button>
        <label class="ctrl-btn" title="שחזור">
            📥<input type="file" id="fileIn" accept=".json" onchange="importData(event)" style="display:none;">
        </label>
        <button class="ctrl-btn" onclick="location.reload(true)" title="עדכון/רענון">🔄</button>
    </div>
</header>

<div class="container">
    <div id="installContainer" style="display:none;">
        <button id="installBtn" class="btn-install-promo shadow">📲 התקן את O-Kar על מסך הבית</button>
    </div>

    <div class="card-add shadow" id="formContainer" style="display:none;">
        <div class="form-header">
            <h3 id="formTitle">פריט חדש</h3>
            <button class="close-btn" onclick="toggleForm()">✖</button>
        </div>
        <input type="hidden" id="editId">
        <input type="text" id="name" placeholder="שם הדגם">
        
        <select id="category" class="input-style">
            <option value="שטח">סכיני שטח</option>
            <option value="מטבח">סכיני מטבח</option>
            <option value="אספנות">פריטי אספנות</option>
            <option value="נדנים">נדנים ואביזרים</option>
        </select>

        <input type="text" id="mat" placeholder="סוג פלדה וידית">
        <input type="number" id="price" placeholder="מחיר (₪)">
        <textarea id="desc" rows="2" placeholder="תיאור העבודה..."></textarea>
        
        <div id="imgSection">
            <label class="file-label">הוסף תמונות:</label>
            <input type="file" id="imgs" multiple accept="image/*">
        </div>

        <button class="btn-black" id="saveBtn" onclick="save()">שמור בגלריה</button>
    </div>

    <div class="filter-bar">
        <button onclick="filterItems('all')" class="filter-btn active">הכל</button>
        <button onclick="filterItems('available')" class="filter-btn">זמין</button>
        <button onclick="filterItems('sold')" class="filter-btn">נמכר</button>
    </div>

    <div id="list" class="grid-container"></div>
</div>

<footer>
    O-KAR Professional | V2.4.0
</footer>

<script>
    const VERSION = "2.4.0";
    
    // נתוני דוגמה
    const demoData = [
        {
            id: 1, n: "סכין הישרדות 'ערבה'", p: "1200", c: "שטח", 
            m: "D2 Steel, Micarta", d: "סכין שטח קשוחה.", 
            images: ["https://images.unsplash.com/photo-1574359411659-15573a27f812?w=400"], sold: false
        },
        {
            id: 2, n: "סכין שף שחורה", p: "900", c: "מטבח", 
            m: "Carbon Steel, Olive Wood", d: "איזון מושלם.", 
            images: ["https://images.unsplash.com/photo-1593414220166-085ca802cc41?w=400"], sold: true
        }
    ];

    let db = JSON.parse(localStorage.getItem('okar_db_v24')) || demoData;
    let currentFilter = 'all';
    let deferredPrompt;

    // התקנת אפליקציה
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installContainer').style.display = 'block';
    });

    document.getElementById('installBtn').addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') document.getElementById('installContainer').style.display = 'none';
            deferredPrompt = null;
        }
    });

    function toggleForm() {
        const form = document.getElementById('formContainer');
        form.style.display = form.style.display === 'none' ? 'block' : 'none';
        if(form.style.display === 'block') window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function save() {
        const id = document.getElementById('editId').value;
        const n = document.getElementById('name').value;
        const p = document.getElementById('price').value;
        const c = document.getElementById('category').value;
        const f = document.getElementById('imgs').files;

        if(!n || !p) return alert("שם ומחיר הם חובה");

        if (id) {
            const idx = db.findIndex(x => x.id == id);
            db[idx] = {...db[idx], n, p, c, m: document.getElementById('mat').value, d: document.getElementById('desc').value};
            updateDB(); resetForm(); toggleForm();
        } else {
            const readers = Array.from(f).map(file => new Promise(res => {
                const r = new FileReader();
                r.onload = e => res(e.target.result);
                r.readAsDataURL(file);
            }));
            Promise.all(readers).then(images => {
                db.unshift({ id: Date.now(), n, p, c, m: document.getElementById('mat').value, d: document.getElementById('desc').value, images: images.length ? images : ["https://via.placeholder.com/300?text=No+Image"], sold: false });
                updateDB(); resetForm(); toggleForm();
            });
        }
    }

    function render() {
        const listDiv = document.getElementById('list');
        let filtered = db.filter(i => {
            if(currentFilter === 'available') return !i.sold;
            if(currentFilter === 'sold') return i.sold;
            return true;
        });

        listDiv.innerHTML = filtered.map(i => `
            <div class="item-card shadow ${i.sold ? 'is-sold' : ''}">
                <div class="slider">${i.images.map(s => `<img src="${s}">`).join('')}</div>
                <div class="item-body">
                    <div class="tag">${i.c}</div>
                    <div class="item-title">${i.n}</div>
                    <div class="price">₪${i.p}</div>
                    <div class="action-grid">
                        <button class="btn-wa" onclick="shareWA('${i.n}', '${i.p}')">WA</button>
                        <button class="btn-edit" onclick="editItem(${i.id})">✎</button>
                        <button class="btn-status" onclick="toggleSold(${i.id})">${i.sold ? '🔓' : '🔒'}</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function editItem(id) {
        const item = db.find(x => x.id == id);
        document.getElementById('editId').value = item.id;
        document.getElementById('name').value = item.n;
        document.getElementById('price').value = item.p;
        document.getElementById('category').value = item.c;
        document.getElementById('mat').value = item.m;
        document.getElementById('desc').value = item.d;
        document.getElementById('formTitle').innerText = "עריכה";
        document.getElementById('imgSection').style.display = "none";
        toggleForm();
    }

    function toggleSold(id) {
        const idx = db.findIndex(x => x.id == id);
        db[idx].sold = !db[idx].sold;
        updateDB();
    }

    function filterItems(type) {
        currentFilter = type;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        render();
    }

    function shareWA(n, p) {
        window.open(`https://wa.me/?text=${encodeURIComponent('*O-Kar*\nדגם: ' + n + '\nמחיר: ' + p + '₪')}`);
    }

    function updateDB() { localStorage.setItem('okar_db_v24', JSON.stringify(db)); render(); }
    
    function resetForm() {
        ['editId','name','mat','price','desc','imgs'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('formTitle').innerText = "פריט חדש";
        document.getElementById('imgSection').style.display = "block";
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(db)], {type: "application/json"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `okar_backup.json`;
        a.click();
    }

    function importData(e) {
        const f = e.target.files[0];
        if(!f) return;
        const r = new FileReader();
        r.onload = ev => { try { db = JSON.parse(ev.target.result); updateDB(); alert("שחזור הושלם!"); } catch(e) { alert("שגיאה בקובץ"); } };
        r.readAsText(f);
    }

    render();
</script>
</body>
</html>
