<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מנהל קבוצת כדורגל</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

button{
padding:10px;
margin:5px;
font-size:16px;
cursor:pointer;
}

.card{
background:#1c1c1c;
padding:10px;
margin:10px;
border-radius:10px;
}

.stats{
display:flex;
justify-content:space-around;
flex-wrap:wrap;
}

.star{
color:gold;
}

.blue{
color:#3aa3ff;
}

</style>
</head>

<body>

<h1>⚽ מנהל קבוצת כדורגל</h1>

<div class="card">

כסף: ₪ <span id="money"></span><br>
משחקים: <span id="games"></span><br>
ליגה: <span id="league"></span><br>
אליפויות: <span id="champ"></span>

</div>

<div class="card stats">

<div>
התקפה<br>
<span id="attackStars"></span>
</div>

<div>
הגנה<br>
<span id="defStars"></span>
</div>

<div>
כושר<br>
<span id="fitStars"></span>
</div>

</div>

<div class="card">

<button onclick="train('attack')">אימון התקפה</button>
<button onclick="train('def')">אימון הגנה</button>
<button onclick="train('fit')">אימון כושר</button>

</div>

<div class="card">

<button onclick="playMatch()">משחק שבועי</button>
<button onclick="showLeague()">טבלת ליגה</button>
<button onclick="showSeasons()">עונות</button>
<button onclick="resetGame()">איפוס</button>

</div>

<div class="card" id="result"></div>

<script>

let data=JSON.parse(localStorage.getItem("team"))

if(!data){

data={
money:1000,
games:0,
league:1,
champ:0,
attack:10,
def:10,
fit:10,
wins:0,
draw:0,
loss:0,
points:0,
sponsor:100
}

}

function save(){

localStorage.setItem("team",JSON.stringify(data))

}

function stars(value){

let yellow=Math.floor(value/10)
let blue=Math.floor(yellow/5)
yellow=yellow%5

let html=""

for(let i=0;i<yellow;i++) html+="⭐"
for(let i=0;i<blue;i++) html+="<span class='blue'>🔵</span>"

return html

}

function update(){

document.getElementById("money").innerText=data.money
document.getElementById("games").innerText=data.games
document.getElementById("league").innerText=data.league
document.getElementById("champ").innerText=data.champ

document.getElementById("attackStars").innerHTML=stars(data.attack)
document.getElementById("defStars").innerHTML=stars(data.def)
document.getElementById("fitStars").innerHTML=stars(data.fit)

save()

}

function train(type){

let cost=(data[type]/10)*50

if(data.money<cost){

alert("אין מספיק כסף")
return

}

data.money-=cost
data[type]+=10

update()

}

function playMatch(){

let team=data.attack+data.def+data.fit

let enemy=Math.random()*team*1.2

let goals=Math.floor(Math.random()*5)
let enemyGoals=Math.floor(Math.random()*5)

let moneyReward=200+data.sponsor

data.money+=moneyReward

data.games++

if(goals>enemyGoals){

data.wins++
data.points+=3

}

else if(goals==enemyGoals){

data.draw++
data.points+=1

}

else{

data.loss++

}

if(data.games%5==0){

data.money+=500

}

if(data.games%10==0){

data.league++

}

if(data.league%5==0 && data.games%10==0){

data.champ++

}

document.getElementById("result").innerHTML=

"תוצאה: "+goals+" - "+enemyGoals+
"<br>רווח: ₪"+moneyReward

update()

}

function showLeague(){

alert(
"נצחונות: "+data.wins+
"\nתיקו: "+data.draw+
"\nהפסדים: "+data.loss+
"\nנקודות: "+data.points
)

}

function showSeasons(){

alert(
"ליגות: "+data.league+
"\nאליפויות: "+data.champ
)

}

function resetGame(){

localStorage.removeItem("team")
location.reload()

}

update()

</script>

</body>
</html>
