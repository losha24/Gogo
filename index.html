<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>O-Kar Custom Blades | V4.3.0</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="logo.png">
</head>
<body onload="initApp()">

<header class="main-header shadow">
    <div class="header-top">
        <img src="logo.png" alt="O-Kar Logo" class="main-logo-large" onclick="goHome()">
    </div>
    <div class="header-controls">
        <button class="nav-btn home-btn" onclick="goHome()">🏠 בית</button>
        <button id="pwaBtn" class="nav-btn">📲 התקנה</button>
        <button class="nav-btn" onclick="location.reload(true)">🔄 רענון</button>
        <button class="nav-btn" onclick="exportData()">💾 גיבוי</button>
        <label class="nav-btn">📂 שחזור<input type="file" id="fileIn" accept=".json" onchange="importData(event)" style="display:none;"></label>
    </div>
</header>

<div class="container">
    <button class="big-add-btn shadow" onclick="toggleForm()">
        <span>➕</span> הוספת מוצר חדש למערכת
    </button>

    <div id="statsRow" class="stats-container shadow">
        <div class="stat-item">📦 מלאי: <span id="totalItems">0</span></div>
        <div class="stat-item">💰 נמכרו: <span id="totalSold">0</span></div>
    </div>

    <div id="formModal" class="full-modal" style="display:none;">
        <div class="form-header-bar">
            <button class="back-btn" onclick="goHome()">➜ ביטול</button>
            <h2 id="formTitle">פרטי מוצר</h2>
        </div>
        <div class="form-content-wrapper">
            <div class="form-body">
                <input type="hidden" id="editId">
                <div class="input-group"><label>שם הדגם</label><input type="text" id="name" placeholder="שם הסכין"></div>
                <div class="input-group"><label>מחיר (₪)</label><input type="number" id="price" placeholder="מחיר בשקלים"></div>
                <div class="input-group"><label>חומרים</label><input type="text" id="mat" placeholder="סוג פלדה וידית"></div>
                <div class="input-group"><label>תיאור</label><textarea id="desc" rows="3" placeholder="פירוט נוסף..."></textarea></div>
                <div class="file-area shadow">
                    <p>📸 צילום או בחירת תמונות</p>
                    <input type="file" id="imgs" multiple accept="image/*">
                    <small>המערכת מכווצת תמונות גדולות אוטומטית</small>
                </div>
                <button id="saveBtn" class="btn-save-final shadow" onclick="save()">שמור ופרסם</button>
                <button id="deleteBtn" class="btn-delete" style="display:none;" onclick="deleteProduct()">🗑️ מחק מוצר</button>
            </div>
        </div>
    </div>

    <div id="list" class="grid-container"></div>
</div>

<div id="viewModal" class="full-modal" style="display:none;">
    <span class="close-view" onclick="closeView()">&times;</span>
    <div id="modalContent"></div>
</div>

<footer>O-KAR Custom Blades | V4.3.0</footer>

<script>
    const DB_NAME = 'okar_database_final';
    const MY_PHONE = "0524704226";
    let db = [];

    function initApp() {
        const saved = localStorage.getItem(DB_NAME);
        if (saved) db = JSON.parse(saved);
        render();
        setupPWA();
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('id')) setTimeout(() => viewItem(urlParams.get('id')), 500);
    }

    async function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1000;
                    let width = img.width;
                    let height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
            };
        });
    }

    async function save() {
        const n = document.getElementById('name').value;
        const p = document.getElementById('price').value;
        const id = document.getElementById('editId').value;
        if(!n || !p) return alert("חובה למלא שם ומחיר");

        const btn = document.getElementById('saveBtn');
        btn.disabled = true;
        btn.innerText = "מעבד...";

        const fileInput = document.getElementById('imgs');
        let images = [];

        if (fileInput.files.length > 0) {
            for (let file of fileInput.files) {
                const compressed = await compressImage(file);
                images.push(compressed);
            }
        }

        const item = {
            id: id ? Number(id) : Date.now(),
            n, p, 
            m: document.getElementById('mat').value,
            d: document.getElementById('desc').value,
            // לוגו ברירת מחדל אם לא נבחרו תמונות
            images: images.length > 0 ? images : (id ? db.find(x=>x.id==id).images : ["logo.png"]),
            sold: id ? db.find(x=>x.id==id).sold : false
        };

        if(id) db[db.findIndex(x=>x.id==id)] = item;
        else db.unshift(item);

        updateDB();
        btn.disabled = false;
        btn.innerText = "שמור ופרסם";
        goHome();
    }

    function render() {
        const list = document.getElementById('list');
        list.innerHTML = db.length ? db.map(i => `
            <div class="item-card shadow ${i.sold ? 'is-sold' : ''}">
                <div class="card-img" onclick="viewItem(${i.id})"><img src="${i.images[0]}" loading="lazy"></div>
                <div class="item-info">
                    <div class="title">${i.n}</div>
                    <div class="price">₪${i.p}</div>
                    <div class="item-btns">
                        <button class="btn-i" onclick="contactSeller('${i.n}', '${i.p}', ${i.id})">💬</button>
                        <button class="btn-i" onclick="editItem(${i.id})">✏️</button>
                        <button class="btn-i" onclick="toggleSold(${i.id})">${i.sold ? '🛒' : '✅'}</button>
                    </div>
                </div>
            </div>
        `).join('') : '<p class="empty-msg">המלאי ריק.</p>';
        
        // עדכון סטטיסטיקה
        document.getElementById('totalItems').innerText = db.length;
        document.getElementById('totalSold').innerText = db.filter(i => i.sold).length;
    }

    function viewItem(id) {
        const i = db.find(x => x.id == id);
        if(!i) return;
        document.getElementById('modalContent').innerHTML = `
            <div class="m-slider">${i.images.map(s => `<img src="${s}">`).join('')}</div>
            <div class="m-details">
                <h2>${i.n}</h2>
                <p class="m-price">₪${i.p}</p>
                <div class="m-specs shadow"><p><strong>חומרים:</strong> ${i.m || '-'}</p><p>${i.d || '-'}</p></div>
                <button class="btn-wa-big shadow" onclick="contactSeller('${i.n}', '${i.p}', ${i.id})">💬 צור קשר בוואצאפ</button>
            </div>
        `;
        document.getElementById('viewModal').style.display = "block";
        document.body.classList.add('no-scroll');
    }

    function contactSeller(n, p, id) {
        const url = `${window.location.href.split('?')[0]}?id=${id}`;
        const msg = `היי, אני מעוניין במוצר: *${n}* (₪${p}).\nלינק: ${url}`;
        window.open(`https://wa.me/972${MY_PHONE.substring(1)}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    function editItem(id) {
        const i = db.find(x => x.id == id);
        document.getElementById('editId').value = i.id;
        document.getElementById('name').value = i.n;
        document.getElementById('price').value = i.p;
        document.getElementById('mat').value = i.m;
        document.getElementById('desc').value = i.d;
        document.getElementById('formTitle').innerText = "עריכה";
        document.getElementById('deleteBtn').style.display = 'block';
        document.getElementById('formModal').style.display = 'block';
    }

    function deleteProduct() {
        if(confirm("למחוק סופית?")) {
            db = db.filter(x => x.id != document.getElementById('editId').value);
            updateDB();
            goHome();
        }
    }

    function toggleSold(id) {
        const idx = db.findIndex(x => x.id == id);
        db[idx].sold = !db[idx].sold;
        updateDB();
    }

    function updateDB() { localStorage.setItem(DB_NAME, JSON.stringify(db)); render(); }
    function goHome() { 
        window.history.replaceState({}, '', window.location.href.split('?')[0]);
        document.querySelectorAll('.full-modal').forEach(m => m.style.display = 'none'); 
        document.body.classList.remove('no-scroll'); 
    }
    function toggleForm() { resetForm(); document.getElementById('deleteBtn').style.display = 'none'; document.getElementById('formModal').style.display = 'block'; }
    function resetForm() { ['editId','name','mat','price','desc','imgs'].forEach(id => document.getElementById(id).value = ''); }
    function exportData() {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(db)], {type: "application/json"}));
        a.download = "okar_backup.json"; a.click();
    }
    function importData(e) {
        const r = new FileReader();
        r.onload = ev => { db = JSON.parse(ev.target.result); updateDB(); };
        r.readAsText(e.target.files[0]);
    }
    function setupPWA() { /* logic here */ }
    function closeView() { goHome(); }
</script>
</body>
</html>
