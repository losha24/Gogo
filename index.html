<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GO GO Football</title>

<link rel="icon" type="image/png" sizes="192x192" href="soccer_icon_192.png">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
text-align:center;
display:flex;
justify-content:center;
}

.wrapper{
max-width:900px;
width:100%;
padding:20px;
}

.logo{
width:110px;
display:block;
margin:auto;
margin-bottom:15px;
}

.players{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:10px;
max-width:700px;
margin:20px auto;
}

.player{
background:#1e293b;
border-radius:10px;
padding:10px;
font-size:13px;
text-align:center;
box-shadow:0 0 6px rgba(0,0,0,0.6);
position:relative;
}

.player-number{
position:absolute;
top:-8px;
left:50%;
transform:translateX(-50%);
background:#2563eb;
width:24px;
height:24px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
}

.stat{
margin:3px 0;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
margin:4px;
font-weight:bold;
}

.primary{background:#22c55e;color:white;}
.train{background:#3b82f6;color:white;}
.danger{background:#ef4444;color:white;}

.controls{
margin-top:10px;
}

.budget{
background:#111827;
padding:10px;
border-radius:10px;
font-size:18px;
margin:10px auto;
max-width:300px;
}

.result{
margin-top:15px;
background:#111827;
padding:10px;
border-radius:10px;
max-width:350px;
margin-left:auto;
margin-right:auto;
}

.market{
display:none;
background:#111827;
padding:10px;
border-radius:10px;
max-width:400px;
margin:10px auto;
}

.table{
display:none;
background:#111827;
padding:10px;
border-radius:10px;
max-width:400px;
margin:10px auto;
text-align:right;
}

footer{
margin-top:20px;
opacity:0.7;
}

input{
padding:8px;
border-radius:6px;
border:none;
margin:5px;
}

</style>
</head>

<body>

<div class="wrapper">

<img src="soccer_logo.png" class="logo">

<div id="setup">
<input type="text" id="teamName" placeholder="שם קבוצה">
<br>
<button class="primary" onclick="createTeam()">צור קבוצה</button>
</div>

<div id="game" style="display:none">

<div id="players" class="players"></div>

<div id="budget" class="budget"></div>

<div class="controls">

<button class="train" onclick="train('attack')">⚔ אימון התקפה</button>

<button class="train" onclick="train('defense')">🛡 אימון הגנה</button>

<button class="train" onclick="train('speed')">⚡ אימון מהירות</button>

<br>

<button class="primary" onclick="playMatch()">⚽ משחק שבועי</button>

<button class="primary" onclick="toggleTables()">📊 טבלת משחקים</button>

<button class="primary" onclick="toggleMarket()">🛒 שוק שחקנים</button>

</div>

<div id="result" class="result"></div>

<div id="market" class="market"></div>

<div id="tables">

<div id="leagueTable" class="table"></div>

<div id="seasonTable" class="table"></div>

<div id="champTable" class="table"></div>

</div>

<br>

<button class="danger" onclick="resetGame()">איפוס משחק</button>

<footer>© אלכסיי זבודיסקר</footer>

</div>

</div>

<script>

/* כוכבים */

function stars(val){

let yellow=Math.floor(val/10)

let blue=Math.floor(yellow/5)

yellow=yellow%5

return "🔷".repeat(blue)+"⭐".repeat(yellow)

}

/* יצירת שחקן */

function newPlayer(id){

let attack=(Math.floor(Math.random()*3)+1)*10
let defense=(Math.floor(Math.random()*3)+1)*10
let speed=(Math.floor(Math.random()*3)+1)*10

let value=(attack+defense+speed)*1000

return{id,attack,defense,speed,value}

}

/* יצירת קבוצה */

function createTeam(){

let name=document.getElementById("teamName").value

if(!name) return alert("הכנס שם קבוצה")

let players=[]

for(let i=1;i<=5;i++) players.push(newPlayer(i))

let data={

team:name,
budget:100000,
players:players,

league:{played:0,won:0,draw:0,lost:0,points:0},

season:0,
champ:0,
history:[],

train:{attack:1,defense:1,speed:1}

}

localStorage.setItem("gogo",JSON.stringify(data))

loadGame()

}

/* טעינת משחק */

function loadGame(){

let data=JSON.parse(localStorage.getItem("gogo"))

if(!data) return

setup.style.display="none"
game.style.display="block"

players.innerHTML=""

data.players.forEach(p=>{

players.innerHTML+=`

<div class="player">

<div class="player-number">${p.id}</div>

<div class="stat">⚔ ${stars(p.attack)}</div>

<div class="stat">🛡 ${stars(p.defense)}</div>

<div class="stat">⚡ ${stars(p.speed)}</div>

<button class="danger" onclick="sell(${p.id})">מכור</button>

</div>

`

})

budget.innerHTML="תקציב: $"+data.budget

updateTables()

}

/* אימון */

function train(type){

let data=JSON.parse(localStorage.getItem("gogo"))

let cost=1500*Math.ceil(data.train[type])

if(data.budget<cost) return alert("אין מספיק כסף")

data.players.forEach(p=>{

p[type]+=Math.random()*2

})

data.budget-=cost

data.train[type]+=0.2

localStorage.setItem("gogo",JSON.stringify(data))

loadGame()

}

/* משחק */

function playMatch(){

let data=JSON.parse(localStorage.getItem("gogo"))

let power=0

data.players.forEach(p=>power+=p.attack+p.defense+p.speed)

let rival=Math.random()*power

let score=Math.floor(Math.random()*5)

let rscore=Math.floor(Math.random()*5)

data.league.played++

if(score>rscore){

data.league.won++
data.league.points+=3

}

else if(score==rscore){

data.league.draw++
data.league.points++

}

else data.league.lost++

let income=5000+Math.random()*5000
let cost=1000+Math.random()*4000

data.budget+=Math.floor(income-cost)

let bonus=""

if(data.league.played%5==0){

let b=10000+Math.random()*15000

data.budget+=Math.floor(b)

bonus="<br>🎁 בונוס: "+Math.floor(b)

}

result.innerHTML=

"תוצאה: "+score+"-"+rscore+
"<br>הכנסה: "+Math.floor(income)+
"<br>עלות: "+Math.floor(cost)+
bonus

/* סוף עונה */

if(data.league.played%10==0){

data.season++

data.history.push({...data.league})

data.league={played:0,won:0,draw:0,lost:0,points:0}

if(data.season%5==0){

data.champ++

alert("🏆 זכית באליפות!")

}

}

localStorage.setItem("gogo",JSON.stringify(data))

loadGame()

}

/* מכירה */

function sell(id){

let data=JSON.parse(localStorage.getItem("gogo"))

let p=data.players.find(x=>x.id==id)

data.budget+=Math.floor(p.value*0.5)

data.players=data.players.filter(x=>x.id!=id)

localStorage.setItem("gogo",JSON.stringify(data))

loadGame()

}

/* שוק */

function toggleMarket(){

let m=document.getElementById("market")

if(m.style.display=="none"){

m.style.display="block"

renderMarket()

}else m.style.display="none"

}

function renderMarket(){

let m=document.getElementById("market")

m.innerHTML=""

for(let i=0;i<3;i++){

let price=Math.floor(Math.random()*30000+5000)

m.innerHTML+=

"שחקן "+(i+1)+" - "+price+
" <button onclick='buy("+price+")'>קנה</button><br>"

}

}

function buy(price){

let data=JSON.parse(localStorage.getItem("gogo"))

if(data.budget<price) return alert("אין מספיק כסף")

data.players.push(newPlayer(data.players.length+1))

data.budget-=price

localStorage.setItem("gogo",JSON.stringify(data))

loadGame()

}

/* טבלאות */

function toggleTables(){

document.querySelectorAll(".table").forEach(t=>{

t.style.display=(t.style.display=="block")?"none":"block"

})

}

function updateTables(){

let data=JSON.parse(localStorage.getItem("gogo"))

leagueTable.innerHTML=

"משחקים "+data.league.played+
"<br>ניצחונות "+data.league.won+
"<br>תיקו "+data.league.draw+
"<br>הפסדים "+data.league.lost+
"<br>נקודות "+data.league.points

seasonTable.innerHTML="עונות: "+data.season

champTable.innerHTML="אליפויות: "+data.champ

}

/* איפוס */

function resetGame(){

if(!confirm("להתחיל מחדש?")) return

localStorage.removeItem("gogo")

location.reload()

}

loadGame()

</script>

</body>
</html>
