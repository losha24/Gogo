<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Manager</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
padding:0;
}

header{
background:#1e293b;
padding:15px;
font-size:22px;
font-weight:bold;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.train{background:#22c55e;color:white;}
.advanced{background:#f59e0b;color:white;}
.camp{background:#ef4444;color:white;}

.card{
background:#1e293b;
margin:10px;
padding:10px;
border-radius:10px;
}

.stat{
font-size:14px;
}

</style>
</head>

<body>

<header>⚽ Football Manager</header>

<div id="money">כסף: 1000</div>

<div>
<button class="train" onclick="trainNormal()">אימון רגיל</button>
<button class="advanced" onclick="trainAdvanced()">אימון מתקדם</button>
<button class="camp" onclick="trainingCamp()">מחנה אימונים</button>
</div>

<div id="players"></div>

<script>

let money=1000
let campUsed=false

let players=[

{name:"שחקן 1",atk:10,def:8,spd:9},
{name:"שחקן 2",atk:7,def:11,spd:8},
{name:"שחקן 3",atk:9,def:7,spd:10},
{name:"שחקן 4",atk:6,def:9,spd:9},
{name:"שחקן 5",atk:8,def:8,spd:8}

]

function stars(value){

let normal=Math.floor(value/10)
let blue=Math.floor(normal/3)
let red=Math.floor(blue/3)

normal=normal%3
blue=blue%3

let s=""

for(let i=0;i<normal;i++)s+="⭐"
for(let i=0;i<blue;i++)s+="🔵"
for(let i=0;i<red;i++)s+="🔴"

return s

}

function render(){

document.getElementById("money").innerText="כסף: "+money

let html=""

players.forEach(p=>{

html+=`

<div class="card">

<h3>${p.name}</h3>

<div class="stat">
התקפה: ${p.atk} ${stars(p.atk)}
</div>

<div class="stat">
הגנה: ${p.def} ${stars(p.def)}
</div>

<div class="stat">
מהירות: ${p.spd} ${stars(p.spd)}
</div>

</div>

`

})

document.getElementById("players").innerHTML=html

save()

}

function randomStat(p,amount){

let r=Math.floor(Math.random()*3)

if(r===0)p.atk+=amount
if(r===1)p.def+=amount
if(r===2)p.spd+=amount

}

function trainNormal(){

players.forEach(p=>{

let gain=Math.floor(Math.random()*3)+1
randomStat(p,gain)

})

render()

}

function trainAdvanced(){

if(money<200){
alert("אין מספיק כסף")
return
}

money-=200

players.forEach(p=>{

let gain=Math.floor(Math.random()*6)+5
randomStat(p,gain)

})

render()

}

function trainingCamp(){

if(campUsed){
alert("מחנה אימונים כבר בוצע")
return
}

campUsed=true

players.forEach(p=>{

let gain=Math.floor(Math.random()*16)+10
randomStat(p,gain)

})

render()

}

function save(){

localStorage.setItem("fm_money",money)
localStorage.setItem("fm_players",JSON.stringify(players))
localStorage.setItem("fm_camp",campUsed)

}

function load(){

let m=localStorage.getItem("fm_money")
let p=localStorage.getItem("fm_players")
let c=localStorage.getItem("fm_camp")

if(m)money=parseInt(m)
if(p)players=JSON.parse(p)
if(c)campUsed=c==="true"

}

load()
render()

</script>

</body>
</html>
