<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go-Go Football Game</title>
<link rel="icon" type="image/png" sizes="192x192" href="soccer_logo.png">
<style>
body { font-family: Arial, sans-serif; background:#0f172a; color:white; margin:0; padding:20px; text-align:center; }
.logo { width:100px; display:block; margin:10px auto; }
button { padding:8px 14px; margin:4px; border:none; border-radius:6px; cursor:pointer; font-weight:bold; }
.primary { background:#22c55e; color:white; }
.danger { background:#ef4444; color:white; }
.info { background:#3b82f6; color:white; }
.player, .market-player { background:#334155; padding:8px; border-radius:6px; margin:5px; display:inline-block; vertical-align:top; width:140px; text-align:right; }
.player-stats { font-size:14px; margin-bottom:4px; }
#budget { font-weight:bold; margin:10px auto; padding:8px; border-radius:6px; border:2px solid #334155; max-width:340px; display:block; font-size:16px; }
.green { color:#22c55e; }
.red { color:#ef4444; }
.blue { color:#3b82f6; }
.bonus { color:#facc15; font-weight:bold; font-size:16px; }
.table { background:#1e293b; padding:10px; border-radius:8px; margin:10px auto; max-width:400px; text-align:right; display:none; }
#market { display:none; margin-top:10px; }
#sponsor { display:none; margin-top:10px; }
.match-box { background:#1e293b; padding:10px; border-radius:8px; max-width:400px; margin:10px auto; text-align:right; }
.flex-row { display:flex; justify-content:center; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
.table-row { display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid #334155; }
</style>
</head>
<body>

<img src="soccer_logo.png" alt="לוגו Go-Go" class="logo">

<div id="setup">
    <input type="text" id="teamName" placeholder="הכנס שם קבוצה">
    <br>
    <button class="primary" onclick="createTeam()">צור קבוצה</button>
</div>

<div id="game" style="display:none;">
    <h2 id="teamTitle"></h2>
    <div id="players" class="flex-row"></div>
    <span id="budget"></span>

    <h3>אימונים ומשחקים</h3>
    <div class="flex-row" id="trainingButtons"></div>

    <div class="flex-row">
        <button class="primary" onclick="toggleMarket()">🛒 שוק שחקנים</button>
        <button class="primary" onclick="toggleSponsor()">💼 ספונסר</button>
    </div>

    <div id="market" class="table">
        <button class="danger" onclick="resetMarket()">איפוס שוק (1% מהתקציב)</button>
        <div id="marketPlayers" class="flex-row"></div>
    </div>

    <div id="sponsor" class="table">
        <p>בחר ספונסר לעונה (ניתן לשנות רק בסוף עונה)</p>
        <div id="sponsorOptions" class="flex-row"></div>
    </div>

    <button class="primary" onclick="playMatch()">⚽ משחק שבועי</button>
    <div id="matchResult" class="match-box"></div>

    <div id="tablesContainer">
        <div id="leagueTable" class="table"></div>
        <div id="seasonTable" class="table"></div>
        <div id="championshipTable" class="table"></div>
    </div>

    <br>
    <button class="danger" onclick="resetGame()">איפוס משחק</button>

    <p style="margin-top:20px; font-size:12px;">© אלכסיי זבודיסקר</p>
</div>

<script>
// --- פונקציות בסיס ---
function randomStat(){ return Math.floor(Math.random()*30)+1; }

// מערכת כוכבים מתקדמת
function starsColored(val){
    let yellow=Math.floor(val/10);
    let blue=Math.floor(yellow/5);
    yellow=yellow%5;
    let red=Math.floor(blue/5);
    blue=blue%5;
    return '🟥'.repeat(red)+'🔷'.repeat(blue)+'⭐'.repeat(yellow);
}

// --- יצירת קבוצה ---
function createTeam(){
    const name=document.getElementById("teamName").value;
    if(!name) return alert("אנא הכנס שם קבוצה");

    let players=[];
    for(let i=1;i<=5;i++){
        let attack=10*(Math.floor(Math.random()*3)+1);
        let defense=10*(Math.floor(Math.random()*3)+1);
        let speed=10*(Math.floor(Math.random()*3)+1);
        let value=Math.round((attack+defense+speed)*1000);
        players.push({id:i,attack,defense,speed,value});
    }

    const gameData={
        teamName:name,
        budget:100000,
        players:players,
        league:{played:0,won:0,draw:0,lost:0,points:0},
        seasonsPlayed:0,
        championships:0,
        seasonHistory:[],
        sponsor:null,
        trainMultiplier:{attack:1,defense:1,speed:1}
    };

    localStorage.setItem("miniFootball",JSON.stringify(gameData));
    loadGame();
}

// --- טעינת המשחק ---
function loadGame(){
    const data=JSON.parse(localStorage.getItem("miniFootball"));
    if(!data) return;
    document.getElementById("setup").style.display="none";
    document.getElementById("game").style.display="block";

    const playersDiv=document.getElementById("players");
    playersDiv.innerHTML="";
    data.players.forEach(p=>{
        playersDiv.innerHTML+=`
        <div class="player">
            <div class="player-stats">שחקן ${p.id} | ⚔️ ${starsColored(p.attack)} | 🛡️ ${starsColored(p.defense)} | 💨 ${starsColored(p.speed)} | 💰 $${p.value}</div>
            <button class="danger" onclick="sellPlayer(${p.id})">מכור</button>
        </div>`;
    });

    const budgetSpan=document.getElementById("budget");
    budgetSpan.innerText="תקציב: $"+data.budget;
    budgetSpan.className=data.budget>=0?"green":"red";

    document.getElementById("teamTitle").innerText=data.teamName;

    renderTrainingButtons();
    updateLeagueTable(data.league);
    updateSeasonTable(data);
    document.getElementById("championshipTable").innerText=`אליפויות: ${data.championships}`;
    renderMarket();
    renderSponsor();
}

// --- אימונים מתקדמים ---
function renderTrainingButtons(){
    const container=document.getElementById("trainingButtons");
    container.innerHTML="";
    ["attack","defense","speed"].forEach(type=>{
        let icon=type==="attack"?"⚔️":type==="defense"?"🛡️":"💨";
        let btn=document.createElement("button");
        btn.className="info";
        btn.innerText=icon+" "+type.charAt(0).toUpperCase()+type.slice(1);
        btn.onclick=()=>train(type);
        container.appendChild(btn);
    });
}

function train(type){
    let data=JSON.parse(localStorage.getItem("miniFootball"));
    if(!data) return;
    let baseCost=3000*Math.ceil(data.trainMultiplier[type]);
    if(data.budget<baseCost) return alert("אין מספיק כסף לאימון!");
    data.players.forEach(p=>{
        let inc=parseFloat((Math.random()*3+1).toFixed(1));
        p[type]=Math.min(p[type]+inc,30);
        p.value=Math.round((p.attack+p.defense+p.speed)*1000);
    });
    data.budget-=baseCost;
    data.trainMultiplier[type]+=0.25;
    localStorage.setItem("miniFootball",JSON.stringify(data));
    loadGame();
}

// --- יריב ומשחק ---
function generateRival(week){
    let factor=1+week*0.05;
    let players=[];
    for(let i=1;i<=5;i++){
        players.push({attack:Math.min(randomStat()*factor,30),defense:Math.min(randomStat()*factor,30),speed:Math.min(randomStat()*factor,30)});
    }
    return players;
}

function playMatch(){
    let data=JSON.parse(localStorage.getItem("miniFootball"));
    if(!data) return;
    let rival=generateRival(data.league.played);
    let playerPower={attack:0,defense:0,speed:0};
    let rivalPower={attack:0,defense:0,speed:0};
    data.players.forEach(p=>{playerPower.attack+=p.attack;playerPower.defense+=p.defense;playerPower.speed+=p.speed;});
    rival.forEach(p=>{rivalPower.attack+=p.attack;rivalPower.defense+=p.defense;rivalPower.speed+=p.speed;});

    function calcScore(a,d,s){ let base=a*0.5+s*0.3-d*0.2; base=Math.max(base,0); return Math.min(Math.floor(Math.random()*6*(base/100)),5); }
    let playerScore=calcScore(playerPower.attack,rivalPower.defense,playerPower.speed);
    let rivalScore=calcScore(rivalPower.attack,playerPower.defense,rivalPower.speed);

    data.league.played++;
    if(playerScore>rivalScore){data.league.won++;data.league.points+=3;}
    else if(playerScore===rivalScore){data.league.draw++;data.league.points++;}
    else{data.league.lost++;}

    let matchCost=1000+Math.floor(Math.random()*4000);
    let income=5000+Math.floor(Math.random()*5000);
    let bonusMsg="";
    if(data.league.played%5===0){
        let bonus=Math.floor(Math.random()*24001)+1000;
        data.budget+=income-matchCost+bonus;
        bonusMsg=`<p class="bonus">🎉 בונוס משחק 5: $${bonus} | תקציב כולל: $${data.budget}</p>`;
    } else {
        data.budget+=income-matchCost;
    }

    let color=playerScore>rivalScore?'green':playerScore<rivalScore?'red':'blue';
    document.getElementById("matchResult").innerHTML=`
    <div class="match-box" style="color:${color}">
        <p>תוצאה: ${playerScore} - ${rivalScore}</p>
        <p>עלות: $${matchCost} | הכנסות: $${income}</p>
        ${bonusMsg}
    </div>`;

    if(data.league.played%10===0){
        data.seasonsPlayed++;
        data.seasonHistory.push({...data.league});
        alert(`📅 עונה הסתיימה! סה"כ עונות: ${data.seasonsPlayed}`);
        data.league={played:0,won:0,draw:0,lost:0,points:0};
        data.trainMultiplier={attack:1,defense:1,speed:1};
        if(data.seasonsPlayed%5===0){
            data.championships++;
            alert(`🏆 אליפות! מספר אליפויות: ${data.championships}`);
        }
    }
    localStorage.setItem("miniFootball",JSON.stringify(data));
    loadGame();
}

// --- טבלאות ---
function updateLeagueTable(league){
    let html="";
    html+=`<div class="table-row"><strong>משחקים:</strong> ${league.played}</div>`;
    html+=`<div class="table-row"><strong>ניצחונות:</strong> ${league.won}</div>`;
    html+=`<div class="table-row"><strong>תיקו:</strong> ${league.draw}</div>`;
    html+=`<div class="table-row"><strong>הפסדים:</strong> ${league.lost}</div>`;
    html+=`<div class="table-row"><strong>נקודות:</strong> ${league.points}</div>`;
    document.getElementById("leagueTable").innerHTML=html;
}
function updateSeasonTable(data){
    let html="היסטוריית עונות:<br>";
    data.seasonHistory.forEach((s,i)=>{ html+=`עונה ${i+1}: ניצחונות ${s.won}, תיקו ${s.draw}, הפסדים ${s.lost}, נקודות ${s.points}<br>`; });
    document.getElementById("seasonTable").innerHTML=html;
}
function toggleTables(){ const tables=document.querySelectorAll("#tablesContainer .table"); tables.forEach(t=>t.style.display=(t.style.display==="none"||t.style.display==="")?"block":"none"); }

// --- שוק שחקנים ---
function toggleMarket(){ const market=document.getElementById("market"); market.style.display=(market.style.display==="none"||market.style.display==="")?"block":"none"; }
function resetMarket(){ let data=JSON.parse(localStorage.getItem("miniFootball")); data.budget=Math.round(data.budget*0.99); localStorage.setItem("miniFootball",JSON.stringify(data)); loadGame(); }
function renderMarket(){
    const marketPlayers=document.getElementById("marketPlayers");
    marketPlayers.innerHTML="";
    let data=JSON.parse(localStorage.getItem("miniFootball"));
    for(let i=1;i<=5;i++){
        let val=Math.floor(Math.random()*30000+5000);
        let pid=data.players.length+i;
        marketPlayers.innerHTML+=`<div class="market-player">שחקן ${pid} | 💰 ${val} 
        <button class="primary" onclick="buyPlayer(${val})">קנה</button>
        </div>`;
    }
}
function buyPlayer(value){
    let data=JSON.parse(localStorage.getItem("miniFootball"));
    if(data.budget<value) return alert("אין מספיק כסף לקנייה!");
    let id=data.players.length+1;
    let attack=10*(Math.floor(Math.random()*3)+1);
    let defense=10*(Math.floor(Math.random()*3)+1);
    let speed=10*(Math.floor(Math.random()*3)+1);
    let player={id,attack,defense,speed,value};
    data.players.push(player);
    data.budget-=value;
    localStorage.setItem("miniFootball",JSON.stringify(data));
    loadGame();
}
function sellPlayer(id){
    let data=JSON.parse(localStorage.getItem("miniFootball"));
    let index=data.players.findIndex(p=>p.id===id);
    if(index===-1)return;
    let player=data.players[index];
    let sellValue=Math.round(player.value*0.5);
    data.budget+=sellValue;
    data.players.splice(index,1);
    localStorage.setItem("miniFootball",JSON.stringify(data));
    loadGame();
}

// --- ספונסרים ---
function toggleSponsor(){ const s=document.getElementById("sponsor"); s.style.display=(s.style.display==="none"||s.style.display==="")?"block":"none"; }
function renderSponsor(){
    const options=["Nike","Adidas","Puma","Reebok"];
    const container=document.getElementById("sponsorOptions");
    container.innerHTML="";
    let data=JSON.parse(localStorage.getItem("miniFootball"));
    options.forEach(opt=>{
        container.innerHTML+=`<button class="primary" onclick="selectSponsor('${opt}')" ${data.sponsor? 'disabled': ''}>${opt}</button>`;
    });
}
function selectSponsor(name){ let data=JSON.parse(localStorage.getItem("miniFootball")); if(data.sponsor)return; data.sponsor=name; localStorage.setItem("miniFootball",JSON.stringify(data)); alert(`ספונסר נבחר: ${name}`); loadGame(); }

// --- איפוס ---
function resetGame(){
    if(confirm("למחוק את כל המשחק ולהתחיל מחדש?")){
        localStorage.removeItem("miniFootball");
        document.getElementById("setup").style.display="block";
        document.getElementById("game").style.display="none";
        document.getElementById("teamName").value="";
        document.getElementById("players").innerHTML="";
        document.getElementById("leagueTable").innerHTML="";
        document.getElementById("seasonTable").innerHTML="";
        document.getElementById("championshipTable").innerHTML="";
        document.getElementById("matchResult").innerHTML="";
        document.getElementById("market").style.display="none";
        document.getElementById("sponsor").style.display="none";
    }
}

loadGame();
</script>
</body>
</html>
