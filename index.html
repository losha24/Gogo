<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>O-Kar Pro | V2.5.0</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="logo.png">
</head>
<body>

<header class="main-header shadow">
    <div class="header-right">
        <img src="logo.png" alt="O-Kar" class="main-logo">
        <span class="brand-name">O-KAR</span>
    </div>
    <div class="header-controls">
        <button class="ctrl-btn main-add" onclick="toggleForm()">➕</button>
        <button class="ctrl-btn" onclick="exportData()">📤</button>
        <label class="ctrl-btn">📥<input type="file" id="fileIn" accept=".json" onchange="importData(event)" style="display:none;"></label>
        <button class="ctrl-btn" onclick="location.reload(true)">🔄</button>
    </div>
</header>

<div class="container">
    <div id="installContainer" style="display:none;">
        <button id="installBtn" class="btn-install-promo shadow">📲 התקן את האפליקציה</button>
    </div>

    <div class="card-add shadow" id="formContainer" style="display:none;">
        <div class="form-header">
            <h3 id="formTitle">פריט חדש</h3>
            <button class="close-btn" onclick="toggleForm()">✖</button>
        </div>
        <input type="hidden" id="editId">
        <input type="text" id="name" placeholder="שם הדגם">
        <select id="category" class="input-style">
            <option value="שטח">סכיני שטח</option>
            <option value="מטבח">סכיני מטבח</option>
            <option value="אספנות">פריטי אספנות</option>
            <option value="נדנים">נדנים</option>
        </select>
        <input type="text" id="mat" placeholder="חומרים">
        <input type="number" id="price" placeholder="מחיר (₪)">
        <textarea id="desc" rows="2" placeholder="תיאור..."></textarea>
        <div id="imgSection">
            <input type="file" id="imgs" multiple accept="image/*">
        </div>
        <button class="btn-black" id="saveBtn" onclick="save()">שמור שינויים</button>
    </div>

    <div class="filter-bar">
        <button onclick="filterItems('all')" class="filter-btn active">הכל</button>
        <button onclick="filterItems('available')" class="filter-btn">זמין</button>
        <button onclick="filterItems('sold')" class="filter-btn">נמכר</button>
    </div>

    <div id="list" class="grid-container"></div>
</div>

<div id="viewModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeView()">&times;</span>
        <div id="modalContent"></div>
    </div>
</div>

<footer>O-KAR Professional | V2.5.0</footer>

<script>
    let db = JSON.parse(localStorage.getItem('okar_db_v25')) || [];
    let currentFilter = 'all';

    function toggleForm() {
        const f = document.getElementById('formContainer');
        f.style.display = f.style.display === 'none' ? 'block' : 'none';
        if(f.style.display === 'block') window.scrollTo(0,0);
    }

    function save() {
        const id = document.getElementById('editId').value;
        const n = document.getElementById('name').value;
        const p = document.getElementById('price').value;
        if(!n || !p) return alert("חובה שם ומחיר");

        const data = {
            id: id ? Number(id) : Date.now(),
            n, p, 
            c: document.getElementById('category').value,
            m: document.getElementById('mat').value,
            d: document.getElementById('desc').value,
            sold: false
        };

        const f = document.getElementById('imgs').files;
        if (f.length > 0) {
            const readers = Array.from(f).map(file => new Promise(res => {
                const r = new FileReader();
                r.onload = e => res(e.target.result);
                r.readAsDataURL(file);
            }));
            Promise.all(readers).then(images => {
                data.images = images;
                finalizeSave(data, id);
            });
        } else {
            const existing = db.find(x => x.id == id);
            data.images = existing ? existing.images : ["https://via.placeholder.com/300"];
            finalizeSave(data, id);
        }
    }

    function finalizeSave(data, id) {
        if(id) {
            const idx = db.findIndex(x => x.id == id);
            db[idx] = {...db[idx], ...data};
        } else {
            db.unshift(data);
        }
        updateDB(); resetForm(); toggleForm();
    }

    function render() {
        const listDiv = document.getElementById('list');
        const filtered = db.filter(i => currentFilter === 'all' || (currentFilter === 'available' ? !i.sold : i.sold));

        listDiv.innerHTML = filtered.map(i => `
            <div class="item-card shadow ${i.sold ? 'is-sold' : ''}">
                <div class="slider" onclick="viewItem(${i.id})">${i.images.map(s => `<img src="${s}">`).join('')}</div>
                <div class="item-body">
                    <div class="item-title">${i.n}</div>
                    <div class="price">₪${i.p}</div>
                    <div class="action-grid">
                        <button class="btn-action btn-wa" onclick="shareWA('${i.n}', '${i.p}')">🔗</button>
                        <button class="btn-action btn-edit" onclick="editItem(${i.id})">✏️</button>
                        <button class="btn-action btn-status" onclick="toggleSold(${i.id})">${i.sold ? '🛒' : '✅'}</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function viewItem(id) {
        const i = db.find(x => x.id == id);
        document.getElementById('modalContent').innerHTML = `
            <div class="modal-slider">${i.images.map(s => `<img src="${s}">`).join('')}</div>
            <h2>${i.n}</h2>
            <p class="modal-price">₪${i.p}</p>
            <p><strong>חומרים:</strong> ${i.m}</p>
            <p><strong>תיאור:</strong> ${i.d}</p>
            <button class="btn-black" onclick="shareWA('${i.n}', '${i.p}')">שתף בוואצאפ</button>
        `;
        document.getElementById('viewModal').style.display = "block";
    }

    function closeView() { document.getElementById('viewModal').style.display = "none"; }

    function editItem(id) {
        const i = db.find(x => x.id == id);
        document.getElementById('editId').value = i.id;
        document.getElementById('name').value = i.n;
        document.getElementById('price').value = i.p;
        document.getElementById('mat').value = i.m;
        document.getElementById('desc').value = i.d;
        document.getElementById('formTitle').innerText = "עריכת מוצר";
        toggleForm();
    }

    function toggleSold(id) {
        const idx = db.findIndex(x => x.id == id);
        db[idx].sold = !db[idx].sold;
        updateDB();
    }

    function shareWA(n, p) {
        const text = `היי, אני מעוניין במוצר: ${n}\nמחיר: ₪${p}\nפרטים נוספים כאן!`;
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`, '_blank');
    }

    function updateDB() { localStorage.setItem('okar_db_v25', JSON.stringify(db)); render(); }
    function resetForm() {
        ['editId','name','mat','price','desc','imgs'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('formTitle').innerText = "פריט חדש";
    }
    function filterItems(t) {
        currentFilter = t;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.innerText.includes(t === 'all' ? 'הכל' : t === 'available' ? 'זמין' : 'נמכר')));
        render();
    }
    render();
</script>
</body>
</html>
