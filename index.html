<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Soccer Manager</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
padding:20px;
}

.logo{
width:140px;
margin-bottom:20px;
}

.controls{
margin-bottom:15px;
}

button{

background:#2563eb;
border:none;
padding:10px 14px;
margin:4px;
border-radius:8px;
color:white;
cursor:pointer;

}

button:hover{
background:#1d4ed8;
}

.players{

display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;

}

.player{

background:#1e293b;
border-radius:10px;
padding:10px;
width:150px;

}

.player h3{
margin:4px 0;
font-size:16px;
}

.stat{
font-size:14px;
margin:2px 0;
}

.stars{
margin-top:5px;
}

.budget{

margin-top:15px;
font-size:18px;
background:#1e293b;
padding:8px 14px;
border-radius:8px;
display:inline-block;

}

.resultBox{

margin-top:15px;
padding:10px;
border:1px solid #334155;
border-radius:8px;
display:inline-block;

}

table{

margin:auto;
margin-top:20px;
border-collapse:collapse;
width:90%;
max-width:500px;

}

th,td{
padding:8px;
border-bottom:1px solid #334155;
}

th{
background:#1e293b;
}

</style>

</head>

<body>

<img src="soccer-logo.png" class="logo">

<div class="controls">

<button onclick="playMatch()">⚽ משחק שבועי</button>
<button onclick="resetGame()">🔄 איפוס קבוצה</button>

</div>

<div id="players" class="players"></div>

<div id="budget" class="budget"></div>

<div id="result" class="resultBox"></div>

<table>

<thead>

<tr>
<th>קבוצה</th>
<th>משחקים</th>
<th>נקודות</th>
</tr>

</thead>

<tbody id="league"></tbody>

</table>

<script>

let game = JSON.parse(localStorage.getItem("soccerGame"))

if(!game){

game={

budget:1000,

stars:0,
superStars:0,
blueStars:0,

team:{
games:0,
points:0
},

players:[]

}

for(let i=1;i<=5;i++){

game.players.push({

attack:1,
defense:1,
fitness:1

})

}

}

function save(){

localStorage.setItem("soccerGame",JSON.stringify(game))

}

function starView(){

let s=""

s+="⭐".repeat(game.stars)

if(game.superStars>0){

s+=" ⭐"+game.superStars

}

if(game.blueStars>0){

s+=" 🔵"+game.blueStars

}

return s

}

function renderPlayers(){

let container=document.getElementById("players")

container.innerHTML=""

game.players.forEach((p,i)=>{

let priceAttack=50+(p.attack*10)
let priceDefense=50+(p.defense*10)
let priceFitness=50+(p.fitness*10)

container.innerHTML+=`

<div class="player">

<h3>שחקן ${i+1}</h3>

<div class="stat">⚔ התקפה ${p.attack}</div>
<button onclick="train(${i},'attack')">אימון (${priceAttack})</button>

<div class="stat">🛡 הגנה ${p.defense}</div>
<button onclick="train(${i},'defense')">אימון (${priceDefense})</button>

<div class="stat">⚡ כושר ${p.fitness}</div>
<button onclick="train(${i},'fitness')">אימון (${priceFitness})</button>

<div class="stars">${starView()}</div>

</div>

`

})

document.getElementById("budget").innerHTML="תקציב: "+game.budget+"$"

renderLeague()

}

function train(i,type){

let player=game.players[i]

let price=50+(player[type]*10)

if(game.budget<price){

alert("אין מספיק כסף")

return

}

game.budget-=price

player[type]++

game.stars++

if(game.stars>=5){

game.stars=0
game.superStars++

}

if(game.superStars>=5){

game.superStars=0
game.blueStars++

}

save()

renderPlayers()

}

function playMatch(){

let goalsFor=Math.floor(Math.random()*5)
let goalsAgainst=Math.floor(Math.random()*5)

let result="תיקו"
let points=1

if(goalsFor>goalsAgainst){

result="ניצחון"
points=3

}

if(goalsFor<goalsAgainst){

result="הפסד"
points=0

}

game.team.games++
game.team.points+=points

let income=150

if(game.team.games%5===0){

income+=200

}

game.budget+=income

document.getElementById("result").innerHTML=

result+" "+goalsFor+"-"+goalsAgainst+
"<br>הכנסה: "+income+"$"

save()

renderPlayers()

}

function renderLeague(){

let table=document.getElementById("league")

table.innerHTML=`

<tr>
<td>הקבוצה שלך</td>
<td>${game.team.games}</td>
<td>${game.team.points}</td>
</tr>

<tr>
<td>קבוצה א</td>
<td>${game.team.games}</td>
<td>${game.team.points-2}</td>
</tr>

<tr>
<td>קבוצה ב</td>
<td>${game.team.games}</td>
<td>${game.team.points-4}</td>
</tr>

`

}

function resetGame(){

if(confirm("לפתוח קבוצה חדשה?")){

localStorage.removeItem("soccerGame")
location.reload()

}

}

renderPlayers()

</script>

</body>
</html>
