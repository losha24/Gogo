<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go-Go</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
padding:20px;
}

.logo{
width:90px;
margin-bottom:10px;
}

button{
padding:10px 16px;
margin:4px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.primary{background:#22c55e;color:white;}
.danger{background:#ef4444;color:white;}
.train-btn{background:#3b82f6;color:white;}

.train-row{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:6px;
}

.players-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:6px;
max-width:700px;
margin:auto;
}

.player{
background:#1e293b;
padding:6px;
border-radius:6px;
font-size:13px;
}

.table{
background:#1e293b;
padding:10px;
border-radius:8px;
margin:10px auto;
max-width:400px;
}

.leagueRow{
display:flex;
justify-content:space-between;
padding:4px 0;
border-bottom:1px solid #334155;
}

.green{color:#22c55e}
.red{color:#ef4444}
.bonus{color:#facc15;font-weight:bold}

.sponsor{
background:#1e293b;
padding:8px;
border-radius:6px;
margin:4px;
}

</style>
</head>

<body>

<img src="soccer_logo.png" class="logo">

<div id="setup">

<input id="teamName" placeholder="שם קבוצה">
<br><br>

<button class="primary" onclick="createTeam()">צור קבוצה</button>

</div>

<div id="game" style="display:none">

<h2 id="teamTitle"></h2>

תקציב: $<span id="budget"></span>

<h3>שחקנים</h3>

<div id="players" class="players-grid"></div>

<h3>אימונים</h3>

<div class="train-row">

<button class="train-btn" onclick="train('attack')">⚔️ התקפה</button>
<button class="train-btn" onclick="train('defense')">🛡️ הגנה</button>
<button class="train-btn" onclick="train('fitness')">❤️ כושר</button>

</div>

<button class="primary" onclick="playMatch()">⚽ משחק שבועי</button>

<div id="matchResult"></div>

<h3>ליגה</h3>

<div id="leagueTable" class="table"></div>

<h3>עונות</h3>

<div id="seasonTable" class="table"></div>

<h3>אליפויות</h3>

<div id="championshipTable" class="table"></div>

<h3>ספונסר</h3>

<div id="sponsorArea" class="table"></div>

<button class="danger" onclick="resetGame()">איפוס</button>

</div>

<script>

function randomStat(){return Math.floor(Math.random()*30)+1}
function randomTrain(){return Math.random()*2+0.5}

function stars(v){

let yellow=Math.floor(v/10)

let blue=Math.floor(yellow/5)

yellow=yellow%5

return "🔷".repeat(blue)+"⭐".repeat(yellow)

}

function createTeam(){

let name=document.getElementById("teamName").value

if(!name) return alert("הכנס שם קבוצה")

let players=[]

for(let i=1;i<=11;i++){

let a=randomStat()
let d=randomStat()
let f=randomStat()

players.push({id:i,attack:a,defense:d,fitness:f})

}

let data={
teamName:name,
budget:100000,
players:players,
league:{played:0,won:0,draw:0,lost:0,points:0},
seasonsPlayed:0,
championships:0,
seasonHistory:[],
sponsor:"none"
}

localStorage.setItem("miniFootball",JSON.stringify(data))

loadGame()

}

function teamValue(players){

let v=0

players.forEach(p=>{

v+=p.attack+p.defense+p.fitness

})

return v*1000

}

function loadGame(){

let data=JSON.parse(localStorage.getItem("miniFootball"))

if(!data) return

setup.style.display="none"
game.style.display="block"

teamTitle.innerText=data.teamName

budget.innerText=data.budget
budget.className=data.budget>=0?"green":"red"

let playersDiv=document.getElementById("players")

playersDiv.innerHTML=""

data.players.forEach(p=>{

playersDiv.innerHTML+=`
<div class="player">

שחקן ${p.id}

<br>

⚔️ ${stars(p.attack)}

<br>

🛡️ ${stars(p.defense)}

<br>

❤️ ${stars(p.fitness)}

</div>
`

})

updateLeague(data)

updateSeasons(data)

championshipTable.innerText="אליפויות: "+data.championships

renderSponsors(data)

}

function train(type){

let data=JSON.parse(localStorage.getItem("miniFootball"))

let cost=3000

if(data.budget<cost) return alert("אין מספיק כסף")

data.players.forEach(p=>{

let inc=randomTrain()

if(type=="attack")p.attack=Math.min(30,p.attack+inc)

if(type=="defense")p.defense=Math.min(30,p.defense+inc)

if(type=="fitness")p.fitness=Math.min(30,p.fitness+inc)

})

data.budget-=cost

localStorage.setItem("miniFootball",JSON.stringify(data))

loadGame()

}

function generateRival(level){

let players=[]

for(let i=1;i<=11;i++){

players.push({

attack:randomStat()+level,

defense:randomStat()+level,

fitness:randomStat()+level

})

}

return players

}

function playMatch(){

let data=JSON.parse(localStorage.getItem("miniFootball"))

let rival=generateRival(data.seasonsPlayed)

let powerA=0
let powerB=0

data.players.forEach(p=>powerA+=p.attack+p.fitness)

rival.forEach(p=>powerB+=p.attack+p.fitness)

let scoreA=Math.floor(Math.random()*3+powerA/150)
let scoreB=Math.floor(Math.random()*3+powerB/150)

if(scoreA>scoreB){

data.league.won++
data.league.points+=3

}

else if(scoreA==scoreB){

data.league.draw++
data.league.points++

}

else{

data.league.lost++

}

data.league.played++

let income=5000+Math.floor(Math.random()*5000)

let cost=1000+Math.floor(Math.random()*4000)

data.budget+=income-cost

let msg=""

if(data.league.played%5==0){

let bonus=10000+Math.floor(Math.random()*15000)

data.budget+=bonus

msg=`<div class="bonus">בונוס $${bonus}</div>`

}

matchResult.innerHTML=

`תוצאה ${scoreA}-${scoreB}

<br>

הכנסות ${income}

<br>

עלות ${cost}

${msg}`

if(data.league.played==10){

endSeason(data)

}

localStorage.setItem("miniFootball",JSON.stringify(data))

loadGame()

}

function endSeason(data){

data.seasonsPlayed++

data.seasonHistory.push({...data.league})

let sponsorBonus=0

let value=teamValue(data.players)

if(data.sponsor=="local"){

sponsorBonus=value*0.05

}

if(data.sponsor=="regional" && data.league.points>=15){

sponsorBonus=value*0.2

}

if(data.sponsor=="global" && data.league.points>=25){

sponsorBonus=value*0.5

data.championships++

}

data.budget+=Math.floor(sponsorBonus)

data.league={played:0,won:0,draw:0,lost:0,points:0}

alert("עונה הסתיימה")

}

function updateLeague(data){

leagueTable.innerHTML=`

<div class="leagueRow"><span>משחקים</span><span>${data.league.played}</span></div>

<div class="leagueRow"><span>נצחונות</span><span>${data.league.won}</span></div>

<div class="leagueRow"><span>תיקו</span><span>${data.league.draw}</span></div>

<div class="leagueRow"><span>הפסדים</span><span>${data.league.lost}</span></div>

<div class="leagueRow"><span>נקודות</span><span>${data.league.points}</span></div>

`

}

function updateSeasons(data){

let html=""

data.seasonHistory.forEach((s,i)=>{

html+=`עונה ${i+1} נקודות ${s.points}<br>`

})

seasonTable.innerHTML=html

}

function renderSponsors(data){

sponsorArea.innerHTML=`

<div class="sponsor">

🟢 מקומי 5%

<button onclick="chooseSponsor('local')">חתום</button>

</div>

<div class="sponsor">

🟡 אזורי 20%

<button onclick="chooseSponsor('regional')">חתום</button>

</div>

<div class="sponsor">

🔵 עולמי 50%

<button onclick="chooseSponsor('global')">חתום</button>

</div>

נבחר: ${data.sponsor}

`

}

function chooseSponsor(s){

let data=JSON.parse(localStorage.getItem("miniFootball"))

data.sponsor=s

localStorage.setItem("miniFootball",JSON.stringify(data))

loadGame()

}

function resetGame(){

if(confirm("להתחיל מחדש?")){

localStorage.removeItem("miniFootball")

location.reload()

}

}

loadGame()

</script>

</body>
</html>
