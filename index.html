<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Go-Go Football Game</title>

<link rel="icon" type="image/png" href="soccer_logo.png">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
padding:20px;
}

.logo{
width:120px;
display:block;
margin:auto;
}

#teamTitle{
margin-top:10px;
font-size:22px;
font-weight:bold;
color:#22c55e;
}

button{
padding:8px 14px;
margin:5px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.primary{
background:#22c55e;
color:white;
}

.danger{
background:#ef4444;
color:white;
}

.train{
background:#3b82f6;
color:white;
}

.flex{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:8px;
}

.player{
background:#1e293b;
padding:10px;
border-radius:8px;
width:140px;
font-size:13px;
}

.market-player{
background:#334155;
padding:10px;
border-radius:8px;
width:150px;
}

.table{
background:#1e293b;
padding:10px;
border-radius:8px;
max-width:420px;
margin:10px auto;
}

.green{color:#22c55e;}
.red{color:#ef4444;}
.blue{color:#3b82f6;}

</style>

</head>

<body>

<img src="soccer_logo.png" class="logo">

<div id="setup">

<input id="teamName" placeholder="שם קבוצה">

<br><br>

<button class="primary" onclick="createTeam()">צור קבוצה</button>

</div>


<div id="game" style="display:none">

<div id="teamTitle"></div>

<br>

<div id="players" class="flex"></div>

<h3 id="budget"></h3>

<h3>אימונים</h3>

<button class="train" onclick="train('attack')">⚔️ התקפה</button>

<button class="train" onclick="train('defense')">🛡️ הגנה</button>

<button class="train" onclick="train('speed')">💨 מהירות</button>

<br><br>

<button class="primary" onclick="playMatch()">⚽ משחק שבועי</button>

<div id="matchResult"></div>

<br>

<button class="primary" onclick="toggleMarket()">🛒 שוק שחקנים</button>

<div id="market" style="display:none">

<div id="marketPlayers" class="flex"></div>

</div>

<br>

<button class="primary" onclick="toggleSponsor()">🤝 ספונסר</button>

<div id="sponsorBox" style="display:none">

<button onclick="chooseSponsor(5000)">Local Shop +5000</button>

<button onclick="chooseSponsor(10000)">Tech Corp +10000</button>

<button onclick="chooseSponsor(15000)">Mega Sports +15000</button>

</div>

<br>

<div id="leagueTable" class="table"></div>

<div id="seasonTable" class="table"></div>

<div id="champTable" class="table"></div>

<br>

<button class="danger" onclick="resetGame()">איפוס משחק</button>

</div>


<script>

function randomStat(){

return Math.floor(Math.random()*30)+1

}



function createTeam(){

let name=document.getElementById("teamName").value

if(!name)return alert("הכנס שם קבוצה")

let players=[]

for(let i=1;i<=5;i++){

let attack=randomStat()

let defense=randomStat()

let speed=randomStat()

players.push({

id:i,

attack,

defense,

speed,

value:(attack+defense+speed)*1000,

stars:{

attack:{y:Math.floor(Math.random()*3)+1,b:0,r:0},

defense:{y:Math.floor(Math.random()*3)+1,b:0,r:0},

speed:{y:Math.floor(Math.random()*3)+1,b:0,r:0}

},

progress:{attack:0,defense:0,speed:0}

})

}

let data={

team:name,

budget:100000,

players,

league:{played:0,won:0,draw:0,lost:0,points:0},

seasons:0,

champ:0,

history:[],

sponsor:false

}

localStorage.setItem("miniFootball",JSON.stringify(data))

loadGame()

}



function renderStars(p,type){

let s=p.stars[type]

return "🔴".repeat(s.r)+"🔵".repeat(s.b)+"⭐".repeat(s.y)

}



function trainStar(p,type){

p.progress[type]++

if(p.progress[type]>=5){

p.progress[type]=0

p.stars[type].y++

if(p.stars[type].y>=3){

p.stars[type].y=0

p.stars[type].b++

if(p.stars[type].b>=3){

p.stars[type].b=0

p.stars[type].r++

}

}

}

}



function loadGame(){

let data=JSON.parse(localStorage.getItem("miniFootball"))

if(!data)return

document.getElementById("setup").style.display="none"

document.getElementById("game").style.display="block"

document.getElementById("teamTitle").innerText=data.team

document.getElementById("budget").innerText="תקציב: "+data.budget

let pdiv=document.getElementById("players")

pdiv.innerHTML=""

data.players.forEach(p=>{

pdiv.innerHTML+=`

<div class="player">

<b>שחקן ${p.id}</b>

<br>

⚔️ ${renderStars(p,'attack')}

<br>

🛡️ ${renderStars(p,'defense')}

<br>

💨 ${renderStars(p,'speed')}

<br>

💰 ${p.value}

<br>

<button class="danger" onclick="sellPlayer(${p.id})">מכור</button>

</div>

`

})

updateTables(data)

renderMarket()

}



function train(type){

let data=JSON.parse(localStorage.getItem("miniFootball"))

if(data.budget<3000)return alert("אין כסף")

data.players.forEach(p=>{

trainStar(p,type)

p[type]++

p.value=(p.attack+p.defense+p.speed)*1000

})

data.budget-=3000

localStorage.setItem("miniFootball",JSON.stringify(data))

loadGame()

}



function playMatch(){

let data=JSON.parse(localStorage.getItem("miniFootball"))

let power=0

data.players.forEach(p=>{

power+=p.attack+p.defense+p.speed

})

let rival=Math.random()*power

let goals=Math.floor(Math.random()*5)

let rivalGoals=Math.floor(Math.random()*5)

let color="blue"

if(goals>rivalGoals){

data.league.won++

data.league.points+=3

color="green"

}

else if(goals<rivalGoals){

data.league.lost++

color="red"

}

else{

data.league.draw++

data.league.points++

}

data.league.played++

let income=5000+Math.floor(Math.random()*5000)

let cost=1000+Math.floor(Math.random()*3000)

data.budget+=income-cost

let bonus=""

if(data.league.played%5==0){

let b=1000+Math.floor(Math.random()*24000)

data.budget+=b

bonus=" בונוס "+b

}

document.getElementById("matchResult").innerHTML=

`<h3 class="${color}">תוצאה ${goals}-${rivalGoals} ${bonus}</h3>`

localStorage.setItem("miniFootball",JSON.stringify(data))

loadGame()

}



function renderMarket(){

let box=document.getElementById("marketPlayers")

box.innerHTML=""

for(let i=1;i<=5;i++){

let a=randomStat()

let d=randomStat()

let s=randomStat()

let val=(a+d+s)*1000

box.innerHTML+=`

<div class="market-player">

⚔️${a} 🛡️${d} 💨${s}

<br>

💰 ${val}

<br>

<button onclick="buyPlayer(${val},${a},${d},${s})">קנה</button>

</div>

`

}

}



function buyPlayer(val,a,d,s){

let data=JSON.parse(localStorage.getItem("miniFootball"))

if(data.players.length>=15)return alert("מקסימום 15")

if(data.budget<val)return alert("אין כסף")

let id=data.players.length+1

data.players.push({

id,

attack:a,

defense:d,

speed:s,

value:val,

stars:{attack:{y:1,b:0,r:0},defense:{y:1,b:0,r:0},speed:{y:1,b:0,r:0}},

progress:{attack:0,defense:0,speed:0}

})

data.budget-=val

localStorage.setItem("miniFootball",JSON.stringify(data))

loadGame()

}



function sellPlayer(id){

let data=JSON.parse(localStorage.getItem("miniFootball"))

if(data.players.length<=5)return alert("חייבים לפחות 5")

let index=data.players.findIndex(p=>p.id==id)

let val=Math.floor(data.players[index].value*0.5)

data.budget+=val

data.players.splice(index,1)

localStorage.setItem("miniFootball",JSON.stringify(data))

loadGame()

}



function toggleMarket(){

let m=document.getElementById("market")

m.style.display=m.style.display=="none"?"block":"none"

}



function toggleSponsor(){

let m=document.getElementById("sponsorBox")

m.style.display=m.style.display=="none"?"block":"none"

}



function chooseSponsor(val){

let data=JSON.parse(localStorage.getItem("miniFootball"))

if(data.sponsor)return alert("כבר נבחר")

data.budget+=val

data.sponsor=true

localStorage.setItem("miniFootball",JSON.stringify(data))

loadGame()

}



function updateTables(data){

document.getElementById("leagueTable").innerHTML=

"משחקים "+data.league.played+

" | ניצ "+data.league.won+

" | תיקו "+data.league.draw+

" | הפסד "+data.league.lost+

" | נק "+data.league.points

document.getElementById("champTable").innerHTML=

"אליפויות "+data.champ

}



function resetGame(){

localStorage.removeItem("miniFootball")

location.reload()

}



loadGame()

</script>

</body>
</html>
